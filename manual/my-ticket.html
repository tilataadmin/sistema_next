<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="page-version" content="26.03.12.07.45">
    <title>Mi Ticket - SchoolNet</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        .loading-overlay { position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;justify-content:center;align-items:center;z-index:9999; }
        .loading-overlay.hidden { display:none; }
        .loading-content { background:white;padding:2rem;border-radius:8px;text-align:center; }
        .spinner { border:3px solid #f3f3f3;border-top:3px solid #007bff;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:0 auto 1rem; }
        @keyframes spin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }

        .ticket-header { background: linear-gradient(135deg, #1B365D 0%, #2a5298 100%); color: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .ticket-header .ticket-number { font-size: 1.8rem; font-weight: 700; }
        .ticket-header .ticket-meta { opacity: 0.85; font-size: 0.9rem; }

        .status-badge { font-size: 0.85rem; padding: 0.4rem 0.8rem; border-radius: 20px; }
        .category-badge { font-size: 0.85rem; padding: 0.4rem 0.8rem; border-radius: 20px; }
        .priority-badge { font-size: 0.85rem; padding: 0.4rem 0.8rem; border-radius: 20px; }

        /* Conversación tipo chat */
        .conversation { max-height: 600px; overflow-y: auto; padding: 1rem; }
        .msg { margin-bottom: 1rem; max-width: 85%; }
        .msg-system { max-width: 100%; }
        .msg-right { margin-left: auto; }
        .msg-left { margin-right: auto; }

        .msg-bubble { padding: 12px 16px; border-radius: 12px; font-size: 0.9rem; line-height: 1.5; }
        .msg-bubble-user { background: #0d6efd; color: white; border-bottom-right-radius: 4px; }
        .msg-bubble-team { background: #f0f2f5; color: #1c1e21; border-bottom-left-radius: 4px; }
        .msg-bubble-system { background: #fff3cd; color: #664d03; text-align: center; font-size: 0.8rem; border-radius: 20px; padding: 6px 16px; }

        .msg-meta { font-size: 0.75rem; color: #6c757d; margin-top: 4px; padding: 0 4px; }
        .msg-right .msg-meta { text-align: right; }

        .msg-author { font-weight: 600; font-size: 0.8rem; margin-bottom: 2px; padding: 0 4px; }
        .msg-right .msg-author { text-align: right; color: #0d6efd; }
        .msg-left .msg-author { color: #495057; }

        .reply-section { border-top: 2px solid #dee2e6; padding-top: 1rem; margin-top: 1rem; }
        .reply-section textarea { border-radius: 12px; resize: none; }
        .reply-section .btn { border-radius: 12px; }

        .detail-row { padding: 6px 0; border-bottom: 1px solid #f0f0f0; }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { font-weight: 600; color: #495057; font-size: 0.85rem; }
        .detail-value { font-size: 0.85rem; }
    </style>
</head>

<body>
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-content"><div class="spinner"></div><p class="mb-0">Cargando ticket...</p></div>
    </div>

    <div class="container py-4" style="max-width: 900px;">
        
        <div id="alertContainer"></div>

        <!-- ENCABEZADO DEL TICKET -->
        <div class="ticket-header" id="ticket-header">
            <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                <div>
                    <div class="ticket-number" id="header-number">Cargando...</div>
                    <div class="ticket-meta" id="header-date"></div>
                </div>
                <div class="d-flex gap-2 flex-wrap" id="header-badges"></div>
            </div>
        </div>

        <div class="row g-4">
            <!-- COLUMNA IZQUIERDA: Detalles -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header"><h6 class="mb-0"><i class="bi bi-info-circle me-2"></i>Detalles</h6></div>
                    <div class="card-body" id="ticket-details">
                        <div class="text-center text-muted py-3"><div class="spinner-border spinner-border-sm"></div></div>
                    </div>
                </div>

                <!-- Captura -->
                <div class="card mt-3 d-none" id="screenshot-card">
                    <div class="card-header"><h6 class="mb-0"><i class="bi bi-image me-2"></i>Captura</h6></div>
                    <div class="card-body p-2">
                        <img id="screenshot-img" src="" class="img-fluid rounded" alt="Captura">
                    </div>
                </div>

                <!-- Descripción original -->
                <div class="card mt-3">
                    <div class="card-header"><h6 class="mb-0"><i class="bi bi-file-text me-2"></i>Descripción</h6></div>
                    <div class="card-body">
                        <p id="ticket-description" class="mb-0 small" style="white-space: pre-wrap;"></p>
                    </div>
                </div>
            </div>

            <!-- COLUMNA DERECHA: Conversación -->
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h6 class="mb-0"><i class="bi bi-chat-dots me-2"></i>Seguimiento</h6>
                        <button class="btn btn-sm btn-outline-primary" onclick="loadTicket()"><i class="bi bi-arrow-clockwise"></i></button>
                    </div>
                    <div class="card-body p-0">
                        <div class="conversation" id="conversation-container">
                            <div class="text-center text-muted py-4"><div class="spinner-border spinner-border-sm"></div> Cargando...</div>
                        </div>
                    </div>

                    <!-- RESPONDER -->
                    <div class="card-footer" id="reply-section">
                        <div class="reply-section" style="border:none;padding:0;margin:0;">
                            <label class="form-label fw-bold small">Responder</label>
                            <textarea class="form-control mb-2" id="reply-text" rows="3" placeholder="Escribe tu respuesta o aclaración aquí..."></textarea>
                            <div class="d-flex justify-content-between align-items-center">
                                <small class="text-muted">Tu respuesta será notificada al equipo de soporte</small>
                                <button class="btn btn-primary" id="btn-reply" onclick="sendReply()">
                                    <i class="bi bi-send me-1"></i>Enviar
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Botón volver -->
        <div class="mt-4 text-center">
            <button class="btn btn-outline-secondary" onclick="history.back()"><i class="bi bi-arrow-left me-1"></i>Volver</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/config.js"></script>
    
    <script>
        let currentUser = null;
        let ticket = null;
        let ticketHistory = [];
        let ticketId = null;

        // ==========================================
        // INICIALIZACIÓN
        // ==========================================
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const session = getStoredSession();
                if (!session || !session.user) {
                    showMessage('Debes iniciar sesión para ver tu ticket', 'danger');
                    setTimeout(() => { window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.pathname + window.location.search); }, 2000);
                    return;
                }
                currentUser = session.user;

                // Obtener ID del ticket desde URL
                const params = new URLSearchParams(window.location.search);
                ticketId = params.get('id');

                if (!ticketId) {
                    showMessage('No se especificó un ticket', 'danger');
                    return;
                }

                await loadTicket();

            } catch (error) {
                console.error('❌ Error:', error);
                showMessage('Error: ' + error.message, 'danger');
            }
        });

        // ==========================================
        // CARGAR TICKET
        // ==========================================
        async function loadTicket() {
            showLoading();
            try {
                const data = await supabaseRequest(
                    '/support_tickets?select=*,' +
                    'users!support_tickets_user_fkey(user_display_name),' +
                    'ticket_categories(category_name,category_icon,category_color,worker_email),' +
                    'ticket_priority_options(priority_label,priority_color),' +
                    'permissions(permission_name,permission_module),' +
                    'assigned:users!support_tickets_assigned_to_fkey(user_display_name)' +
                    '&ticket_id=eq.' + ticketId
                );

                if (!data || data.length === 0) {
                    showMessage('Ticket no encontrado', 'danger');
                    return;
                }

                ticket = data[0];

                // Validar que el usuario sea el dueño
                if (ticket.user_id !== currentUser.user_id) {
                    // Verificar si es super admin
                    const isSuperAdmin = await checkUserIsSuperAdmin(currentUser.user_id);
                    if (!isSuperAdmin) {
                        showMessage('No tienes permiso para ver este ticket', 'danger');
                        document.getElementById('reply-section').classList.add('d-none');
                        return;
                    }
                }

                renderTicketHeader();
                renderTicketDetails();
                await loadHistory();

                // Ocultar reply si está cerrado o resuelto
                if (ticket.ticket_status === 'cerrado') {
                    const replySection = document.getElementById('reply-section');
                    replySection.innerHTML = `
                        <div class="text-center text-muted py-3">
                            <i class="bi bi-lock me-1"></i>Este ticket está <strong>${ticket.ticket_status}</strong>. No se pueden agregar respuestas.
                        </div>`;
                }

            } catch (error) {
                console.error('Error cargando ticket:', error);
                showMessage('Error cargando ticket: ' + error.message, 'danger');
            } finally {
                hideLoading();
            }
        }

        // ==========================================
        // RENDERIZAR ENCABEZADO
        // ==========================================
        function renderTicketHeader() {
            const num = ticket.ticket_number ? `Ticket #${ticket.ticket_number}` : 'Ticket';
            document.getElementById('header-number').textContent = num;
            document.getElementById('header-date').textContent = 'Creado el ' + new Date(ticket.created_at).toLocaleString('es-CO');

            const cat = ticket.ticket_categories;
            const pri = ticket.ticket_priority_options;
            const statusMap = {
                pendiente: { label: 'Pendiente', bg: '#ffc107', color: '#000' },
                en_revision: { label: 'En Revisión', bg: '#0dcaf0', color: '#000' },
                en_desarrollo: { label: 'En Desarrollo', bg: '#6f42c1', color: '#fff' },
                resuelto: { label: 'Resuelto', bg: '#198754', color: '#fff' },
                cerrado: { label: 'Cerrado', bg: '#6c757d', color: '#fff' }
            };
            const st = statusMap[ticket.ticket_status] || { label: ticket.ticket_status, bg: '#6c757d', color: '#fff' };

            let badges = '';
            if (cat) badges += `<span class="category-badge" style="background:${cat.category_color}25;color:white;border:1px solid ${cat.category_color}60;"><i class="bi ${cat.category_icon} me-1"></i>${cat.category_name}</span>`;
            badges += `<span class="status-badge" style="background:${st.bg};color:${st.color};">${st.label}</span>`;
            if (pri) badges += `<span class="priority-badge" style="background:${pri.priority_color}25;color:white;border:1px solid ${pri.priority_color}60;">${pri.priority_label}</span>`;

            document.getElementById('header-badges').innerHTML = badges;
        }

        // ==========================================
        // RENDERIZAR DETALLES
        // ==========================================
        function renderTicketDetails() {
            const details = [
                { label: 'Categoría', value: ticket.ticket_categories?.category_name || '-' },
                { label: 'Prioridad', value: ticket.ticket_priority_options?.priority_label || '-' },
                { label: 'Estado', value: ticket.ticket_status },
                { label: 'Módulo', value: ticket.permissions?.permission_name || 'Sin módulo' },
                { label: 'Página', value: ticket.page_url || '-' },
                { label: 'Asignado a', value: ticket.assigned?.user_display_name || 'Sin asignar' }
            ];

            document.getElementById('ticket-details').innerHTML = details.map(d =>
                `<div class="detail-row d-flex justify-content-between"><span class="detail-label">${d.label}</span><span class="detail-value">${d.value}</span></div>`
            ).join('');

            document.getElementById('ticket-description').textContent = ticket.description;

            if (ticket.screenshot_url) {
                document.getElementById('screenshot-img').src = ticket.screenshot_url;
                document.getElementById('screenshot-card').classList.remove('d-none');
            }
        }

        // ==========================================
        // CARGAR HISTORIAL
        // ==========================================
        async function loadHistory() {
            try {
                ticketHistory = await supabaseRequest(
                    '/ticket_history?select=*,users(user_display_name)&ticket_id=eq.' + ticketId + '&order=created_at.asc'
                ) || [];

                renderConversation();
            } catch (error) {
                console.error('Error cargando historial:', error);
            }
        }

        // ==========================================
        // RENDERIZAR CONVERSACIÓN
        // ==========================================
        function renderConversation() {
            const container = document.getElementById('conversation-container');

            if (ticketHistory.length === 0) {
                container.innerHTML = '<div class="text-center text-muted py-4">Sin actividad registrada aún</div>';
                return;
            }

            const typeLabels = {
                creacion: '🎫 Ticket creado',
                estado: '🔄 Cambio de estado',
                prioridad: '📊 Cambio de prioridad',
                asignacion: '👤 Reasignación',
                avance: null,  // se muestra como mensaje
                respuesta: null // se muestra como mensaje
            };

            container.innerHTML = ticketHistory.map(h => {
                const date = new Date(h.created_at).toLocaleString('es-CO');
                const author = h.users?.user_display_name || 'Sistema';
                const isOwnerMsg = h.change_type === 'respuesta';
                const isTeamMsg = h.change_type === 'avance';

                // Mensajes tipo sistema (estado, prioridad, asignación, creación)
                if (!isOwnerMsg && !isTeamMsg) {
                    let text = typeLabels[h.change_type] || h.change_type;
                    if (h.old_value && h.new_value) text += `: ${h.old_value} → ${h.new_value}`;
                    else if (h.new_value) text += `: ${h.new_value}`;
                    if (h.notes) text += ` — ${h.notes}`;
                    return `<div class="msg msg-system"><div class="msg-bubble msg-bubble-system">${text}<br><span style="font-size:0.7rem;">${author} • ${date}</span></div></div>`;
                }

                // Mensajes tipo chat
                if (isOwnerMsg) {
                    return `<div class="msg msg-right">
                        <div class="msg-author">Tú</div>
                        <div class="msg-bubble msg-bubble-user">${escapeHtml(h.notes || '')}</div>
                        <div class="msg-meta">${date}</div>
                    </div>`;
                }

                // Avance del equipo
                return `<div class="msg msg-left">
                    <div class="msg-author"><i class="bi bi-headset me-1"></i>${author}</div>
                    <div class="msg-bubble msg-bubble-team">${escapeHtml(h.notes || '')}</div>
                    <div class="msg-meta">${date}</div>
                </div>`;

            }).join('');

            // Scroll al final
            container.scrollTop = container.scrollHeight;
        }

        // ==========================================
        // ENVIAR RESPUESTA
        // ==========================================
        async function sendReply() {
            const text = document.getElementById('reply-text').value.trim();
            if (!text) { showMessage('Escribe una respuesta', 'warning'); return; }
            if (text.length < 5) { showMessage('La respuesta debe tener al menos 5 caracteres', 'warning'); return; }

            const btn = document.getElementById('btn-reply');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Enviando...';

            try {
                // Guardar en historial
                await supabaseRequest('/ticket_history', {
                    method: 'POST',
                    body: JSON.stringify({
                        ticket_id: ticketId,
                        changed_by: currentUser.user_id,
                        change_type: 'respuesta',
                        notes: text
                    })
                });

                // Actualizar updated_at del ticket
                await supabaseRequest('/support_tickets?ticket_id=eq.' + ticketId, {
                    method: 'PATCH',
                    body: JSON.stringify({ updated_at: new Date().toISOString() })
                });

                // Notificar al worker de la categoría
                try {
                    const workerEmail = ticket.ticket_categories?.worker_email;
                    if (workerEmail) {
                        const num = ticket.ticket_number ? `#${ticket.ticket_number}` : '';
                        const userName = currentUser.user_display_name || currentUser.user_name || 'Usuario';
                        const subject = `[SchoolNet] Respuesta en Ticket ${num} - ${ticket.ticket_categories?.category_name || ''}`;
                        const html = buildReplyNotificationEmail(num, userName, text);
                        await sendNotification(workerEmail, subject, html, true);
                    }
                } catch (e) { console.warn('⚠️ Error notificando:', e); }

                // Notificar al asignado si es diferente al worker
                try {
                    if (ticket.assigned_to) {
                        const assignedData = await supabaseRequest('/users?select=user_mail&user_id=eq.' + ticket.assigned_to);
                        if (assignedData?.length > 0) {
                            const assignedEmail = assignedData[0].user_mail;
                            const workerEmail = ticket.ticket_categories?.worker_email;
                            if (assignedEmail !== workerEmail) {
                                const num = ticket.ticket_number ? `#${ticket.ticket_number}` : '';
                                const userName = currentUser.user_display_name || currentUser.user_name || 'Usuario';
                                const subject = `[SchoolNet] Respuesta en Ticket ${num}`;
                                const html = buildReplyNotificationEmail(num, userName, text);
                                await sendNotification(assignedEmail, subject, html, true);
                            }
                        }
                    }
                } catch (e) { console.warn('⚠️ Error notificando al asignado:', e); }

                // Limpiar y recargar
                document.getElementById('reply-text').value = '';
                await loadHistory();
                showMessage('Respuesta enviada', 'success');

            } catch (error) {
                console.error('Error enviando respuesta:', error);
                showMessage('Error: ' + error.message, 'danger');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-send me-1"></i>Enviar';
            }
        }

        // ==========================================
        // EMAIL DE RESPUESTA
        // ==========================================
        function buildReplyNotificationEmail(ticketNum, userName, replyText) {
            return `<div style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;">
                <div style="background:#1B365D;color:white;padding:20px;text-align:center;">
                    <h2 style="margin:0;">💬 Nueva respuesta en Ticket ${ticketNum}</h2>
                </div>
                <div style="padding:20px;background:#f8f9fa;">
                    <div style="background:white;padding:20px;border-radius:8px;margin-bottom:15px;">
                        <p><strong>${userName}</strong> respondió en el ticket:</p>
                        <div style="background:#e3f2fd;padding:15px;border-radius:8px;border-left:4px solid #0d6efd;margin:15px 0;">
                            <p style="margin:0;white-space:pre-wrap;">${escapeHtml(replyText)}</p>
                        </div>
                        <p style="margin-bottom:0;">Descripción original: <em>${ticket.description.substring(0, 100)}${ticket.description.length > 100 ? '...' : ''}</em></p>
                    </div>
                    <div style="background:#fff3cd;padding:15px;border-radius:8px;border-left:4px solid #ffc107;">
                        <p style="margin:0;"><strong>Acción requerida:</strong> Revisa la respuesta y actualiza el ticket en SchoolNet.</p>
                    </div>
                </div>
                <div style="background:#e9ecef;padding:15px;text-align:center;font-size:12px;color:#6c757d;">
                    Mensaje automático - SchoolNet - Colegio Tilata
                </div>
            </div>`;
        }

        // ==========================================
        // UTILIDADES
        // ==========================================
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showLoading() { document.getElementById('loading-overlay').classList.remove('hidden'); }
        function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }

        // checkUserIsSuperAdmin ya viene de config.js
    </script>
</body>
</html>
