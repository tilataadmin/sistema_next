<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="page-version" content="26.04.24.00.03">

    <title>Aviso de privacidad - Egresados Tilatá</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
        }

        .privacy-container {
            max-width: 820px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .privacy-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .privacy-header {
            background-color: #5E4B8B;
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .privacy-header .header-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .privacy-header h1 {
            font-size: 1.5rem;
            margin: 0;
        }

        .privacy-header .subtitle {
            opacity: 0.9;
            font-size: 0.95rem;
            margin-top: 0.25rem;
        }

        .privacy-body {
            padding: 2.5rem;
            line-height: 1.7;
        }

        .privacy-body h2 {
            color: #5E4B8B;
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 2rem;
            margin-bottom: 0.75rem;
        }

        .privacy-body h2:first-child {
            margin-top: 0;
        }

        .privacy-body p, .privacy-body ul {
            color: #495057;
            font-size: 0.95rem;
        }

        .privacy-body ul {
            padding-left: 1.5rem;
        }

        .privacy-body ul li {
            margin-bottom: 0.35rem;
        }

        .contact-box {
            background-color: #f8f9fa;
            border-left: 4px solid #5E4B8B;
            padding: 1rem 1.25rem;
            margin: 1.5rem 0;
            border-radius: 4px;
        }

        .contact-box strong {
            color: #5E4B8B;
        }

        .last-updated {
            text-align: center;
            color: #6c757d;
            font-size: 0.85rem;
            padding: 1rem;
            border-top: 1px solid #dee2e6;
            background-color: #f8f9fa;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: #5E4B8B;
            text-decoration: none;
            font-weight: 500;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .placeholder-notice {
            background-color: #fff3cd;
            border: 1px solid #ffecb5;
            color: #664d03;
            padding: 1rem 1.25rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .placeholder-notice strong {
            color: #664d03;
        }

        @media (max-width: 576px) {
            .privacy-body {
                padding: 1.5rem;
            }
            .privacy-header {
                padding: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="privacy-container">
        <div class="card privacy-card">

            <!-- HEADER -->
            <div class="privacy-header">
                <i class="bi bi-shield-lock header-icon"></i>
                <h1>Aviso de privacidad</h1>
                <div class="subtitle">Tratamiento de datos personales · Egresados Tilatá</div>
            </div>

            <!-- BODY -->
            <div class="privacy-body" id="privacyContent">
                <!-- Contenido cargado dinámicamente. Placeholder por defecto si no hay config en BD. -->
                <div class="text-center py-4">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Cargando...</span>
                    </div>
                </div>
            </div>

            <div class="last-updated" id="lastUpdated">
                Última actualización: —
            </div>
        </div>

        <div class="back-link">
            <a href="javascript:window.close();">
                <i class="bi bi-x-circle me-1"></i>Cerrar esta ventana
            </a>
            &nbsp;·&nbsp;
            <a href="identificacion.html">
                <i class="bi bi-arrow-left me-1"></i>Volver al inicio
            </a>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="../../../assets/js/config.js"></script>

    <script>
        // ==========================================
        // CARGA DEL CONTENIDO DEL AVISO
        // ==========================================
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                // Intentar cargar desde system_config (llave flexible)
                // Si no existe, usamos el contenido placeholder.
                const content = await loadPrivacyContent();
                renderContent(content);
            } catch (error) {
                console.error('Error cargando aviso:', error);
                renderContent(getPlaceholderContent());
            }
        });

        async function loadPrivacyContent() {
            try {
                // Intento de cargar desde una configuración de sistema opcional
                const result = await supabaseRequest(
                    '/system_config?select=alumni_privacy_notice,alumni_privacy_notice_updated_at&limit=1'
                );

                if (result && result.length > 0 && result[0].alumni_privacy_notice) {
                    return {
                        html: result[0].alumni_privacy_notice,
                        updatedAt: result[0].alumni_privacy_notice_updated_at,
                        isPlaceholder: false
                    };
                }
            } catch (error) {
                // La columna puede no existir aún. Usamos placeholder sin error visible.
                console.log('Campo alumni_privacy_notice no disponible; usando placeholder.');
            }

            return getPlaceholderContent();
        }

        function getPlaceholderContent() {
            return {
                html: `
                    <div class="placeholder-notice">
                        <i class="bi bi-exclamation-triangle me-1"></i>
                        <strong>Versión preliminar:</strong> este texto es un modelo base pendiente de revisión por el área jurídica del colegio.
                        El contenido final deberá ser aprobado antes del lanzamiento del módulo a egresados.
                    </div>

                    <h2>1. Responsable del tratamiento</h2>
                    <p>
                        El <strong>Colegio Tilatá</strong>, ubicado en Bogotá, Colombia, es responsable del tratamiento
                        de los datos personales de sus egresados. En adelante, "el Colegio" o "la institución".
                    </p>

                    <h2>2. Finalidad del tratamiento</h2>
                    <p>Los datos personales de los egresados son tratados con las siguientes finalidades:</p>
                    <ul>
                        <li>Mantener una base de datos actualizada de exalumnos.</li>
                        <li>Facilitar el contacto institucional para actividades de comunidad de egresados.</li>
                        <li>Promover eventos, encuentros y actividades de networking entre la comunidad Tilatá.</li>
                        <li>Registrar trayectorias profesionales con fines estadísticos y de reconocimiento.</li>
                        <li>Habilitar mecanismos de mentoría y participación voluntaria.</li>
                        <li>Mantener contacto para procesos futuros de admisión de hijos de egresados, si los hubiere.</li>
                    </ul>

                    <h2>3. Datos que se recolectan</h2>
                    <p>El módulo de egresados gestiona las siguientes categorías de datos:</p>
                    <ul>
                        <li><strong>Datos de identidad:</strong> nombres, apellidos, documento de identidad, fecha de nacimiento, género.</li>
                        <li><strong>Datos académicos:</strong> año de promoción.</li>
                        <li><strong>Datos de contacto:</strong> correo electrónico, teléfono, ciudad y país de residencia.</li>
                        <li><strong>Datos profesionales (opcionales):</strong> profesión, ocupación, empresa, cargo, perfil en redes profesionales.</li>
                        <li><strong>Datos personales (opcionales):</strong> estado civil, número de hijos, aficiones, áreas de interés.</li>
                    </ul>

                    <h2>4. Base legal del tratamiento</h2>
                    <p>
                        El tratamiento de datos se realiza con fundamento en el <strong>consentimiento expreso del titular</strong>,
                        conforme a lo dispuesto en la Ley Estatutaria 1581 de 2012 y sus decretos reglamentarios.
                        Los egresados pueden autorizar o revocar su consentimiento en cualquier momento.
                    </p>

                    <h2>5. Niveles de consentimiento</h2>
                    <p>El sistema gestiona tres niveles de autorización independientes:</p>
                    <ul>
                        <li>
                            <strong>Tratamiento de datos:</strong> autorización básica para que el Colegio procese sus datos
                            dentro del sistema. Sin esta autorización, no se realizará ninguna comunicación ni inclusión
                            en actividades.
                        </li>
                        <li>
                            <strong>Directorio básico:</strong> permite que otros egresados vean su nombre y año de promoción
                            dentro del directorio interno de la comunidad.
                        </li>
                        <li>
                            <strong>Directorio extendido:</strong> permite que otros egresados vean información adicional
                            de su perfil (ubicación, profesión, intereses) dentro del directorio interno.
                        </li>
                    </ul>
                    <p>Cada nivel puede autorizarse o revocarse de forma independiente.</p>

                    <h2>6. Derechos del titular</h2>
                    <p>Como titular de sus datos personales, usted tiene derecho a:</p>
                    <ul>
                        <li>Conocer, actualizar y rectificar sus datos.</li>
                        <li>Solicitar prueba de la autorización otorgada.</li>
                        <li>Ser informado sobre el uso que se ha dado a sus datos.</li>
                        <li>Presentar quejas ante la Superintendencia de Industria y Comercio por infracciones a la ley.</li>
                        <li>Revocar su autorización y solicitar la supresión de sus datos, cuando no exista obligación legal o contractual de conservarlos.</li>
                        <li>Acceder de forma gratuita a sus datos personales.</li>
                    </ul>

                    <h2>7. Eliminación y conservación</h2>
                    <p>
                        El titular puede solicitar la eliminación de sus datos en cualquier momento desde su perfil.
                        La eliminación es inmediata en cuanto a visibilidad (el registro deja de aparecer en directorios y reportes),
                        pero el registro se conserva físicamente <strong>durante dos años</strong> como medida de trazabilidad legal,
                        tras lo cual se elimina de forma definitiva.
                    </p>

                    <h2>8. Seguridad y confidencialidad</h2>
                    <p>
                        El Colegio adopta medidas técnicas, humanas y administrativas razonables para proteger la información
                        contra pérdida, uso no autorizado, alteración o acceso indebido. El acceso al sistema se realiza
                        mediante enlaces de verificación enviados al correo registrado por el titular.
                    </p>

                    <h2>9. Transferencia y transmisión</h2>
                    <p>
                        El Colegio <strong>no transfiere ni comercializa</strong> los datos personales de sus egresados
                        a terceros. Los datos se tratan exclusivamente dentro del ámbito institucional para las finalidades
                        descritas en este aviso.
                    </p>

                    <h2>10. Canal de atención</h2>
                    <div class="contact-box">
                        <p class="mb-1"><strong>Responsable de tratamiento de datos</strong></p>
                        <p class="mb-1">Colegio Tilatá</p>
                        <p class="mb-1">Correo electrónico: <em>[pendiente de definición institucional]</em></p>
                        <p class="mb-0">Dirección postal: <em>[pendiente de definición institucional]</em></p>
                    </div>

                    <h2>11. Vigencia</h2>
                    <p>
                        Este aviso de privacidad está vigente a partir de la fecha de su publicación y podrá ser modificado
                        en cualquier momento. Los cambios sustanciales serán informados a los titulares a través del correo
                        electrónico registrado o al momento del siguiente acceso al sistema.
                    </p>
                `,
                updatedAt: null,
                isPlaceholder: true
            };
        }

        function renderContent(content) {
            document.getElementById('privacyContent').innerHTML = content.html;

            const lastUpdated = document.getElementById('lastUpdated');
            if (content.isPlaceholder) {
                lastUpdated.textContent = 'Texto preliminar · Pendiente de aprobación por área jurídica';
            } else if (content.updatedAt) {
                const d = new Date(content.updatedAt);
                lastUpdated.textContent = 'Última actualización: ' + d.toLocaleDateString('es-CO', {
                    year: 'numeric', month: 'long', day: 'numeric'
                });
            } else {
                lastUpdated.textContent = 'Última actualización: —';
            }
        }

        console.log('📄 Aviso de privacidad cargado');
    </script>
</body>
</html>
