<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="page-version" content="26.04.24.00.04">

    <title>Ingreso - Egresados Tilatá</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .ident-container {
            max-width: 560px;
            width: 100%;
        }

        .ident-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .ident-header {
            background-color: #5E4B8B;
            color: white;
            padding: 2rem 2rem 1.5rem;
            text-align: center;
        }

        .ident-header i {
            font-size: 3rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .ident-header h1 {
            font-size: 1.5rem;
            margin: 0 0 0.25rem;
        }

        .ident-header .subtitle {
            opacity: 0.9;
            font-size: 0.95rem;
        }

        .ident-body {
            padding: 2rem;
        }

        .welcome-text {
            color: #495057;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .form-label {
            font-weight: 500;
            color: #343a40;
            font-size: 0.9rem;
        }

        .form-label .required {
            color: #dc3545;
        }

        .form-control-lg {
            font-size: 1rem;
        }

        .divider-or {
            display: flex;
            align-items: center;
            text-align: center;
            color: #6c757d;
            font-size: 0.85rem;
            margin: 1rem 0;
        }

        .divider-or::before,
        .divider-or::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #dee2e6;
        }

        .divider-or::before { margin-right: 0.75rem; }
        .divider-or::after { margin-left: 0.75rem; }

        .privacy-box {
            background-color: #f3f0f8;
            border-left: 4px solid #5E4B8B;
            padding: 0.75rem 1rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .recaptcha-wrapper {
            display: flex;
            justify-content: center;
            margin: 1rem 0;
        }

        .ident-footer {
            background-color: #f8f9fa;
            padding: 1rem 2rem;
            text-align: center;
            border-top: 1px solid #dee2e6;
            font-size: 0.85rem;
            color: #6c757d;
        }

        .ident-footer a {
            color: #5E4B8B;
            text-decoration: none;
        }

        .ident-footer a:hover {
            text-decoration: underline;
        }

        .loading-inline {
            display: none;
        }

        .loading-inline.active {
            display: inline-block;
        }

        #alertContainer {
            margin-bottom: 1rem;
        }

        .help-text {
            font-size: 0.8rem;
            color: #6c757d;
            margin-top: 0.25rem;
        }
    </style>
</head>

<body>
    <div class="ident-container">
        <div class="card ident-card">

            <!-- HEADER -->
            <div class="ident-header">
                <i class="bi bi-mortarboard-fill"></i>
                <h1>Directorio de egresados</h1>
                <div class="subtitle">Colegio Tilatá</div>
            </div>

            <!-- BODY -->
            <div class="ident-body">

                <div id="alertContainer"></div>

                <p class="welcome-text">
                    Bienvenido. Para acceder, identifícate con tu documento y
                    <strong>al menos uno</strong> de los otros dos datos.
                </p>

                <form id="identForm">
                    <!-- Documento -->
                    <div class="mb-3">
                        <label for="documento" class="form-label">
                            Documento de identidad <span class="required">*</span>
                        </label>
                        <input type="text" class="form-control form-control-lg" id="documento"
                               required autocomplete="off" maxlength="20"
                               placeholder="Solo números y letras, sin espacios">
                    </div>

                    <!-- Fecha de nacimiento -->
                    <div class="mb-2">
                        <label for="fechaNacimiento" class="form-label">
                            Fecha de nacimiento
                        </label>
                        <input type="date" class="form-control form-control-lg" id="fechaNacimiento"
                               autocomplete="off">
                    </div>

                    <div class="divider-or">o, si no la recuerdas</div>

                    <!-- Año de promoción -->
                    <div class="mb-3">
                        <label for="anioPromocion" class="form-label">
                            Año de graduación
                        </label>
                        <input type="number" class="form-control form-control-lg" id="anioPromocion"
                               autocomplete="off" min="1996" max="2100"
                               placeholder="Año en que te graduaste">
                    </div>

                    <!-- Aceptar aviso de privacidad -->
                    <div class="privacy-box mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="acceptPrivacy">
                            <label class="form-check-label" for="acceptPrivacy">
                                He leído y acepto el
                                <a href="aviso-privacidad.html" target="_blank">aviso de privacidad</a>
                                y autorizo el tratamiento de mis datos para los fines descritos.
                            </label>
                        </div>
                    </div>

                    <!-- reCAPTCHA -->
                    <div class="recaptcha-wrapper">
                        <div class="g-recaptcha" data-sitekey="6Lc8o60sAAAAAC5NUtQG4tLULz2pJ0gGKd5jG1ra"
                             id="recaptchaWidget"></div>
                    </div>

                    <!-- Botón -->
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg" id="btnSubmit">
                            <span class="loading-inline">
                                <span class="spinner-border spinner-border-sm me-2"></span>
                            </span>
                            <i class="bi bi-arrow-right-circle me-1 btn-icon"></i>
                            <span class="btn-text">Continuar</span>
                        </button>
                    </div>
                </form>

            </div>

            <!-- FOOTER -->
            <div class="ident-footer">
                ¿Problemas para ingresar? <a href="mailto:egresados@colegiotilata.edu.co">Escríbenos</a>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="../../../assets/js/config.js"></script>

    <script>
        // ==========================================
        // INICIALIZACIÓN
        // ==========================================
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('identForm').addEventListener('submit', handleSubmit);

            // Normalizar documento: quitar espacios y forzar alfanumérico
            document.getElementById('documento').addEventListener('input', function(e) {
                e.target.value = e.target.value.replace(/[^a-zA-Z0-9]/g, '');
            });
        });

        // ==========================================
        // SUBMIT
        // ==========================================
        async function handleSubmit(e) {
            e.preventDefault();

            const documento = document.getElementById('documento').value.trim();
            const fechaNacimiento = document.getElementById('fechaNacimiento').value;
            const anioPromocion = document.getElementById('anioPromocion').value;
            const acceptPrivacy = document.getElementById('acceptPrivacy').checked;

            // Validaciones básicas
            if (!documento) {
                showAlert('Ingresa tu documento de identidad.', 'warning');
                return;
            }

            if (!/^[a-zA-Z0-9]{5,20}$/.test(documento)) {
                showAlert('El documento debe ser alfanumérico de 5 a 20 caracteres, sin espacios.', 'warning');
                return;
            }

            if (!fechaNacimiento && !anioPromocion) {
                showAlert('Ingresa tu fecha de nacimiento o el año de graduación (al menos uno).', 'warning');
                return;
            }

            if (anioPromocion) {
                const year = parseInt(anioPromocion, 10);
                const currentYear = new Date().getFullYear();
                if (isNaN(year) || year < 1996 || year > currentYear) {
                    showAlert('El año de graduación debe estar entre 1996 y ' + currentYear + '.', 'warning');
                    return;
                }
            }

            if (!acceptPrivacy) {
                showAlert('Debes aceptar el aviso de privacidad para continuar.', 'warning');
                return;
            }

            // reCAPTCHA
            const recaptchaResponse = grecaptcha.getResponse();
            if (!recaptchaResponse) {
                showAlert('Completa la verificación de seguridad.', 'warning');
                return;
            }

            await attemptIdentification(documento, fechaNacimiento, anioPromocion);
        }

        // ==========================================
        // INTENTO DE IDENTIFICACIÓN
        // ==========================================
        async function attemptIdentification(documento, fechaNacimiento, anioPromocion) {
            setSubmitting(true);

            try {
                // Buscar al egresado por documento (case sensitive, como está en BD)
                // La tabla tiene UNIQUE(alumni_id_document), así que máximo 1 resultado
                const results = await supabaseRequest(
                    '/alumni?select=alumni_id,alumni_first_name,alumni_last_name_1,alumni_last_name_2,' +
                    'alumni_birthday,graduation_year,alumni_email,is_verified,pre_loaded,consent_data_treatment&' +
                    'alumni_id_document=eq.' + encodeURIComponent(documento) +
                    '&deleted_at=is.null'
                );

                if (!results || results.length === 0) {
                    genericFailure();
                    return;
                }

                const alumni = results[0];

                // Verificar segundo factor (al menos uno debe coincidir)
                let matched = false;

                if (fechaNacimiento && alumni.alumni_birthday === fechaNacimiento) {
                    matched = true;
                }

                if (!matched && anioPromocion && alumni.graduation_year === parseInt(anioPromocion, 10)) {
                    matched = true;
                }

                if (!matched) {
                    genericFailure();
                    return;
                }

                // Éxito: guardar contexto en sessionStorage y pasar a verificar-email
                const identSession = {
                    alumni_id: alumni.alumni_id,
                    first_name: alumni.alumni_first_name,
                    last_name_1: alumni.alumni_last_name_1,
                    last_name_2: alumni.alumni_last_name_2 || '',
                    graduation_year: alumni.graduation_year,
                    current_email: alumni.alumni_email || '',
                    is_verified: alumni.is_verified,
                    pre_loaded: alumni.pre_loaded,
                    consent_data_treatment: alumni.consent_data_treatment,
                    authenticated_at: new Date().toISOString()
                };

                sessionStorage.setItem('alumni_ident', JSON.stringify(identSession));

                // Navegar a verificar-email
                window.location.href = 'verificar-email.html';

            } catch (error) {
                console.error('Error en identificación:', error);
                showAlert('Ocurrió un error al procesar tu solicitud. Intenta de nuevo.', 'danger');
                grecaptcha.reset();
                setSubmitting(false);
            }
        }

        function genericFailure() {
            // Mensaje deliberadamente genérico para no revelar qué documentos están en BD
            showAlert(
                'No encontramos un registro que coincida con los datos ingresados. ' +
                'Verifica la información o contáctanos al correo del pie de página.',
                'danger'
            );
            grecaptcha.reset();
            setSubmitting(false);
        }

        // ==========================================
        // UI HELPERS
        // ==========================================
        function setSubmitting(submitting) {
            const btn = document.getElementById('btnSubmit');
            const spinner = btn.querySelector('.loading-inline');
            const icon = btn.querySelector('.btn-icon');
            const text = btn.querySelector('.btn-text');

            if (submitting) {
                btn.disabled = true;
                spinner.classList.add('active');
                icon.style.display = 'none';
                text.textContent = 'Verificando...';
            } else {
                btn.disabled = false;
                spinner.classList.remove('active');
                icon.style.display = '';
                text.textContent = 'Continuar';
            }
        }

        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            const id = 'alert_' + Date.now();
            const icons = {
                success: 'check-circle',
                danger: 'x-circle',
                warning: 'exclamation-triangle',
                info: 'info-circle'
            };

            container.innerHTML =
                '<div id="' + id + '" class="alert alert-' + type + ' alert-dismissible fade show" role="alert">' +
                    '<i class="bi bi-' + (icons[type] || 'info-circle') + ' me-2"></i>' +
                    message +
                    '<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>' +
                '</div>';

            container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        console.log('🎓 Identificación de egresados cargada');
    </script>
</body>
</html>
