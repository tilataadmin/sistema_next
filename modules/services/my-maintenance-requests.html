<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="page-version" content="26.03.20.09.00">
    <title>Mis Solicitudes de Mantenimiento - SchoolNet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .loading-overlay.hidden { display: none; }
        .loading-content { background: white; padding: 2rem; border-radius: 8px; text-align: center; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0d9488; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .status-badge { font-size: 0.78rem; padding: 0.3rem 0.6rem; border-radius: 1rem; font-weight: 500; }
        .status-open { background-color: #dbeafe; color: #1e40af; }
        .status-assigned { background-color: #fef3c7; color: #92400e; }
        .status-in_progress { background-color: #fce7f3; color: #9d174d; }
        .status-resolved { background-color: #d1fae5; color: #065f46; }
        .status-closed { background-color: #f3f4f6; color: #374151; }
        .status-reopened { background-color: #fee2e2; color: #991b1b; }

        .request-card { border: 1px solid #e5e7eb; border-radius: 10px; transition: box-shadow 0.2s; cursor: pointer; }
        .request-card:hover { box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .request-number { font-weight: 700; color: #0d9488; }

        .priority-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 0.4rem; vertical-align: middle; }

        .timeline-item { position: relative; padding-left: 2rem; padding-bottom: 1.25rem; border-left: 2px solid #e5e7eb; }
        .timeline-item:last-child { border-left: 2px solid transparent; padding-bottom: 0; }
        .timeline-dot { position: absolute; left: -7px; top: 2px; width: 12px; height: 12px; border-radius: 50%; background: #0d9488; border: 2px solid white; box-shadow: 0 0 0 2px #0d9488; }
        .timeline-date { font-size: 0.75rem; color: #6b7280; }
        .timeline-text { font-size: 0.875rem; color: #374151; }
        .timeline-author { font-size: 0.75rem; color: #9ca3af; }

        .photo-thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; border: 1px solid #dee2e6; cursor: pointer; transition: transform 0.2s; }
        .photo-thumb:hover { transform: scale(1.05); }

        .empty-state { text-align: center; padding: 3rem 1rem; color: #6c757d; }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; display: block; }

        .filter-bar { background: #f8f9fa; border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; }
    </style>
</head>

<body>
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-content">
            <div class="spinner"></div>
            <p class="mb-0">Cargando solicitudes...</p>
        </div>
    </div>

    <div class="container-fluid">

        <!-- BREADCRUMBS -->
        <nav aria-label="breadcrumb" class="mt-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="../../dashboard.html"><i class="bi bi-house me-1"></i>Dashboard</a></li>
                <li class="breadcrumb-item"><a href="index.html">Servicios y Eventos</a></li>
                <li class="breadcrumb-item active" aria-current="page">Mis Solicitudes de Mantenimiento</li>
            </ol>
        </nav>

        <!-- HEADER -->
        <div class="row mb-4">
            <div class="col">
                <div class="d-flex justify-content-between align-items-start flex-wrap">
                    <div>
                        <h1 class="h3">
                            <i class="bi bi-list-check me-2" style="color: #0d9488;"></i>
                            Mis Solicitudes de Mantenimiento
                        </h1>
                        <p class="text-muted">Consulte el estado y seguimiento de sus solicitudes de reparación locativa.</p>
                    </div>
                    <a href="maintenance-request.html" class="btn" style="background-color: #0d9488; color: white;">
                        <i class="bi bi-plus-circle me-1"></i>Nueva Solicitud
                    </a>
                </div>
            </div>
        </div>

        <div id="alertContainer"></div>

        <!-- FILTROS -->
        <div class="filter-bar">
            <div class="row g-2 align-items-end">
                <div class="col-12 col-md-4">
                    <label class="form-label form-label-sm mb-1">Estado</label>
                    <select class="form-select form-select-sm" id="filtro-estado" onchange="filtrarSolicitudes()">
                        <option value="">Todos los estados</option>
                        <option value="open">Abierto</option>
                        <option value="assigned">Asignado</option>
                        <option value="in_progress">En proceso</option>
                        <option value="resolved">Resuelto</option>
                        <option value="closed">Cerrado</option>
                        <option value="reopened">Reabierto</option>
                    </select>
                </div>
                <div class="col-12 col-md-4">
                    <label class="form-label form-label-sm mb-1">Buscar</label>
                    <input type="text" class="form-control form-control-sm" id="filtro-texto" placeholder="Número, espacio o descripción..." oninput="filtrarSolicitudes()">
                </div>
                <div class="col-12 col-md-4 text-md-end">
                    <span class="text-muted small" id="contador-resultados"></span>
                </div>
            </div>
        </div>

        <!-- LISTADO (vista tarjetas) -->
        <div id="listado-container"></div>

        <!-- DETALLE (oculto inicialmente) -->
        <div id="detalle-container" style="display: none;"></div>

    </div>

    <!-- MODAL IMAGEN AMPLIADA -->
    <div class="modal fade" id="modal-imagen" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center p-0">
                    <img id="imagen-ampliada" src="" class="img-fluid" style="max-height: 80vh;">
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/config.js"></script>

    <script>
        // ==========================================
        // VARIABLES GLOBALES
        // ==========================================
        let currentWorker = null;
        let solicitudes = [];
        let solicitudesFiltradas = [];
        let modalImagen = null;

        const STATUS_LABELS = {
            'open': 'Abierto',
            'assigned': 'Asignado',
            'in_progress': 'En proceso',
            'resolved': 'Resuelto',
            'closed': 'Cerrado',
            'reopened': 'Reabierto'
        };

        // ==========================================
        // INICIALIZACIÓN
        // ==========================================
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const session = getStoredSession();
                if (!session || !session.user) {
                    showMessage('Sesión no válida. Redirigiendo...', 'warning');
                    setTimeout(() => window.location.href = '../../login.html', 1500);
                    return;
                }

                const currentUser = session.user;

                // Obtener email del usuario
                const userData = await supabaseRequest(`/users?select=user_mail&user_id=eq.${currentUser.user_id}`);
                const userEmail = userData && userData.length > 0 ? userData[0].user_mail : null;
                if (!userEmail) {
                    showMessage('No se encontró el correo del usuario.', 'danger');
                    return;
                }

                // Obtener worker por email
                const workers = await supabaseRequest(`/workers?select=worker_id,worker_first_name,worker_last_name_1,email&email=eq.${userEmail}&worker_status=eq.active`);
                if (!workers || workers.length === 0) {
                    showMessage('No se encontró un perfil de trabajador asociado a su cuenta.', 'danger');
                    return;
                }
                currentWorker = workers[0];

                modalImagen = new bootstrap.Modal(document.getElementById('modal-imagen'));

                await cargarSolicitudes();

            } catch (error) {
                console.error('Error en inicialización:', error);
                showMessage('Error al cargar la página: ' + error.message, 'danger');
            }
        });

        // ==========================================
        // CARGA DE SOLICITUDES
        // ==========================================
        async function cargarSolicitudes() {
            try {
                document.getElementById('loading-overlay').classList.remove('hidden');

                const data = await supabaseRequest(`/svc_maintenance_requests?select=*,espacio:svc_maintenance_spaces(space_name),prioridad:svc_maintenance_priorities(priority_name,priority_color),asignado:workers!svc_maintenance_requests_assigned_to_fkey(worker_first_name,worker_last_name_1)&requested_by=eq.${currentWorker.worker_id}&order=created_at.desc`);

                solicitudes = data || [];
                filtrarSolicitudes();

                document.getElementById('loading-overlay').classList.add('hidden');
            } catch (e) {
                console.error('Error cargando solicitudes:', e);
                showMessage('Error al cargar solicitudes: ' + e.message, 'danger');
                document.getElementById('loading-overlay').classList.add('hidden');
            }
        }

        // ==========================================
        // FILTROS
        // ==========================================
        function filtrarSolicitudes() {
            const estado = document.getElementById('filtro-estado').value;
            const texto = document.getElementById('filtro-texto').value.toLowerCase().trim();

            solicitudesFiltradas = solicitudes.filter(s => {
                if (estado && s.request_status !== estado) return false;
                if (texto) {
                    const num = `#${s.request_number}`;
                    const espacio = (s.espacio?.space_name || '').toLowerCase();
                    const detalle = (s.space_detail || '').toLowerCase();
                    const desc = (s.description || '').toLowerCase();
                    if (!num.includes(texto) && !espacio.includes(texto) && !detalle.includes(texto) && !desc.includes(texto)) return false;
                }
                return true;
            });

            document.getElementById('contador-resultados').textContent = `${solicitudesFiltradas.length} de ${solicitudes.length} solicitudes`;
            renderListado();
        }

        // ==========================================
        // RENDERIZADO DEL LISTADO
        // ==========================================
        function renderListado() {
            const container = document.getElementById('listado-container');
            document.getElementById('detalle-container').style.display = 'none';
            container.style.display = 'block';

            if (solicitudesFiltradas.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-inbox"></i>
                        <h5>No hay solicitudes</h5>
                        <p>No se encontraron solicitudes con los filtros seleccionados.</p>
                        <a href="maintenance-request.html" class="btn btn-sm" style="background-color: #0d9488; color: white;">
                            <i class="bi bi-plus-circle me-1"></i>Crear solicitud
                        </a>
                    </div>
                `;
                return;
            }

            container.innerHTML = solicitudesFiltradas.map(s => {
                const espacio = s.espacio?.space_name || '—';
                const prioridad = s.prioridad;
                const asignado = s.asignado ? `${s.asignado.worker_first_name} ${s.asignado.worker_last_name_1}` : null;
                const fecha = new Date(s.created_at).toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric' });

                return `
                <div class="request-card p-3 mb-3" onclick="verDetalle('${s.request_id}')">
                    <div class="row align-items-center">
                        <div class="col-auto">
                            <span class="request-number">#${s.request_number}</span>
                        </div>
                        <div class="col">
                            <div class="fw-semibold">${espacio} / ${s.space_detail}</div>
                            <div class="text-muted small text-truncate" style="max-width: 500px;">${s.description}</div>
                        </div>
                        <div class="col-auto text-center">
                            ${prioridad ? `<span class="priority-dot" style="background-color: ${prioridad.priority_color};"></span><small>${prioridad.priority_name}</small>` : ''}
                        </div>
                        <div class="col-auto text-center">
                            <span class="status-badge status-${s.request_status}">${STATUS_LABELS[s.request_status] || s.request_status}</span>
                        </div>
                        <div class="col-auto text-end">
                            <small class="text-muted">${fecha}</small>
                            ${asignado ? `<br><small class="text-muted"><i class="bi bi-person me-1"></i>${asignado}</small>` : ''}
                        </div>
                        <div class="col-auto">
                            <i class="bi bi-chevron-right text-muted"></i>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // ==========================================
        // VISTA DE DETALLE
        // ==========================================
        async function verDetalle(requestId) {
            const s = solicitudes.find(x => x.request_id === requestId);
            if (!s) return;

            document.getElementById('listado-container').style.display = 'none';
            const container = document.getElementById('detalle-container');
            container.style.display = 'block';

            const espacio = s.espacio?.space_name || '—';
            const prioridad = s.prioridad;
            const asignado = s.asignado ? `${s.asignado.worker_first_name} ${s.asignado.worker_last_name_1}` : 'Sin asignar';
            const fecha = new Date(s.created_at).toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            const fechaEsperada = s.expected_date ? new Date(s.expected_date + 'T12:00:00').toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric' }) : 'No definida';

            // Cargar fotos e historial en paralelo
            const [fotos, historial] = await Promise.all([
                supabaseRequest(`/svc_maintenance_photos?select=*&request_id=eq.${requestId}&order=created_at.asc`).catch(() => []),
                supabaseRequest(`/svc_maintenance_history?select=*,autor:workers!svc_maintenance_history_changed_by_fkey(worker_first_name,worker_last_name_1)&request_id=eq.${requestId}&order=created_at.asc`).catch(() => [])
            ]);

            let fotosHtml = '';
            if (fotos && fotos.length > 0) {
                fotosHtml = `
                    <div class="mb-4">
                        <h6 class="text-secondary mb-2"><i class="bi bi-camera me-1"></i>Fotos adjuntas</h6>
                        <div class="d-flex flex-wrap gap-2">
                            ${fotos.map(f => `<img src="${f.public_url}" alt="${f.file_name}" class="photo-thumb" onclick="ampliarImagen('${f.public_url}')">`).join('')}
                        </div>
                    </div>
                `;
            }

            let timelineHtml = '';
            if (historial && historial.length > 0) {
                timelineHtml = historial.map(h => {
                    const hFecha = new Date(h.created_at).toLocaleDateString('es-CO', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
                    const autor = h.autor ? `${h.autor.worker_first_name} ${h.autor.worker_last_name_1}` : '—';
                    let texto = '';

                    let fotoHtml = '';
                    switch (h.change_type) {
                        case 'creation': texto = 'Solicitud creada'; break;
                        case 'status': texto = `Estado cambiado a <strong>${STATUS_LABELS[h.new_value] || h.new_value}</strong>`; break;
                        case 'priority': texto = 'Prioridad actualizada'; break;
                        case 'assignment': texto = `Asignado a <strong>${h.new_value || '—'}</strong>`; break;
                        case 'progress':
                            texto = h.notes || 'Avance registrado';
                            if (h.new_value && h.new_value.startsWith('http')) {
                                fotoHtml = `<div class="mt-1"><img src="${h.new_value}" class="photo-thumb" onclick="ampliarImagen('${h.new_value}')" alt="Foto de avance"></div>`;
                            }
                            break;
                        case 'expected_date': texto = `Fecha esperada: <strong>${h.new_value || '—'}</strong>`; break;
                        default: texto = h.notes || h.change_type;
                    }

                    return `
                        <div class="timeline-item">
                            <div class="timeline-dot"></div>
                            <div class="timeline-date">${hFecha}</div>
                            <div class="timeline-text">${texto}${fotoHtml}</div>
                            <div class="timeline-author">${autor}</div>
                        </div>
                    `;
                }).join('');
            } else {
                timelineHtml = '<div class="text-muted small">Sin registros de seguimiento.</div>';
            }

            container.innerHTML = `
                <div class="mb-3">
                    <button class="btn btn-outline-secondary btn-sm" onclick="volverAlListado()">
                        <i class="bi bi-arrow-left me-1"></i>Volver al listado
                    </button>
                </div>

                <div class="card mb-4">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><span class="request-number">#${s.request_number}</span> — ${espacio} / ${s.space_detail}</h5>
                        <span class="status-badge status-${s.request_status}">${STATUS_LABELS[s.request_status] || s.request_status}</span>
                    </div>
                    <div class="card-body">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <small class="text-muted d-block">Prioridad</small>
                                ${prioridad ? `<span class="priority-dot" style="background-color: ${prioridad.priority_color};"></span>${prioridad.priority_name}` : '—'}
                            </div>
                            <div class="col-md-6">
                                <small class="text-muted d-block">Asignado a</small>
                                ${asignado}
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <small class="text-muted d-block">Fecha de solicitud</small>
                                ${fecha}
                            </div>
                            <div class="col-md-6">
                                <small class="text-muted d-block">Fecha esperada de resolución</small>
                                ${fechaEsperada}
                            </div>
                        </div>
                        <div class="mb-3">
                            <small class="text-muted d-block">Descripción del problema</small>
                            <p class="mb-0" style="white-space: pre-line;">${s.description}</p>
                        </div>

                        ${fotosHtml}
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h6 class="mb-0"><i class="bi bi-clock-history me-2"></i>Seguimiento</h6>
                    </div>
                    <div class="card-body">
                        ${timelineHtml}
                    </div>
                </div>
            `;

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function volverAlListado() {
            document.getElementById('detalle-container').style.display = 'none';
            document.getElementById('listado-container').style.display = 'block';
        }

        function ampliarImagen(url) {
            document.getElementById('imagen-ampliada').src = url;
            modalImagen.show();
        }

        console.log('Mis solicitudes de mantenimiento cargada');
    </script>
</body>
</html>
