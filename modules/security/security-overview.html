<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="page-version" content="26.04.08.19.00">
    <title>Consulta de Seguridad - SchoolNet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .loading-overlay { position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;justify-content:center;align-items:center;z-index:9999; }
        .loading-overlay.hidden { display:none; }
        .loading-content { background:white;padding:2rem;border-radius:8px;text-align:center; }
        .spinner { border:3px solid #f3f3f3;border-top:3px solid #dc3545;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:0 auto 1rem; }
        @keyframes spin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }

        .nav-tabs .nav-link { color: #495057; font-weight: 500; }
        .nav-tabs .nav-link.active { color: #dc3545; border-bottom: 2px solid #dc3545; font-weight: 600; }

        .module-group { margin-bottom: 1.5rem; }
        .module-group-header {
            background: #f8f9fa; padding: 0.75rem 1rem; border-radius: 8px;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #e9ecef; margin-bottom: 0.5rem;
        }
        .module-group-header:hover { background: #e9ecef; }
        .module-group-header h6 { margin: 0; font-weight: 600; color: #495057; }

        .permission-row {
            padding: 0.6rem 1rem; border-bottom: 1px solid #f1f5f9;
            display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem;
        }
        .permission-row:last-child { border-bottom: none; }
        .permission-name { font-weight: 500; font-size: 0.9rem; }
        .permission-users { display: flex; flex-wrap: wrap; gap: 0.25rem; }

        .user-chip {
            background: #e9ecef; color: #495057; padding: 0.15rem 0.5rem;
            border-radius: 1rem; font-size: 0.75rem; white-space: nowrap;
        }

        .role-card-overview {
            border: 1px solid #e9ecef; border-radius: 10px; padding: 1rem;
            margin-bottom: 1rem; transition: all 0.2s;
        }
        .role-card-overview:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .role-title { font-weight: 600; font-size: 1rem; color: #2c3e50; }

        .person-card {
            border: 1px solid #e9ecef; border-radius: 10px; padding: 1rem;
            margin-bottom: 0.75rem;
        }
        .person-name { font-weight: 600; font-size: 0.95rem; }
        .person-email { font-size: 0.8rem; color: #6c757d; }

        .search-bar { margin-bottom: 1rem; }

        .badge-count { font-size: 0.7rem; padding: 0.2rem 0.5rem; }

        .empty-state { text-align: center; padding: 3rem; color: #6c757d; }
        .empty-state i { font-size: 3rem; display: block; margin-bottom: 1rem; }

        .collapsed-content { display: none; }
        .module-group.expanded .collapsed-content { display: block; }
        .module-toggle { transition: transform 0.2s; }
        .module-group.expanded .module-toggle { transform: rotate(180deg); }
    </style>
</head>

<body>
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-content"><div class="spinner"></div><p class="mb-0">Cargando datos de seguridad...</p></div>
    </div>

    <div class="container-fluid">
        <nav aria-label="breadcrumb" class="mt-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="../../dashboard.html"><i class="bi bi-house me-1"></i>Dashboard</a></li>
                <li class="breadcrumb-item"><a href="index.html">Seguridad</a></li>
                <li class="breadcrumb-item active" aria-current="page">Consulta de Seguridad</li>
            </ol>
        </nav>

        <div class="row mb-3">
            <div class="col">
                <h1 class="h3">
                    <i class="bi bi-binoculars me-2" style="color: #dc3545;"></i>Consulta de Seguridad
                </h1>
                <p class="text-muted mb-0">Vista consolidada de permisos, roles y usuarios del sistema</p>
            </div>
        </div>

        <div id="alertContainer"></div>

        <!-- TABS -->
        <ul class="nav nav-tabs mb-3" id="overviewTabs">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-permisos">
                    <i class="bi bi-key me-1"></i>Permisos <span class="badge bg-secondary badge-count ms-1" id="tab-count-permisos">0</span>
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-roles">
                    <i class="bi bi-award me-1"></i>Roles <span class="badge bg-secondary badge-count ms-1" id="tab-count-roles">0</span>
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-personas">
                    <i class="bi bi-people me-1"></i>Personas <span class="badge bg-secondary badge-count ms-1" id="tab-count-personas">0</span>
                </button>
            </li>
        </ul>

        <div class="tab-content">
            <!-- TAB 1: PERMISOS -->
            <div class="tab-pane fade show active" id="tab-permisos">
                <div class="search-bar">
                    <input type="text" class="form-control" id="search-permisos" placeholder="Buscar permiso..." oninput="renderTabPermisos()">
                </div>
                <div id="container-permisos">
                    <div class="text-center py-4"><div class="spinner-border spinner-border-sm text-primary"></div> Cargando...</div>
                </div>
            </div>

            <!-- TAB 2: ROLES -->
            <div class="tab-pane fade" id="tab-roles">
                <div class="search-bar">
                    <input type="text" class="form-control" id="search-roles" placeholder="Buscar rol..." oninput="renderTabRoles()">
                </div>
                <div id="container-roles">
                    <div class="text-center py-4"><div class="spinner-border spinner-border-sm text-primary"></div> Cargando...</div>
                </div>
            </div>

            <!-- TAB 3: PERSONAS -->
            <div class="tab-pane fade" id="tab-personas">
                <div class="search-bar">
                    <input type="text" class="form-control" id="search-personas" placeholder="Buscar persona..." oninput="renderTabPersonas()">
                </div>
                <div id="container-personas">
                    <div class="text-center py-4"><div class="spinner-border spinner-border-sm text-primary"></div> Cargando...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/config.js"></script>

    <script>
        // ==========================================
        // VARIABLES GLOBALES
        // ==========================================
        let allPermissions = [];
        let allRoles = [];
        let allUsers = [];
        let allUserRoles = [];
        let allRolePermissions = [];

        // Estructuras procesadas
        let permissionsByModule = {};
        let roleDetails = {};
        let personDetails = {};

        // ==========================================
        // INICIALIZACIÓN
        // ==========================================
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const hasAccess = await validatePageAccess('Consulta de seguridad');
                if (!hasAccess) return;

                await cargarTodosLosDatos();
                procesarDatos();
                renderTabPermisos();
                renderTabRoles();
                renderTabPersonas();

            } catch (error) {
                console.error('❌ Error:', error);
                showMessage('Error al cargar datos: ' + error.message, 'danger');
            }
        });

        // ==========================================
        // CARGA DE DATOS EN PARALELO
        // ==========================================
        async function cargarTodosLosDatos() {
            document.getElementById('loading-overlay').classList.remove('hidden');

            try {
                const [permissions, roles, users, userRoles, rolePermissions] = await Promise.all([
                    supabaseRequest('/permissions?select=permission_id,permission_name,permission_description,permission_module,permission_type&permission_status=eq.active&order=permission_module,permission_name'),
                    supabaseRequest('/roles?select=role_id,role_name,role_description,is_super_admin&role_status=eq.active&order=role_name'),
                    supabaseRequest('/users?select=user_id,user_name,user_display_name,user_mail&user_status=eq.active&order=user_display_name'),
                    supabaseRequest('/user_roles?select=user_id,role_id'),
                    supabaseRequest('/role_permissions?select=role_id,permission_id')
                ]);

                allPermissions = permissions || [];
                allRoles = roles || [];
                allUsers = users || [];
                allUserRoles = userRoles || [];
                allRolePermissions = rolePermissions || [];

                console.log(`✅ Datos cargados: ${allPermissions.length} permisos, ${allRoles.length} roles, ${allUsers.length} usuarios`);
            } finally {
                document.getElementById('loading-overlay').classList.add('hidden');
            }
        }

        // ==========================================
        // PROCESAMIENTO DE DATOS
        // ==========================================
        function procesarDatos() {
            // 1. Permisos agrupados por módulo, con roles y usuarios que los tienen
            permissionsByModule = {};
            allPermissions.forEach(p => {
                if (!permissionsByModule[p.permission_module]) {
                    permissionsByModule[p.permission_module] = [];
                }

                // Roles que tienen este permiso
                const roleIds = allRolePermissions
                    .filter(rp => rp.permission_id === p.permission_id)
                    .map(rp => rp.role_id);

                // Usuarios que tienen esos roles (sin duplicados)
                const userIds = new Set();
                roleIds.forEach(roleId => {
                    allUserRoles
                        .filter(ur => ur.role_id === roleId)
                        .forEach(ur => userIds.add(ur.user_id));
                });

                // Usuarios de roles super admin (tienen todos los permisos)
                allRoles.filter(r => r.is_super_admin).forEach(saRole => {
                    allUserRoles
                        .filter(ur => ur.role_id === saRole.role_id)
                        .forEach(ur => userIds.add(ur.user_id));
                });

                const users = Array.from(userIds).map(uid => allUsers.find(u => u.user_id === uid)).filter(Boolean);
                const roles = roleIds.map(rid => allRoles.find(r => r.role_id === rid)).filter(Boolean);

                permissionsByModule[p.permission_module].push({
                    ...p,
                    roles: roles,
                    users: users.sort((a, b) => (a.user_display_name || '').localeCompare(b.user_display_name || ''))
                });
            });

            // 2. Roles con sus permisos y usuarios
            roleDetails = {};
            allRoles.forEach(role => {
                const permIds = allRolePermissions
                    .filter(rp => rp.role_id === role.role_id)
                    .map(rp => rp.permission_id);

                const perms = permIds.map(pid => allPermissions.find(p => p.permission_id === pid)).filter(Boolean);
                const userIds = allUserRoles.filter(ur => ur.role_id === role.role_id).map(ur => ur.user_id);
                const users = userIds.map(uid => allUsers.find(u => u.user_id === uid)).filter(Boolean);

                roleDetails[role.role_id] = {
                    ...role,
                    permissions: perms.sort((a, b) => a.permission_module.localeCompare(b.permission_module) || a.permission_name.localeCompare(b.permission_name)),
                    users: users.sort((a, b) => (a.user_display_name || '').localeCompare(b.user_display_name || ''))
                };
            });

            // 3. Personas con sus roles y permisos
            personDetails = {};
            allUsers.forEach(user => {
                const roleIds = allUserRoles.filter(ur => ur.user_id === user.user_id).map(ur => ur.role_id);
                const roles = roleIds.map(rid => allRoles.find(r => r.role_id === rid)).filter(Boolean);

                const isSuperAdmin = roles.some(r => r.is_super_admin);

                let perms = [];
                if (isSuperAdmin) {
                    perms = [...allPermissions];
                } else {
                    const permIds = new Set();
                    roleIds.forEach(rid => {
                        allRolePermissions.filter(rp => rp.role_id === rid).forEach(rp => permIds.add(rp.permission_id));
                    });
                    perms = Array.from(permIds).map(pid => allPermissions.find(p => p.permission_id === pid)).filter(Boolean);
                }

                personDetails[user.user_id] = {
                    ...user,
                    roles: roles.sort((a, b) => a.role_name.localeCompare(b.role_name)),
                    permissions: perms.sort((a, b) => a.permission_module.localeCompare(b.permission_module) || a.permission_name.localeCompare(b.permission_name)),
                    isSuperAdmin: isSuperAdmin
                };
            });

            // Actualizar contadores de tabs
            document.getElementById('tab-count-permisos').textContent = allPermissions.length;
            document.getElementById('tab-count-roles').textContent = allRoles.length;
            document.getElementById('tab-count-personas').textContent = allUsers.length;
        }

        // ==========================================
        // TAB 1: PERMISOS POR MÓDULO
        // ==========================================
        function renderTabPermisos() {
            const container = document.getElementById('container-permisos');
            const search = (document.getElementById('search-permisos').value || '').toLowerCase();

            const modules = Object.keys(permissionsByModule).sort();
            if (modules.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="bi bi-key"></i><p>No hay permisos registrados</p></div>';
                return;
            }

            let html = '';
            let totalVisible = 0;

            modules.forEach(mod => {
                const perms = permissionsByModule[mod].filter(p =>
                    !search || p.permission_name.toLowerCase().includes(search) || (p.permission_description || '').toLowerCase().includes(search)
                );

                if (perms.length === 0) return;
                totalVisible += perms.length;

                const moduleName = mod.charAt(0).toUpperCase() + mod.slice(1);

                html += `
                    <div class="module-group" id="mod-perm-${mod}">
                        <div class="module-group-header" onclick="toggleModuleGroup('mod-perm-${mod}')">
                            <h6><i class="bi bi-folder me-2"></i>${escapeHtml(moduleName)}</h6>
                            <div class="d-flex align-items-center gap-2">
                                <span class="badge bg-secondary badge-count">${perms.length} permisos</span>
                                <i class="bi bi-chevron-down module-toggle"></i>
                            </div>
                        </div>
                        <div class="collapsed-content">`;

                perms.forEach(p => {
                    const roleNames = p.roles.map(r => r.role_name);
                    const superAdminRoles = allRoles.filter(r => r.is_super_admin).map(r => r.role_name);
                    const allRoleNames = [...new Set([...roleNames, ...superAdminRoles])].sort();

                    html += `
                            <div class="permission-row">
                                <div style="flex:1;min-width:0;">
                                    <div class="permission-name">${escapeHtml(p.permission_name)}</div>
                                    <small class="text-muted">${escapeHtml(p.permission_description || '')}</small>
                                    <div class="mt-1">
                                        <small class="text-muted">Roles: </small>
                                        ${allRoleNames.map(r => `<span class="user-chip" style="background:#dbeafe;color:#1e40af;">${escapeHtml(r)}</span>`).join(' ')}
                                    </div>
                                </div>
                                <div style="max-width:50%;text-align:right;">
                                    <small class="text-muted d-block mb-1">${p.users.length} usuario${p.users.length !== 1 ? 's' : ''}</small>
                                    <div class="permission-users justify-content-end">
                                        ${p.users.slice(0, 8).map(u => `<span class="user-chip">${escapeHtml(u.user_display_name || u.user_name)}</span>`).join('')}
                                        ${p.users.length > 8 ? `<span class="user-chip" style="background:#dc3545;color:white;">+${p.users.length - 8}</span>` : ''}
                                    </div>
                                </div>
                            </div>`;
                });

                html += `</div></div>`;
            });

            if (totalVisible === 0) {
                html = '<div class="empty-state"><i class="bi bi-search"></i><p>Sin resultados para la búsqueda</p></div>';
            }

            container.innerHTML = html;
        }

        // ==========================================
        // TAB 2: ROLES
        // ==========================================
        function renderTabRoles() {
            const container = document.getElementById('container-roles');
            const search = (document.getElementById('search-roles').value || '').toLowerCase();

            const roles = Object.values(roleDetails).filter(r =>
                !search || r.role_name.toLowerCase().includes(search) || (r.role_description || '').toLowerCase().includes(search)
            );

            if (roles.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="bi bi-award"></i><p>Sin resultados</p></div>';
                return;
            }

            container.innerHTML = roles.map(role => {
                const superBadge = role.is_super_admin ? '<span class="badge bg-danger ms-2">SUPER ADMIN</span>' : '';

                // Agrupar permisos por módulo
                const permsByMod = {};
                role.permissions.forEach(p => {
                    if (!permsByMod[p.permission_module]) permsByMod[p.permission_module] = [];
                    permsByMod[p.permission_module].push(p);
                });

                let permsHtml = '';
                if (role.is_super_admin) {
                    permsHtml = '<small class="text-muted"><i class="bi bi-shield-check me-1"></i>Acceso total — todos los permisos del sistema</small>';
                } else if (role.permissions.length === 0) {
                    permsHtml = '<small class="text-muted"><i class="bi bi-exclamation-triangle me-1"></i>Sin permisos asignados</small>';
                } else {
                    permsHtml = Object.keys(permsByMod).sort().map(mod => {
                        const modName = mod.charAt(0).toUpperCase() + mod.slice(1);
                        const permNames = permsByMod[mod].map(p => escapeHtml(p.permission_name)).join(', ');
                        return `<div class="mb-1"><small><strong>${escapeHtml(modName)}:</strong> ${permNames}</small></div>`;
                    }).join('');
                }

                const usersHtml = role.users.length > 0
                    ? role.users.map(u => `<span class="user-chip">${escapeHtml(u.user_display_name || u.user_name)}</span>`).join(' ')
                    : '<small class="text-muted">Sin usuarios asignados</small>';

                return `
                    <div class="role-card-overview">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div>
                                <span class="role-title">${escapeHtml(role.role_name)}</span>${superBadge}
                                ${role.role_description ? `<div class="text-muted" style="font-size:0.85rem;">${escapeHtml(role.role_description)}</div>` : ''}
                            </div>
                            <div class="text-end">
                                <span class="badge bg-info badge-count">${role.permissions.length} permisos</span>
                                <span class="badge bg-secondary badge-count ms-1">${role.users.length} usuarios</span>
                            </div>
                        </div>
                        <div class="mb-2">${permsHtml}</div>
                        <div>
                            <small class="text-muted d-block mb-1">Usuarios:</small>
                            <div class="d-flex flex-wrap gap-1">${usersHtml}</div>
                        </div>
                    </div>`;
            }).join('');
        }

        // ==========================================
        // TAB 3: PERSONAS
        // ==========================================
        function renderTabPersonas() {
            const container = document.getElementById('container-personas');
            const search = (document.getElementById('search-personas').value || '').toLowerCase();

            const personas = Object.values(personDetails).filter(p =>
                !search ||
                (p.user_display_name || '').toLowerCase().includes(search) ||
                p.user_name.toLowerCase().includes(search) ||
                p.user_mail.toLowerCase().includes(search)
            );

            if (personas.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="bi bi-people"></i><p>Sin resultados</p></div>';
                return;
            }

            container.innerHTML = personas.map(person => {
                const rolesHtml = person.roles.length > 0
                    ? person.roles.map(r => {
                        const cls = r.is_super_admin ? 'background:#dc3545;color:white;' : '';
                        return `<span class="user-chip" style="${cls}">${escapeHtml(r.role_name)}</span>`;
                    }).join(' ')
                    : '<small class="text-muted">Sin roles asignados</small>';

                // Agrupar permisos por módulo
                const permsByMod = {};
                person.permissions.forEach(p => {
                    if (!permsByMod[p.permission_module]) permsByMod[p.permission_module] = [];
                    permsByMod[p.permission_module].push(p);
                });

                let permsHtml = '';
                if (person.isSuperAdmin) {
                    permsHtml = '<small class="text-muted"><i class="bi bi-shield-check me-1"></i>Acceso total — Super Admin</small>';
                } else if (person.permissions.length === 0) {
                    permsHtml = '<small class="text-muted">Sin permisos</small>';
                } else {
                    permsHtml = Object.keys(permsByMod).sort().map(mod => {
                        const modName = mod.charAt(0).toUpperCase() + mod.slice(1);
                        const permNames = permsByMod[mod].map(p => escapeHtml(p.permission_name)).join(', ');
                        return `<div class="mb-1"><small><strong>${escapeHtml(modName)}:</strong> ${permNames}</small></div>`;
                    }).join('');
                }

                return `
                    <div class="person-card">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div>
                                <div class="person-name">${escapeHtml(person.user_display_name || person.user_name)}</div>
                                <div class="person-email">${escapeHtml(person.user_mail)}</div>
                            </div>
                            <div class="text-end">
                                <span class="badge bg-info badge-count">${person.roles.length} roles</span>
                                <span class="badge bg-secondary badge-count ms-1">${person.permissions.length} permisos</span>
                            </div>
                        </div>
                        <div class="mb-2">
                            <small class="text-muted d-block mb-1">Roles:</small>
                            <div class="d-flex flex-wrap gap-1">${rolesHtml}</div>
                        </div>
                        <div>
                            <small class="text-muted d-block mb-1">Permisos:</small>
                            ${permsHtml}
                        </div>
                    </div>`;
            }).join('');
        }

        // ==========================================
        // UTILIDADES
        // ==========================================
        function toggleModuleGroup(id) {
            document.getElementById(id).classList.toggle('expanded');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        console.log('✅ Consulta de Seguridad cargada');
    </script>
</body>
</html>
