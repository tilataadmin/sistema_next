<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="page-version" content="26.03.12.10.55">
    <title>Categorías de Tickets - SchoolNet</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        .loading-overlay { position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;justify-content:center;align-items:center;z-index:9999; }
        .loading-overlay.hidden { display:none; }
        .loading-content { background:white;padding:2rem;border-radius:8px;text-align:center; }
        .spinner { border:3px solid #f3f3f3;border-top:3px solid #007bff;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:0 auto 1rem; }
        @keyframes spin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }

        .category-preview { display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:20px;font-size:0.85rem; }
        .priority-item { display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid #dee2e6;border-radius:6px;margin-bottom:6px;background:white; }
        .priority-item .pri-dot { width:12px;height:12px;border-radius:50%;flex-shrink:0; }
        .priority-item .pri-label { flex-grow:1;font-size:0.9rem; }
        .priority-item .pri-default { font-size:0.7rem; }
        .priority-list { background:#f8f9fa;border-radius:8px;padding:12px;margin-top:10px; }
        .add-priority-row { display:flex;gap:8px;margin-top:8px; }
        .add-priority-row input { flex-grow:1; }
    </style>
</head>

<body>
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-content"><div class="spinner"></div><p class="mb-0">Cargando...</p></div>
    </div>

    <div class="container-fluid">
        <nav aria-label="breadcrumb" class="mt-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="../../dashboard.html"><i class="bi bi-house me-1"></i>Dashboard</a></li>
                <li class="breadcrumb-item"><a href="index.html">Seguridad</a></li>
                <li class="breadcrumb-item active">Categorías de Tickets</li>
            </ol>
        </nav>

        <div class="row mb-4">
            <div class="col">
                <h1 class="h3"><i class="bi bi-tags-fill me-2"></i>Categorías de Tickets</h1>
                <p class="text-muted">Administra las categorías, sus responsables y las opciones de prioridad de cada una</p>
            </div>
        </div>

        <div id="alertContainer"></div>

        <div class="mb-3">
            <button class="btn btn-primary" onclick="openModal()"><i class="bi bi-plus-circle me-1"></i>Nueva Categoría</button>
        </div>

        <!-- ACORDEÓN DE CATEGORÍAS -->
        <div class="accordion" id="categories-accordion">
            <div class="text-center py-4"><div class="spinner-border spinner-border-sm text-primary"></div> Cargando...</div>
        </div>
    </div>

    <!-- MODAL CREAR/EDITAR CATEGORÍA -->
    <div class="modal fade" id="categoryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title" id="modal-title">Nueva Categoría</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <input type="hidden" id="edit-id">
                    <div class="mb-3"><label class="form-label">Nombre <span class="text-danger">*</span></label><input type="text" class="form-control" id="cat-name" required></div>
                    <div class="mb-3"><label class="form-label">Descripción</label><textarea class="form-control" id="cat-description" rows="2"></textarea></div>
                    <div class="row mb-3">
                        <div class="col-md-6"><label class="form-label">Ícono</label><input type="text" class="form-control" id="cat-icon" value="bi-tag"><div class="form-text"><a href="https://icons.getbootstrap.com/" target="_blank">Ver íconos</a></div></div>
                        <div class="col-md-6"><label class="form-label">Color</label><div class="d-flex align-items-center gap-2"><input type="color" class="form-control form-control-color" id="cat-color" value="#6c757d"><span id="color-hex" class="small text-muted">#6c757d</span></div></div>
                    </div>
                    <div class="mb-3"><label class="form-label">Vista previa</label><div id="category-live-preview" class="p-3 bg-light rounded text-center"><span class="category-preview" style="background:#6c757d15;color:#6c757d;border:1px solid #6c757d40;"><i class="bi bi-tag"></i><span>Categoría</span></span></div></div>
                    <div class="mb-3"><label class="form-label">Email del Responsable <span class="text-danger">*</span></label><select class="form-select" id="cat-worker-email" required><option value="">Seleccione...</option></select><div class="form-text">Recibirá notificaciones de tickets nuevos</div></div>
                    <div class="mb-3"><label class="form-label">Orden</label><input type="number" class="form-control" id="cat-order" value="0" min="0"></div>
                    <div class="form-check mb-3"><input class="form-check-input" type="checkbox" id="cat-active" checked><label class="form-check-label" for="cat-active">Activa</label></div>
                </div>
                <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button type="button" class="btn btn-primary" onclick="saveCategory()"><i class="bi bi-save me-1"></i>Guardar</button></div>
            </div>
        </div>
    </div>

    <!-- MODAL AGREGAR PRIORIDAD -->
    <div class="modal fade" id="priorityModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">Agregar Prioridad</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <input type="hidden" id="pri-category-id">
                    <div class="mb-3"><label class="form-label">Etiqueta <span class="text-danger">*</span></label><input type="text" class="form-control" id="pri-label" placeholder="Ej: Urgente"></div>
                    <div class="mb-3"><label class="form-label">Color</label><input type="color" class="form-control form-control-color" id="pri-color" value="#ffc107"></div>
                    <div class="mb-3"><label class="form-label">Orden</label><input type="number" class="form-control" id="pri-order" value="1" min="1"></div>
                    <div class="form-check"><input class="form-check-input" type="checkbox" id="pri-default"><label class="form-check-label" for="pri-default">Es la prioridad por defecto</label></div>
                </div>
                <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button type="button" class="btn btn-primary" onclick="savePriority()"><i class="bi bi-save me-1"></i>Guardar</button></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/config.js"></script>
    
    <script>
        let categories = [], workers = [], allPriorities = [];
        let catModalInstance = null, priModalInstance = null;

        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const hasAccess = await validatePageAccess('Categorías de Tickets');
                if (!hasAccess) return;
                catModalInstance = new bootstrap.Modal(document.getElementById('categoryModal'));
                priModalInstance = new bootstrap.Modal(document.getElementById('priorityModal'));
                await loadWorkers();
                await loadAll();
                setupLivePreview();
            } catch (e) { console.error(e); showMessage('Error: '+e.message,'danger'); }
        });

        async function loadWorkers() {
            workers = await supabaseRequest('/workers?select=worker_id,email,worker_first_name,worker_last_name_1&worker_status=eq.active&order=worker_last_name_1') || [];
            const sel = document.getElementById('cat-worker-email');
            sel.innerHTML = '<option value="">Seleccione...</option>';
            workers.forEach(w => { const o = document.createElement('option'); o.value = w.email; o.textContent = `${w.worker_last_name_1} ${w.worker_first_name} (${w.email})`; sel.appendChild(o); });
        }

        async function loadAll() {
            showLoading();
            try {
                categories = await supabaseRequest('/ticket_categories?select=*&order=category_order,category_name') || [];
                allPriorities = await supabaseRequest('/ticket_priority_options?select=*&order=priority_order') || [];
                renderAccordion();
            } catch (e) { showMessage('Error: '+e.message,'danger'); }
            finally { hideLoading(); }
        }

        // ==========================================
        // RENDERIZAR ACORDEÓN
        // ==========================================
        function renderAccordion() {
            const container = document.getElementById('categories-accordion');
            if (categories.length === 0) { container.innerHTML = '<div class="text-center text-muted py-4">No hay categorías</div>'; return; }

            container.innerHTML = categories.map((cat, idx) => {
                const catPriorities = allPriorities.filter(p => p.category_id === cat.category_id);
                const priListHtml = catPriorities.length > 0 
                    ? catPriorities.map(p => `
                        <div class="priority-item">
                            <div class="pri-dot" style="background:${p.priority_color}"></div>
                            <span class="pri-label">${p.priority_label}</span>
                            ${p.is_default ? '<span class="badge bg-info pri-default">Por defecto</span>' : ''}
                            <span class="small text-muted">Orden: ${p.priority_order}</span>
                            <button class="btn btn-sm btn-outline-danger" onclick="event.stopPropagation(); deletePriority('${p.priority_option_id}','${p.priority_label}')" title="Eliminar"><i class="bi bi-x"></i></button>
                        </div>
                    `).join('')
                    : '<div class="text-muted small text-center py-2">Sin prioridades configuradas</div>';

                return `
                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button ${idx > 0 ? 'collapsed' : ''}" type="button" data-bs-toggle="collapse" data-bs-target="#cat-${idx}">
                            <span class="category-preview me-3" style="background:${cat.category_color}15;color:${cat.category_color};border:1px solid ${cat.category_color}40;">
                                <i class="bi ${cat.category_icon}"></i> ${cat.category_name}
                            </span>
                            <span class="small text-muted me-3">${cat.worker_email}</span>
                            ${cat.is_active ? '<span class="badge bg-success me-2">Activa</span>' : '<span class="badge bg-secondary me-2">Inactiva</span>'}
                            <span class="badge bg-light text-dark">${catPriorities.length} prioridades</span>
                        </button>
                    </h2>
                    <div id="cat-${idx}" class="accordion-collapse collapse ${idx === 0 ? 'show' : ''}" data-bs-parent="#categories-accordion">
                        <div class="accordion-body">
                            <div class="row">
                                <div class="col-md-5">
                                    <h6 class="fw-bold mb-2">Datos de la categoría</h6>
                                    <p class="small mb-1"><strong>Descripción:</strong> ${cat.category_description || '-'}</p>
                                    <p class="small mb-1"><strong>Responsable:</strong> ${cat.worker_email}</p>
                                    <p class="small mb-1"><strong>Orden:</strong> ${cat.category_order}</p>
                                    <div class="mt-3">
                                        <button class="btn btn-sm btn-outline-primary me-1" onclick="editCategory('${cat.category_id}')"><i class="bi bi-pencil me-1"></i>Editar</button>
                                        <button class="btn btn-sm btn-outline-danger" onclick="deleteCategory('${cat.category_id}','${cat.category_name}')"><i class="bi bi-trash me-1"></i>Eliminar</button>
                                    </div>
                                </div>
                                <div class="col-md-7">
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <h6 class="fw-bold mb-0">Opciones de prioridad</h6>
                                        <button class="btn btn-sm btn-primary" onclick="openPriorityModal('${cat.category_id}')"><i class="bi bi-plus me-1"></i>Agregar</button>
                                    </div>
                                    <div class="priority-list">${priListHtml}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // ==========================================
        // CRUD CATEGORÍAS
        // ==========================================
        function openModal() {
            document.getElementById('modal-title').textContent = 'Nueva Categoría';
            document.getElementById('edit-id').value = '';
            document.getElementById('cat-name').value = '';
            document.getElementById('cat-description').value = '';
            document.getElementById('cat-icon').value = 'bi-tag';
            document.getElementById('cat-color').value = '#6c757d';
            document.getElementById('color-hex').textContent = '#6c757d';
            document.getElementById('cat-worker-email').value = '';
            document.getElementById('cat-order').value = categories.length + 1;
            document.getElementById('cat-active').checked = true;
            updateLivePreview();
            catModalInstance.show();
        }

        function editCategory(id) {
            const cat = categories.find(c => c.category_id === id);
            if (!cat) return;
            document.getElementById('modal-title').textContent = 'Editar Categoría';
            document.getElementById('edit-id').value = cat.category_id;
            document.getElementById('cat-name').value = cat.category_name;
            document.getElementById('cat-description').value = cat.category_description || '';
            document.getElementById('cat-icon').value = cat.category_icon || 'bi-tag';
            document.getElementById('cat-color').value = cat.category_color || '#6c757d';
            document.getElementById('color-hex').textContent = cat.category_color || '#6c757d';
            document.getElementById('cat-worker-email').value = cat.worker_email;
            document.getElementById('cat-order').value = cat.category_order || 0;
            document.getElementById('cat-active').checked = cat.is_active;
            updateLivePreview();
            catModalInstance.show();
        }

        async function saveCategory() {
            const editId = document.getElementById('edit-id').value;
            const name = document.getElementById('cat-name').value.trim();
            const workerEmail = document.getElementById('cat-worker-email').value;
            if (!name) { showMessage('Nombre obligatorio','warning'); return; }
            if (!workerEmail) { showMessage('Seleccione un responsable','warning'); return; }

            showLoading();
            try {
                const session = getStoredSession();
                const data = {
                    category_name: name,
                    category_description: document.getElementById('cat-description').value.trim() || null,
                    category_icon: normalizarIcono(document.getElementById('cat-icon').value.trim()),
                    category_color: document.getElementById('cat-color').value,
                    worker_email: workerEmail,
                    category_order: parseInt(document.getElementById('cat-order').value) || 0,
                    is_active: document.getElementById('cat-active').checked,
                    updated_at: new Date().toISOString()
                };
                if (editId) {
                    await supabaseRequest('/ticket_categories?category_id=eq.'+editId, { method:'PATCH', body:JSON.stringify(data) });
                    showMessage('Categoría actualizada','success');
                } else {
                    data.created_by = session.user.user_id;
                    await supabaseRequest('/ticket_categories', { method:'POST', body:JSON.stringify(data) });
                    showMessage('Categoría creada','success');
                }
                catModalInstance.hide();
                await loadAll();
            } catch (e) { showMessage('Error: '+e.message,'danger'); }
            finally { hideLoading(); }
        }

        async function deleteCategory(id, name) {
            if (!confirm(`¿Eliminar "${name}"?\nNo se puede si tiene tickets asociados.`)) return;
            showLoading();
            try {
                await supabaseRequest('/ticket_categories?category_id=eq.'+id, { method:'DELETE' });
                showMessage('Eliminada','success');
                await loadAll();
            } catch (e) {
                if (e.message.includes('foreign key')) showMessage('No se puede eliminar: tiene tickets. Desactívala.','warning');
                else showMessage('Error: '+e.message,'danger');
            } finally { hideLoading(); }
        }

        // ==========================================
        // CRUD PRIORIDADES
        // ==========================================
        function openPriorityModal(categoryId) {
            document.getElementById('pri-category-id').value = categoryId;
            document.getElementById('pri-label').value = '';
            document.getElementById('pri-color').value = '#ffc107';
            const catPris = allPriorities.filter(p => p.category_id === categoryId);
            document.getElementById('pri-order').value = catPris.length + 1;
            document.getElementById('pri-default').checked = catPris.length === 0;
            priModalInstance.show();
        }

        async function savePriority() {
            const categoryId = document.getElementById('pri-category-id').value;
            const label = document.getElementById('pri-label').value.trim();
            if (!label) { showMessage('Etiqueta obligatoria','warning'); return; }

            const isDefault = document.getElementById('pri-default').checked;

            showLoading();
            try {
                // Si es default, quitar default de las demás de esa categoría
                if (isDefault) {
                    const existing = allPriorities.filter(p => p.category_id === categoryId && p.is_default);
                    for (const p of existing) {
                        await supabaseRequest('/ticket_priority_options?priority_option_id=eq.'+p.priority_option_id, { method:'PATCH', body:JSON.stringify({ is_default: false }) });
                    }
                }

                await supabaseRequest('/ticket_priority_options', { method:'POST', body:JSON.stringify({
                    category_id: categoryId,
                    priority_label: label,
                    priority_order: parseInt(document.getElementById('pri-order').value) || 1,
                    priority_color: document.getElementById('pri-color').value,
                    is_default: isDefault
                })});
                showMessage('Prioridad creada','success');
                priModalInstance.hide();
                await loadAll();
            } catch (e) { showMessage('Error: '+e.message,'danger'); }
            finally { hideLoading(); }
        }

        async function deletePriority(id, label) {
            if (!confirm(`¿Eliminar la prioridad "${label}"?\nNo se puede si tiene tickets asociados.`)) return;
            showLoading();
            try {
                await supabaseRequest('/ticket_priority_options?priority_option_id=eq.'+id, { method:'DELETE' });
                showMessage('Prioridad eliminada','success');
                await loadAll();
            } catch (e) {
                if (e.message.includes('foreign key')) showMessage('No se puede eliminar: hay tickets con esta prioridad.','warning');
                else showMessage('Error: '+e.message,'danger');
            } finally { hideLoading(); }
        }

        // ==========================================
        // LIVE PREVIEW
        // ==========================================
        function setupLivePreview() {
            ['cat-name','cat-icon','cat-color'].forEach(id => document.getElementById(id).addEventListener('input', updateLivePreview));
        }

        function updateLivePreview() {
            const name = document.getElementById('cat-name').value || 'Categoría';
            const icon = normalizarIcono(document.getElementById('cat-icon').value);
            const color = document.getElementById('cat-color').value || '#6c757d';
            document.getElementById('color-hex').textContent = color;
            document.getElementById('category-live-preview').innerHTML = `<span class="category-preview" style="background:${color}15;color:${color};border:1px solid ${color}40;"><i class="bi ${icon}"></i><span>${name}</span></span>`;
        }

        function normalizarIcono(valor) {
            if (!valor) return 'bi-tag';
            valor = valor.trim();
            if (!valor.startsWith('bi-')) valor = 'bi-' + valor;
            return valor;
        }

        function showLoading() { document.getElementById('loading-overlay').classList.remove('hidden'); }
        function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }
    </script>
</body>
</html>
