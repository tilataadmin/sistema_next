<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="page-version" content="26.7.17.1">
    <title>Consultas de admisiones - SchoolNet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }
        .loading-overlay.hidden { display: none; }
        .loading-content {
            background: #ffffff; padding: 2rem; border-radius: 8px; text-align: center;
        }
        .spinner {
            border: 3px solid #f3f3f3; border-top: 3px solid #0d6efd;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 0 auto 1rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .metrica { font-size: 0.9rem; }
        .metrica strong { font-size: 1.05rem; }
        .badge-luz { font-size: 0.72rem; font-weight: 500; }
    </style>
</head>

<body>
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-content">
            <div class="spinner"></div>
            <p class="mb-0">Cargando...</p>
        </div>
    </div>

    <div class="container-fluid">

        <nav aria-label="breadcrumb" class="mt-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="../../dashboard.html"><i class="bi bi-house me-1"></i>Inicio</a></li>
                <li class="breadcrumb-item active" aria-current="page">Admisiones · Consultas</li>
            </ol>
        </nav>

        <div class="row mb-3 align-items-center">
            <div class="col">
                <h1 class="h3 mb-1"><i class="bi bi-table me-2"></i>Consultas de admisiones</h1>
                <p class="text-muted mb-0">Listado filtrable de aspirantes con exportación.</p>
            </div>
        </div>

        <div id="alertContainer"></div>

        <!-- FILTROS -->
        <div class="card mb-3"><div class="card-body">
            <div class="row g-2">
                <div class="col-6 col-md-3 col-lg-2">
                    <label class="form-label small mb-1" for="f-anio">Año académico</label>
                    <select class="form-select form-select-sm" id="f-anio"><option value="">Todos</option></select>
                </div>
                <div class="col-6 col-md-3 col-lg-2">
                    <label class="form-label small mb-1" for="f-grado">Grado</label>
                    <select class="form-select form-select-sm" id="f-grado"><option value="">Todos</option></select>
                </div>
                <div class="col-6 col-md-3 col-lg-2">
                    <label class="form-label small mb-1" for="f-estado">Estado</label>
                    <select class="form-select form-select-sm" id="f-estado"><option value="">Todos</option></select>
                </div>
                <div class="col-6 col-md-3 col-lg-2">
                    <label class="form-label small mb-1" for="f-fuente">Fuente</label>
                    <select class="form-select form-select-sm" id="f-fuente"><option value="">Todas</option></select>
                </div>
                <div class="col-6 col-md-3 col-lg-2">
                    <label class="form-label small mb-1" for="f-semaforo">Semáforo</label>
                    <select class="form-select form-select-sm" id="f-semaforo">
                        <option value="">Todos</option>
                        <option value="verde">Verde</option>
                        <option value="amarillo">Amarillo</option>
                        <option value="rojo">Rojo</option>
                        <option value="sin">Sin revisión</option>
                    </select>
                </div>
                <div class="col-6 col-md-3 col-lg-2">
                    <label class="form-label small mb-1" for="f-desde">Registrado desde</label>
                    <input type="date" class="form-control form-control-sm" id="f-desde">
                </div>
                <div class="col-6 col-md-3 col-lg-2">
                    <label class="form-label small mb-1" for="f-hasta">Registrado hasta</label>
                    <input type="date" class="form-control form-control-sm" id="f-hasta">
                </div>
                <div class="col-6 col-md-3 col-lg-2 d-flex align-items-end">
                    <button class="btn btn-outline-secondary btn-sm w-100" id="btn-limpiar">
                        <i class="bi bi-x-lg me-1"></i>Limpiar
                    </button>
                </div>
            </div>
        </div></div>

        <!-- MÉTRICAS + EXPORTAR -->
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-2 gap-2">
            <div class="d-flex flex-wrap gap-4">
                <span class="metrica text-muted">Registros: <strong id="m-total" class="text-dark">0</strong></span>
                <span class="metrica text-muted">Conversión contacto→inscrito (aprox.): <strong id="m-conversion" class="text-dark">—</strong></span>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-success btn-sm" id="btn-excel">
                    <i class="bi bi-file-earmark-excel me-1"></i>Excel
                </button>
                <button class="btn btn-outline-secondary btn-sm" id="btn-csv">
                    <i class="bi bi-filetype-csv me-1"></i>CSV
                </button>
            </div>
        </div>

        <!-- TABLA -->
        <div class="card mb-5"><div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-sm mb-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Aspirante</th>
                            <th>Grado</th>
                            <th>Año</th>
                            <th>Estado</th>
                            <th>Origen</th>
                            <th>Referido</th>
                            <th>Semáforo</th>
                            <th>Registrado</th>
                            <th>Causa desistimiento</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-body"></tbody>
                </table>
            </div>
        </div></div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="../../assets/js/config.js"></script>

    <script>
        // ==========================================
        // CONSTANTES
        // ==========================================
        const ESTADOS_LISTA = ['contacto', 'inscrito', 'en_proceso', 'matriculado',
                               'aplazado', 'no_admitido', 'desistido'];
        const ESTADO_ROTULO = {
            contacto: 'Contacto', inscrito: 'Inscrito', en_proceso: 'En proceso',
            matriculado: 'Matriculado', aplazado: 'Aplazado',
            no_admitido: 'No admitido', desistido: 'Desistido'
        };
        const ORIGEN_ROTULO = {
            base0: 'Lead de redes', directo: 'Contacto directo', formulario: 'Formulario web'
        };
        const LUZ_ROTULO = {
            verde: 'Verde', amarillo: 'Amarillo', rojo: 'Rojo', sin: 'Sin revisión'
        };
        const LUZ_BADGE = {
            verde: 'bg-success', amarillo: 'bg-warning text-dark',
            rojo: 'bg-danger', sin: 'bg-light text-muted border'
        };

        const COLUMNAS = [
            { key: 'nombre',     label: 'Aspirante' },
            { key: 'grado',      label: 'Grado' },
            { key: 'anio',       label: 'Año' },
            { key: 'estado',     label: 'Estado' },
            { key: 'origen',     label: 'Origen' },
            { key: 'referido',   label: 'Referido' },
            { key: 'semaforo',   label: 'Semáforo' },
            { key: 'registrado', label: 'Registrado' },
            { key: 'causa',      label: 'Causa desistimiento' }
        ];

        // ==========================================
        // VARIABLES GLOBALES
        // ==========================================
        let aspirantes = [];
        let luzPorAspirante = new Map();
        let filtrados = [];

        // ==========================================
        // INICIALIZACIÓN
        // ==========================================
        document.addEventListener('DOMContentLoaded', async function () {
            try {
                const hasAccess = await validatePageAccess('Reportes');
                if (!hasAccess) return;

                const session = getStoredSession();
                if (!session) {
                    showMessage('Sesión no válida. Redirigiendo...', 'warning');
                    setTimeout(() => window.location.href = '../../login.html', 1500);
                    return;
                }

                await inicializar();

            } catch (error) {
                console.error('Error de inicialización:', error);
                showMessage('Error de validación: ' + error.message, 'danger');
            }
        });

        async function inicializar() {
            try {
                mostrarLoading();
                await cargarCatalogos();
                await cargarDatos();
                configurarEventos();
                aplicarFiltros();
                ocultarLoading();
            } catch (error) {
                console.error('Error al inicializar:', error);
                showMessage('Error al cargar la página: ' + error.message, 'danger');
                ocultarLoading();
            }
        }

        // ==========================================
        // CATÁLOGOS (para los filtros)
        // ==========================================
        async function cargarCatalogos() {
            const [grados, anios, fuentes] = await Promise.all([
                supabaseRequest('/grades?select=grade_id,grade_name,grade_order&grade_status=eq.active&order=grade_order.asc'),
                supabaseRequest('/academic_years?select=year_id,year_name,year_order&order=year_order.desc'),
                supabaseRequest('/aap_contact_sources?select=source_id,source_name&is_active=eq.true&order=source_name.asc')
            ]);

            poblarSelect('f-grado',  grados  || [], 'grade_id',  'grade_name');
            poblarSelect('f-anio',   anios   || [], 'year_id',   'year_name');
            poblarSelect('f-fuente', fuentes || [], 'source_id', 'source_name');

            const est = document.getElementById('f-estado');
            ESTADOS_LISTA.forEach(e => {
                const opt = document.createElement('option');
                opt.value = e;
                opt.textContent = ESTADO_ROTULO[e];
                est.appendChild(opt);
            });
        }

        function poblarSelect(id, datos, campoValor, campoTexto) {
            const sel = document.getElementById(id);
            datos.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item[campoValor];
                opt.textContent = item[campoTexto];
                sel.appendChild(opt);
            });
        }

        // ==========================================
        // DATOS
        // ==========================================
        async function cargarDatos() {
            const [asp, rev] = await Promise.all([
                supabaseRequest(
                    '/aap_applicants?select=applicant_id,applicant_first_name,applicant_last_name_1,' +
                    'applicant_last_name_2,lifecycle_status,origin,is_referred,created_at,main_source_id,' +
                    'target_grade_id,target_academic_year_id,withdrawn_reason_id,' +
                    'grades(grade_name,grade_order),academic_years(year_name,year_order),' +
                    'aap_contact_sources!aap_applicants_main_source_fkey(source_name),' +
                    'aap_loss_reasons!aap_applicants_withdrawn_reason_fkey(reason_name)' +
                    '&order=created_at.desc'
                ),
                supabaseRequest(
                    '/aap_financial_reviews?select=applicant_id,review_light,reviewed_at&order=reviewed_at.desc'
                )
            ]);

            aspirantes = asp || [];

            // Revisión vigente (más reciente) por aspirante
            luzPorAspirante = new Map();
            (rev || []).forEach(r => {
                if (!luzPorAspirante.has(r.applicant_id)) {
                    luzPorAspirante.set(r.applicant_id, r.review_light);
                }
            });
        }

        // ==========================================
        // FILTRADO
        // ==========================================
        function aplicarFiltros() {
            const fAnio     = getVal('f-anio');
            const fGrado    = getVal('f-grado');
            const fEstado   = getVal('f-estado');
            const fFuente   = getVal('f-fuente');
            const fSemaforo = getVal('f-semaforo');
            const fDesde    = getVal('f-desde');
            const fHasta    = getVal('f-hasta');

            filtrados = aspirantes.filter(a => {
                if (fAnio   && a.target_academic_year_id !== fAnio) return false;
                if (fGrado  && a.target_grade_id !== fGrado) return false;
                if (fEstado && a.lifecycle_status !== fEstado) return false;
                if (fFuente && a.main_source_id !== fFuente) return false;

                if (fSemaforo) {
                    const luz = luzPorAspirante.get(a.applicant_id) || 'sin';
                    if (luz !== fSemaforo) return false;
                }

                if (fDesde || fHasta) {
                    const fecha = a.created_at ? String(a.created_at).slice(0, 10) : '';
                    if (fDesde && fecha < fDesde) return false;
                    if (fHasta && fecha > fHasta) return false;
                }
                return true;
            });

            renderTabla();
            renderMetricas();
        }

        function valoresFila(a) {
            const apellidos = [a.applicant_last_name_1, a.applicant_last_name_2].filter(Boolean).join(' ');
            const nombre = [apellidos, a.applicant_first_name].filter(Boolean).join(', ') || 'Sin nombre';
            const luz = luzPorAspirante.get(a.applicant_id) || 'sin';

            return {
                nombre,
                grado: a.grades ? a.grades.grade_name : '',
                anio: a.academic_years ? a.academic_years.year_name : '',
                estado: ESTADO_ROTULO[a.lifecycle_status] || a.lifecycle_status,
                origen: ORIGEN_ROTULO[a.origin] || a.origin,
                referido: a.is_referred === true ? 'Sí' : (a.is_referred === false ? 'No' : '—'),
                semaforo: LUZ_ROTULO[luz],
                semaforoKey: luz,
                registrado: formatearFecha(a.created_at),
                causa: (a.lifecycle_status === 'desistido' && a.aap_loss_reasons)
                        ? a.aap_loss_reasons.reason_name : ''
            };
        }

        function renderTabla() {
            const tbody = document.getElementById('tabla-body');

            if (filtrados.length === 0) {
                tbody.innerHTML = `
                    <tr><td colspan="9" class="text-center text-muted py-4">
                        <i class="bi bi-inbox" style="font-size:1.5rem;"></i>
                        <div class="mt-2">No hay aspirantes con estos filtros.</div>
                    </td></tr>`;
                return;
            }

            tbody.innerHTML = filtrados.map(a => {
                const v = valoresFila(a);
                return `
                    <tr>
                        <td>${escapeHtml(v.nombre)}</td>
                        <td>${escapeHtml(v.grado) || '—'}</td>
                        <td>${escapeHtml(v.anio) || '—'}</td>
                        <td>${escapeHtml(v.estado)}</td>
                        <td>${escapeHtml(v.origen)}</td>
                        <td>${escapeHtml(v.referido)}</td>
                        <td><span class="badge badge-luz ${LUZ_BADGE[v.semaforoKey]}">${escapeHtml(v.semaforo)}</span></td>
                        <td>${escapeHtml(v.registrado)}</td>
                        <td>${escapeHtml(v.causa) || '—'}</td>
                    </tr>`;
            }).join('');
        }

        function renderMetricas() {
            setTxt('m-total', filtrados.length);

            const contactos = filtrados.length;
            const inscritosMas = filtrados.filter(a => a.lifecycle_status !== 'contacto').length;
            const conv = contactos ? Math.round((inscritosMas / contactos) * 100) : 0;
            setTxt('m-conversion', contactos ? conv + '%' : '—');
        }

        // ==========================================
        // EXPORTACIÓN
        // ==========================================
        function construirMatriz() {
            const encabezados = COLUMNAS.map(c => c.label);
            const filas = filtrados.map(a => {
                const v = valoresFila(a);
                return COLUMNAS.map(c => v[c.key]);
            });
            return [encabezados, ...filas];
        }

        function exportarExcel() {
            if (filtrados.length === 0) { showMessage('No hay datos para exportar.', 'warning'); return; }
            const ws = XLSX.utils.aoa_to_sheet(construirMatriz());
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Aspirantes');
            XLSX.writeFile(wb, `admisiones_aspirantes_${hoy()}.xlsx`);
        }

        function exportarCSV() {
            if (filtrados.length === 0) { showMessage('No hay datos para exportar.', 'warning'); return; }
            const ws = XLSX.utils.aoa_to_sheet(construirMatriz());
            const csv = '\ufeff' + XLSX.utils.sheet_to_csv(ws);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `admisiones_aspirantes_${hoy()}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ==========================================
        // EVENTOS
        // ==========================================
        function configurarEventos() {
            ['f-anio', 'f-grado', 'f-estado', 'f-fuente', 'f-semaforo', 'f-desde', 'f-hasta']
                .forEach(id => document.getElementById(id).addEventListener('change', aplicarFiltros));

            document.getElementById('btn-limpiar').addEventListener('click', () => {
                ['f-anio', 'f-grado', 'f-estado', 'f-fuente', 'f-semaforo', 'f-desde', 'f-hasta']
                    .forEach(id => { document.getElementById(id).value = ''; });
                aplicarFiltros();
            });

            document.getElementById('btn-excel').addEventListener('click', exportarExcel);
            document.getElementById('btn-csv').addEventListener('click', exportarCSV);
        }

        // ==========================================
        // UTILIDADES
        // ==========================================
        function getVal(id) {
            const el = document.getElementById(id);
            return el && el.value ? el.value : '';
        }

        function setTxt(id, valor) {
            const el = document.getElementById(id);
            if (el) el.textContent = valor;
        }

        function escapeHtml(texto) {
            if (texto === null || texto === undefined) return '';
            const div = document.createElement('div');
            div.textContent = String(texto);
            return div.innerHTML;
        }

        function formatearFecha(iso) {
            if (!iso) return '';
            const d = new Date(iso);
            if (isNaN(d.getTime())) return '';
            return d.toLocaleDateString('es-CO', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        function hoy() {
            return new Date().toISOString().slice(0, 10);
        }

        function mostrarLoading() {
            document.getElementById('loading-overlay').classList.remove('hidden');
        }

        function ocultarLoading() {
            document.getElementById('loading-overlay').classList.add('hidden');
        }
    </script>
</body>
</html>
