<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="page-version" content="26.07.16.09.00">
    <title>Experiencias - SchoolNet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .loading-overlay.hidden { display: none; }
        .loading-content { background: #ffffff; padding: 2rem; border-radius: 8px; text-align: center; }
        .spinner {
            border: 3px solid #f3f3f3; border-top: 3px solid #0d6efd;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 0 auto 1rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .badge-estado { font-size: 0.75rem; font-weight: 500; }
        .fila-click { cursor: pointer; }
        .fila-click:hover { background: #f8f9fa; }
        .contador { font-size: 0.85rem; color: #6c757d; }

        .evento-card {
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
        }
        .evento-card.cancelada { opacity: 0.6; }
        .evento-fecha {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 3.4rem; height: 3.4rem;
            border-radius: 8px;
            background: #e7f1ff;
            color: #0a58ca;
            flex-shrink: 0;
        }
        .evento-fecha .dia { font-size: 1.3rem; font-weight: 700; line-height: 1; }
        .evento-fecha .mes { font-size: 0.68rem; text-transform: uppercase; }
        .asistencia-badge { font-size: 0.72rem; }
    </style>
</head>

<body>
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-content"><div class="spinner"></div><p class="mb-0">Cargando...</p></div>
    </div>

    <div class="container-fluid">

        <nav aria-label="breadcrumb" class="mt-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="../../dashboard.html"><i class="bi bi-house me-1"></i>Inicio</a></li>
                <li class="breadcrumb-item">Admisiones</li>
                <li class="breadcrumb-item active" aria-current="page">Experiencias</li>
            </ol>
        </nav>

        <div class="row mb-4">
            <div class="col">
                <h1 class="h3"><i class="bi bi-stars me-2"></i>Experiencias</h1>
                <p class="text-muted mb-0">
                    Paso 2 del proceso. Modalidades para conocer el colegio y sus convocatorias.
                </p>
            </div>
        </div>

        <div id="alertContainer"></div>

        <ul class="nav nav-tabs mb-4" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-eventos" type="button">
                    <i class="bi bi-calendar-event me-1"></i>Eventos
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-modalidades" type="button">
                    <i class="bi bi-list-ul me-1"></i>Modalidades
                </button>
            </li>
        </ul>

        <div class="tab-content">

            <!-- ============ EVENTOS ============ -->
            <div class="tab-pane fade show active" id="tab-eventos">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="d-flex gap-2 align-items-center">
                        <select class="form-select form-select-sm" id="filtro-evento-estado" style="width: auto;">
                            <option value="proximos" selected>Próximos</option>
                            <option value="Programada">Programadas</option>
                            <option value="Realizada">Realizadas</option>
                            <option value="Cancelada">Canceladas</option>
                            <option value="todos">Todos</option>
                        </select>
                        <span class="contador" id="contador-eventos">—</span>
                    </div>
                    <button class="btn btn-primary btn-sm" id="btn-nuevo-evento">
                        <i class="bi bi-plus-lg me-1"></i>Convocar evento
                    </button>
                </div>
                <div id="lista-eventos">
                    <div class="text-center py-4 text-muted">
                        <div class="spinner-border spinner-border-sm me-2"></div>Cargando eventos...
                    </div>
                </div>
            </div>

            <!-- ============ MODALIDADES ============ -->
            <div class="tab-pane fade" id="tab-modalidades">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="contador" id="contador-modalidades">—</span>
                    <button class="btn btn-primary btn-sm" id="btn-nueva-modalidad">
                        <i class="bi bi-plus-lg me-1"></i>Nueva modalidad
                    </button>
                </div>
                <div class="card">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Modalidad</th>
                                        <th>Descripción</th>
                                        <th>Estado</th>
                                        <th class="text-end">Acción</th>
                                    </tr>
                                </thead>
                                <tbody id="tabla-modalidades">
                                    <tr><td colspan="4" class="text-center py-4 text-muted">
                                        <div class="spinner-border spinner-border-sm me-2"></div>Cargando...
                                    </td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- MODAL: MODALIDAD -->
    <div class="modal fade" id="modal-modalidad" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal-modalidad-titulo">Nueva modalidad</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="form-modalidad">
                    <div class="modal-body">
                        <input type="hidden" id="m-id">
                        <div class="mb-3">
                            <label class="form-label small fw-semibold" for="m-nombre">Nombre <span class="text-danger">*</span></label>
                            <input type="text" class="form-control form-control-sm" id="m-nombre" required
                                   placeholder="Entretilateños, Charla presencial, Recorrido...">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold" for="m-descripcion">Descripción</label>
                            <textarea class="form-control form-control-sm" id="m-descripcion" rows="2"></textarea>
                        </div>
                        <div class="mb-0 form-check form-switch">
                            <input class="form-check-input" type="checkbox" role="switch" id="m-activa" checked>
                            <label class="form-check-label small" for="m-activa">Activa</label>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary btn-sm" id="btn-guardar-modalidad">
                            <i class="bi bi-check-lg me-1"></i>Guardar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- MODAL: EVENTO -->
    <div class="modal fade" id="modal-evento" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal-evento-titulo">Convocar evento</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="form-evento">
                    <div class="modal-body">
                        <input type="hidden" id="e-id">
                        <div class="mb-3">
                            <label class="form-label small fw-semibold" for="e-tipo">Modalidad <span class="text-danger">*</span></label>
                            <select class="form-select form-select-sm" id="e-tipo" required>
                                <option value="">Seleccione...</option>
                            </select>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-semibold" for="e-fecha">Fecha <span class="text-danger">*</span></label>
                                <input type="date" class="form-control form-control-sm" id="e-fecha" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-semibold" for="e-hora">Hora</label>
                                <input type="time" class="form-control form-control-sm" id="e-hora">
                            </div>
                            <div class="col-md-8">
                                <label class="form-label small fw-semibold" for="e-lugar">Lugar</label>
                                <input type="text" class="form-control form-control-sm" id="e-lugar">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small fw-semibold" for="e-cupo">Cupo</label>
                                <input type="number" class="form-control form-control-sm" id="e-cupo" min="0">
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-semibold" for="e-responsable">Trabajador a cargo</label>
                                <select class="form-select form-select-sm" id="e-responsable">
                                    <option value="">Seleccione...</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-semibold" for="e-estado">Estado</label>
                                <select class="form-select form-select-sm" id="e-estado">
                                    <option value="Programada">Programada</option>
                                    <option value="Realizada">Realizada</option>
                                    <option value="Cancelada">Cancelada</option>
                                </select>
                            </div>
                            <div class="col-md-6 d-flex align-items-end">
                                <div class="form-check form-switch mb-2">
                                    <input class="form-check-input" type="checkbox" role="switch" id="e-abierto" checked>
                                    <label class="form-check-label small" for="e-abierto">Abierto a inscripción</label>
                                </div>
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-semibold" for="e-notas">Notas</label>
                                <textarea class="form-control form-control-sm" id="e-notas" rows="2"></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary btn-sm" id="btn-guardar-evento">
                            <i class="bi bi-check-lg me-1"></i>Guardar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- MODAL: ASISTENCIA -->
    <div class="modal fade" id="modal-asistencia" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <div>
                        <h5 class="modal-title mb-0" id="modal-asistencia-titulo">Asistentes</h5>
                        <span class="small text-muted" id="modal-asistencia-sub">—</span>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="lista-asistentes">
                        <div class="text-center py-4 text-muted">
                            <div class="spinner-border spinner-border-sm me-2"></div>Cargando...
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/config.js"></script>

    <script>
        const MESES = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];

        let sesionActual = null;
        let modalidades = [];
        let eventos = [];
        let workersCache = [];
        let modalModalidad = null, modalEvento = null, modalAsistencia = null;

        document.addEventListener('DOMContentLoaded', async function () {
            try {
                const hasAccess = await validatePageAccess('Experiencias');
                if (!hasAccess) return;

                sesionActual = getStoredSession();
                if (!sesionActual) {
                    showMessage('Sesión no válida. Redirigiendo...', 'warning');
                    setTimeout(() => window.location.href = '../../login.html', 1500);
                    return;
                }

                await inicializarPagina();
            } catch (error) {
                console.error('Error de inicialización:', error);
                showMessage('Error de validación: ' + error.message, 'danger');
            }
        });

        async function inicializarPagina() {
            try {
                mostrarLoading();
                modalModalidad  = new bootstrap.Modal(document.getElementById('modal-modalidad'));
                modalEvento     = new bootstrap.Modal(document.getElementById('modal-evento'));
                modalAsistencia = new bootstrap.Modal(document.getElementById('modal-asistencia'));

                await cargarWorkers();
                await cargarModalidades();
                await cargarEventos();

                configurarEventos();
                ocultarLoading();
            } catch (error) {
                console.error('Error en inicialización:', error);
                showMessage('Error al cargar la página: ' + error.message, 'danger');
                ocultarLoading();
            }
        }

        // ==========================================
        // WORKERS
        // ==========================================
        async function cargarWorkers() {
            const datos = await supabaseRequest(
                '/workers?select=worker_id,worker_first_name,worker_last_name_1,worker_last_name_2' +
                '&worker_status=eq.active'
            );
            workersCache = sortWorkersByName(datos || []);

            const sel = document.getElementById('e-responsable');
            sel.innerHTML = '<option value="">Seleccione...</option>';
            workersCache.forEach(w => {
                const opt = document.createElement('option');
                opt.value = w.worker_id;
                opt.textContent = formatWorkerName(w);
                sel.appendChild(opt);
            });
        }

        // ==========================================
        // MODALIDADES
        // ==========================================
        async function cargarModalidades() {
            const datos = await supabaseRequest(
                '/aap_experience_types?select=*&order=type_order.asc,type_name.asc'
            );
            modalidades = datos || [];
            renderizarModalidades();
            poblarSelectModalidades();
        }

        function poblarSelectModalidades() {
            const sel = document.getElementById('e-tipo');
            sel.innerHTML = '<option value="">Seleccione...</option>';
            modalidades.filter(m => m.is_active).forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.experience_type_id;
                opt.textContent = m.type_name;
                sel.appendChild(opt);
            });
        }

        function renderizarModalidades() {
            const tbody = document.getElementById('tabla-modalidades');
            document.getElementById('contador-modalidades').textContent =
                `${modalidades.length} modalidad(es)`;

            if (modalidades.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-4 text-muted">
                    No hay modalidades. Crea la primera con "Nueva modalidad".</td></tr>`;
                return;
            }

            tbody.innerHTML = modalidades.map(m => `
                <tr class="fila-click" data-id="${m.experience_type_id}">
                    <td class="fw-semibold">${escapeHtml(m.type_name)}</td>
                    <td class="small text-muted">${escapeHtml(m.type_description || '—')}</td>
                    <td>${m.is_active
                        ? '<span class="badge bg-success badge-estado">Activa</span>'
                        : '<span class="badge bg-secondary badge-estado">Inactiva</span>'}</td>
                    <td class="text-end">
                        <button class="btn btn-sm btn-outline-primary btn-editar-modalidad" data-id="${m.experience_type_id}">
                            <i class="bi bi-pencil"></i>
                        </button>
                    </td>
                </tr>`).join('');

            tbody.querySelectorAll('.btn-editar-modalidad').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    abrirModalModalidad(btn.dataset.id);
                });
            });
            tbody.querySelectorAll('.fila-click').forEach(tr => {
                tr.addEventListener('click', () => abrirModalModalidad(tr.dataset.id));
            });
        }

        function abrirModalModalidad(id) {
            document.getElementById('form-modalidad').reset();
            document.getElementById('m-id').value = '';

            if (id) {
                const m = modalidades.find(x => x.experience_type_id === id);
                if (!m) return;
                document.getElementById('modal-modalidad-titulo').textContent = 'Editar modalidad';
                document.getElementById('m-id').value = m.experience_type_id;
                document.getElementById('m-nombre').value = m.type_name || '';
                document.getElementById('m-descripcion').value = m.type_description || '';
                document.getElementById('m-activa').checked = !!m.is_active;
            } else {
                document.getElementById('modal-modalidad-titulo').textContent = 'Nueva modalidad';
                document.getElementById('m-activa').checked = true;
            }
            modalModalidad.show();
        }

        async function guardarModalidad(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-guardar-modalidad');
            btn.disabled = true;

            try {
                const id = document.getElementById('m-id').value;
                const payload = {
                    type_name:        document.getElementById('m-nombre').value.trim(),
                    type_description: document.getElementById('m-descripcion').value.trim() || null,
                    is_active:        document.getElementById('m-activa').checked,
                    updated_at:       new Date().toISOString()
                };

                if (id) {
                    await supabaseRequest(`/aap_experience_types?experience_type_id=eq.${id}`,
                        { method: 'PATCH', body: JSON.stringify(payload) });
                } else {
                    await supabaseRequest('/aap_experience_types',
                        { method: 'POST', body: JSON.stringify(payload) });
                }

                modalModalidad.hide();
                showMessage('Modalidad guardada.', 'success');
                await cargarModalidades();
            } catch (error) {
                console.error('Error al guardar modalidad:', error);
                showMessage('Error al guardar: ' + error.message, 'danger');
            } finally {
                btn.disabled = false;
            }
        }

        // ==========================================
        // EVENTOS
        // ==========================================
        async function cargarEventos() {
            const select = [
                '*',
                'aap_experience_types(type_name)',
                'aap_applicant_experiences(applicant_experience_id,attended)'
            ].join(',');
            const datos = await supabaseRequest(
                `/aap_experience_events?select=${select}&order=event_date.desc`
            );
            eventos = datos || [];
            renderizarEventos();
        }

        function renderizarEventos() {
            const cont = document.getElementById('lista-eventos');
            const filtro = document.getElementById('filtro-evento-estado').value;
            const hoy = new Date().toISOString().slice(0, 10);

            let filtrados = eventos.filter(ev => {
                if (filtro === 'proximos') return ev.event_date >= hoy && ev.event_status !== 'Cancelada';
                if (filtro === 'todos') return true;
                return ev.event_status === filtro;
            });

            document.getElementById('contador-eventos').textContent = `${filtrados.length} evento(s)`;

            if (filtrados.length === 0) {
                cont.innerHTML = `<div class="text-center py-5 text-muted">
                    <i class="bi bi-calendar-x d-block mb-2" style="font-size: 2rem;"></i>
                    No hay eventos que coincidan.</div>`;
                return;
            }

            cont.innerHTML = filtrados.map(ev => {
                const tipo = ev.aap_experience_types ? ev.aap_experience_types.type_name : '—';
                const insc = (ev.aap_applicant_experiences || []).length;
                const asistieron = (ev.aap_applicant_experiences || []).filter(a => a.attended === true).length;
                const partes = ev.event_date.split('-');
                const dia = partes[2], mes = MESES[parseInt(partes[1], 10) - 1];

                const estadoBadge = {
                    'Programada': 'bg-primary',
                    'Realizada': 'bg-success',
                    'Cancelada': 'bg-secondary'
                }[ev.event_status] || 'bg-light text-dark';

                const cupoTxt = ev.capacity
                    ? `${insc}/${ev.capacity}` : `${insc}`;

                return `
                    <div class="evento-card ${ev.event_status === 'Cancelada' ? 'cancelada' : ''} d-flex gap-3 align-items-center">
                        <div class="evento-fecha">
                            <span class="dia">${dia}</span>
                            <span class="mes">${mes}</span>
                        </div>
                        <div class="flex-grow-1">
                            <div class="fw-semibold">${escapeHtml(tipo)}
                                <span class="badge ${estadoBadge} badge-estado ms-1">${escapeHtml(ev.event_status)}</span>
                                ${ev.is_open_for_registration
                                    ? '<span class="badge bg-info text-dark badge-estado ms-1">Inscripción abierta</span>' : ''}
                            </div>
                            <div class="small text-muted">
                                ${ev.event_time ? '<i class="bi bi-clock me-1"></i>' + ev.event_time.slice(0,5) + ' · ' : ''}
                                ${ev.event_location ? '<i class="bi bi-geo-alt me-1"></i>' + escapeHtml(ev.event_location) : 'Sin lugar'}
                            </div>
                            <div class="small mt-1">
                                <i class="bi bi-people me-1"></i>${cupoTxt} inscritos
                                ${ev.event_status === 'Realizada' ? ` · ${asistieron} asistieron` : ''}
                            </div>
                        </div>
                        <div class="d-flex flex-column gap-1">
                            <button class="btn btn-sm btn-outline-secondary btn-asistencia" data-id="${ev.event_id}">
                                <i class="bi bi-list-check me-1"></i>Asistentes
                            </button>
                            <button class="btn btn-sm btn-outline-primary btn-editar-evento" data-id="${ev.event_id}">
                                <i class="bi bi-pencil me-1"></i>Editar
                            </button>
                        </div>
                    </div>`;
            }).join('');

            cont.querySelectorAll('.btn-editar-evento').forEach(btn => {
                btn.addEventListener('click', () => abrirModalEvento(btn.dataset.id));
            });
            cont.querySelectorAll('.btn-asistencia').forEach(btn => {
                btn.addEventListener('click', () => abrirModalAsistencia(btn.dataset.id));
            });
        }

        function abrirModalEvento(id) {
            document.getElementById('form-evento').reset();
            document.getElementById('e-id').value = '';

            if (id) {
                const ev = eventos.find(x => x.event_id === id);
                if (!ev) return;
                document.getElementById('modal-evento-titulo').textContent = 'Editar evento';
                document.getElementById('e-id').value = ev.event_id;
                document.getElementById('e-tipo').value = ev.experience_type_id;
                document.getElementById('e-fecha').value = ev.event_date;
                document.getElementById('e-hora').value = ev.event_time || '';
                document.getElementById('e-lugar').value = ev.event_location || '';
                document.getElementById('e-cupo').value = ev.capacity || '';
                document.getElementById('e-responsable').value = ev.responsible_worker_id || '';
                document.getElementById('e-estado').value = ev.event_status;
                document.getElementById('e-abierto').checked = !!ev.is_open_for_registration;
                document.getElementById('e-notas').value = ev.notes || '';
            } else {
                document.getElementById('modal-evento-titulo').textContent = 'Convocar evento';
                document.getElementById('e-estado').value = 'Programada';
                document.getElementById('e-abierto').checked = true;
            }
            modalEvento.show();
        }

        async function guardarEvento(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-guardar-evento');
            btn.disabled = true;

            try {
                const id = document.getElementById('e-id').value;
                const cupo = document.getElementById('e-cupo').value;

                const payload = {
                    experience_type_id:       document.getElementById('e-tipo').value,
                    event_date:               document.getElementById('e-fecha').value,
                    event_time:               document.getElementById('e-hora').value || null,
                    event_location:           document.getElementById('e-lugar').value.trim() || null,
                    capacity:                 cupo ? parseInt(cupo, 10) : null,
                    responsible_worker_id:    document.getElementById('e-responsable').value || null,
                    event_status:             document.getElementById('e-estado').value,
                    is_open_for_registration: document.getElementById('e-abierto').checked,
                    notes:                    document.getElementById('e-notas').value.trim() || null,
                    updated_at:               new Date().toISOString()
                };

                if (id) {
                    await supabaseRequest(`/aap_experience_events?event_id=eq.${id}`,
                        { method: 'PATCH', body: JSON.stringify(payload) });
                } else {
                    await supabaseRequest('/aap_experience_events',
                        { method: 'POST', body: JSON.stringify(payload) });
                }

                modalEvento.hide();
                showMessage('Evento guardado.', 'success');
                await cargarEventos();
            } catch (error) {
                console.error('Error al guardar evento:', error);
                showMessage('Error al guardar: ' + error.message, 'danger');
            } finally {
                btn.disabled = false;
            }
        }

        // ==========================================
        // ASISTENCIA
        // ==========================================
        let asistentesActuales = [];
        let eventoActual = null;

        async function abrirModalAsistencia(eventId) {
            eventoActual = eventos.find(x => x.event_id === eventId);
            if (!eventoActual) return;

            const tipo = eventoActual.aap_experience_types
                ? eventoActual.aap_experience_types.type_name : 'Evento';
            const partes = eventoActual.event_date.split('-');
            document.getElementById('modal-asistencia-titulo').textContent = `Asistentes — ${tipo}`;
            document.getElementById('modal-asistencia-sub').textContent =
                `${partes[2]}/${partes[1]}/${partes[0]}`;

            document.getElementById('lista-asistentes').innerHTML =
                '<div class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm me-2"></div>Cargando...</div>';
            modalAsistencia.show();

            const datos = await supabaseRequest(
                `/aap_applicant_experiences?select=applicant_experience_id,attended,comments,` +
                `aap_applicants(applicant_first_name,applicant_last_name_1,applicant_last_name_2)` +
                `&event_id=eq.${eventId}&order=registered_at.asc`
            );
            asistentesActuales = datos || [];
            renderizarAsistentes();
        }

        function renderizarAsistentes() {
            const cont = document.getElementById('lista-asistentes');

            if (asistentesActuales.length === 0) {
                cont.innerHTML = `<div class="text-center py-4 text-muted">
                    <i class="bi bi-person-x d-block mb-2" style="font-size: 1.8rem;"></i>
                    Nadie se ha inscrito a este evento todavía.</div>`;
                return;
            }

            cont.innerHTML = `
                <table class="table table-sm align-middle mb-0">
                    <thead class="table-light">
                        <tr><th>Aspirante</th><th class="text-center">Asistió</th></tr>
                    </thead>
                    <tbody>
                        ${asistentesActuales.map(a => {
                            const asp = a.aap_applicants || {};
                            const nombre = [asp.applicant_last_name_1, asp.applicant_last_name_2, '·', asp.applicant_first_name]
                                .filter(Boolean).join(' ');
                            return `
                                <tr>
                                    <td>${escapeHtml(nombre || '—')}</td>
                                    <td class="text-center">
                                        <div class="form-check form-switch d-inline-block">
                                            <input class="form-check-input chk-asistio" type="checkbox" role="switch"
                                                   data-id="${a.applicant_experience_id}"
                                                   ${a.attended === true ? 'checked' : ''}>
                                        </div>
                                    </td>
                                </tr>`;
                        }).join('')}
                    </tbody>
                </table>`;

            cont.querySelectorAll('.chk-asistio').forEach(chk => {
                chk.addEventListener('change', () => marcarAsistencia(chk.dataset.id, chk.checked, chk));
            });
        }

        async function marcarAsistencia(id, asistio, chk) {
            chk.disabled = true;
            try {
                await supabaseRequest(`/aap_applicant_experiences?applicant_experience_id=eq.${id}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ attended: asistio })
                });
                // Actualiza el cache local para que el contador del evento refleje el cambio al cerrar.
                const item = asistentesActuales.find(a => a.applicant_experience_id === id);
                if (item) item.attended = asistio;
            } catch (error) {
                console.error('Error al marcar asistencia:', error);
                showMessage('No se pudo guardar la asistencia.', 'danger');
                chk.checked = !asistio;
            } finally {
                chk.disabled = false;
            }
        }

        // ==========================================
        // EVENTOS DE UI
        // ==========================================
        function configurarEventos() {
            document.getElementById('btn-nueva-modalidad').addEventListener('click', () => abrirModalModalidad(null));
            document.getElementById('btn-nuevo-evento').addEventListener('click', () => abrirModalEvento(null));
            document.getElementById('form-modalidad').addEventListener('submit', guardarModalidad);
            document.getElementById('form-evento').addEventListener('submit', guardarEvento);
            document.getElementById('filtro-evento-estado').addEventListener('change', renderizarEventos);

            // Al cerrar el modal de asistencia, recargar eventos para refrescar contadores.
            document.getElementById('modal-asistencia').addEventListener('hidden.bs.modal', cargarEventos);
        }

        // ==========================================
        // UTILIDADES
        // ==========================================
        function escapeHtml(texto) {
            if (texto === null || texto === undefined) return '';
            const div = document.createElement('div');
            div.textContent = String(texto);
            return div.innerHTML;
        }

        function mostrarLoading() { document.getElementById('loading-overlay').classList.remove('hidden'); }
        function ocultarLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }
    </script>
</body>
</html>
