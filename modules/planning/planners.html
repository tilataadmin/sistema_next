<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="page-version" content="26.5.28.1">
    <title>Planeadores de Área - SchoolNet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --planning-primary: #2C5F9B;
            --planning-primary-dark: #1F4775;
            --planning-light: #E8EFF7;
            --planning-border: #D0DCEC;
        }

        body {
            background: #f7f9fc;
        }

        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .loading-overlay.hidden { display: none; }
        .loading-content { background: white; padding: 2rem; border-radius: 8px; text-align: center; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid var(--planning-primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ====================================================
           HEADER DE LA PÁGINA
           ==================================================== */
        .page-header {
            background: white;
            border: 1px solid var(--planning-border);
            border-radius: 8px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.25rem;
        }
        .page-header h2 {
            color: var(--planning-primary-dark);
            font-size: 1.4rem;
            font-weight: 600;
            margin: 0 0 0.25rem 0;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .page-header h2 i {
            color: var(--planning-primary);
        }
        .page-header .header-subtitle {
            color: #6c757d;
            font-size: 0.88rem;
            margin: 0;
        }

        /* ====================================================
           FILTROS
           ==================================================== */
        .filters-bar {
            background: white;
            border: 1px solid var(--planning-border);
            border-radius: 8px;
            padding: 1rem 1.25rem;
            margin-bottom: 1.25rem;
        }
        .filters-bar .form-label {
            font-size: 0.78rem;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 0.3rem;
        }
        .filters-bar .form-select,
        .filters-bar .form-control {
            font-size: 0.88rem;
        }
        .filters-summary {
            font-size: 0.82rem;
            color: #6c757d;
            margin-top: 0.6rem;
        }
        .filters-summary strong {
            color: #333;
        }

        /* ====================================================
           TABLA DE PLANEADORES
           ==================================================== */
        .planners-table-wrapper {
            background: white;
            border: 1px solid var(--planning-border);
            border-radius: 8px;
            overflow: hidden;
        }
        .planners-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }
        .planners-table thead {
            background: var(--planning-light);
        }
        .planners-table th {
            padding: 0.65rem 0.85rem;
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: var(--planning-primary-dark);
            text-align: left;
            border-bottom: 1px solid var(--planning-border);
            white-space: nowrap;
        }
        .planners-table th.center {
            text-align: center;
        }
        .planners-table tbody tr {
            border-top: 1px solid #f0f0f0;
            transition: background 0.1s;
        }
        .planners-table tbody tr:hover {
            background: #fafbfc;
            cursor: pointer;
        }
        .planners-table td {
            padding: 0.7rem 0.85rem;
            vertical-align: middle;
        }
        .planners-table td.center {
            text-align: center;
        }
        .planner-id-cell {
            min-width: 220px;
        }
        .planner-id-primary {
            font-weight: 500;
            color: #1a1a1a;
            line-height: 1.3;
        }
        .planner-id-strand {
            font-size: 0.78rem;
            color: #6c757d;
            margin-top: 0.15rem;
        }
        .planners-table .planner-author {
            font-size: 0.82rem;
            color: #555;
        }
        .planners-table .planner-ui-link {
            font-size: 0.82rem;
            color: var(--planning-primary-dark);
        }
        .planners-table .planner-ui-link.empty {
            color: #adb5bd;
            font-style: italic;
        }

        /* Badges */
        .badge-pill {
            display: inline-block;
            padding: 0.18rem 0.5rem;
            border-radius: 12px;
            font-size: 0.72rem;
            font-weight: 500;
            white-space: nowrap;
        }
        .badge-program-pep { background: #e8f4f8; color: #0c5a73; }
        .badge-program-pai { background: #f0e8f8; color: #4a2773; }
        .badge-program-pd  { background: #f8efe8; color: #73450c; }
        .badge-program-other { background: #f0f0f0; color: #555; }

        .badge-trimester {
            background: var(--planning-light);
            color: var(--planning-primary-dark);
        }

        .badge-count {
            display: inline-block;
            min-width: 22px;
            padding: 0.15rem 0.45rem;
            border-radius: 11px;
            background: #f0f0f0;
            color: #555;
            font-size: 0.78rem;
            font-weight: 600;
            text-align: center;
        }
        .badge-count.has-data {
            background: var(--planning-light);
            color: var(--planning-primary-dark);
        }

        /* Acciones */
        .btn-open {
            background: var(--planning-primary);
            color: white;
            border: none;
            padding: 0.3rem 0.75rem;
            border-radius: 4px;
            font-size: 0.82rem;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn-open:hover {
            background: var(--planning-primary-dark);
            color: white;
        }

        /* ====================================================
           ESTADO VACÍO
           ==================================================== */
        .empty-state {
            text-align: center;
            padding: 3rem 1.5rem;
            color: #6c757d;
        }
        .empty-state i {
            font-size: 3rem;
            color: #adb5bd;
            display: block;
            margin-bottom: 0.75rem;
        }
        .empty-state h4 {
            color: #555;
            font-size: 1.05rem;
            margin-bottom: 0.5rem;
        }
        .empty-state p {
            font-size: 0.88rem;
            margin: 0;
        }

        /* ====================================================
           PANTALLA DE ERROR / SIN ACCESO
           ==================================================== */
        .access-error-screen {
            max-width: 600px;
            margin: 4rem auto;
            text-align: center;
            padding: 2rem;
        }
        .access-error-screen i {
            font-size: 4rem;
            color: #f59e0b;
        }
        .access-error-screen h3 {
            color: #333;
            margin-top: 1rem;
        }
        .access-error-screen p {
            color: #6c757d;
            font-size: 1rem;
            line-height: 1.6;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-content">
            <div class="spinner"></div>
            <p class="mb-0">Cargando planeadores de área...</p>
        </div>
    </div>

    <div class="container-fluid" id="page-content" style="display:none;">

        <!-- BREADCRUMBS -->
        <nav aria-label="breadcrumb" class="mt-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="../../dashboard.html"><i class="bi bi-house me-1"></i>Dashboard</a></li>
                <li class="breadcrumb-item active" aria-current="page">Planeadores de Área</li>
            </ol>
        </nav>

        <div id="alertContainer"></div>

        <!-- HEADER -->
        <div class="page-header">
            <h2><i class="bi bi-journal-bookmark"></i>Planeadores de Área</h2>
            <p class="header-subtitle">Listado de planeadores a los que tiene acceso por su rol en la institución.</p>
        </div>

        <!-- FILTROS -->
        <div class="filters-bar">
            <div class="row g-3">
                <div class="col-md-2">
                    <label class="form-label">Año académico</label>
                    <select class="form-select" id="filter-year"></select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Trimestre</label>
                    <select class="form-select" id="filter-trimester">
                        <option value="">Todos</option>
                        <option value="1">T1</option>
                        <option value="2">T2</option>
                        <option value="3">T3</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Programa</label>
                    <select class="form-select" id="filter-program">
                        <option value="">Todos</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Grado</label>
                    <select class="form-select" id="filter-grade">
                        <option value="">Todos</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Asignatura</label>
                    <select class="form-select" id="filter-subject">
                        <option value="">Todas</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Buscar por strand</label>
                    <input type="text" class="form-control" id="filter-search" placeholder="Texto del strand...">
                </div>
            </div>
            <div class="filters-summary" id="filters-summary"></div>
        </div>

        <!-- TABLA -->
        <div class="planners-table-wrapper">
            <div id="planners-list-container">
                <!-- Render dinámico -->
            </div>
        </div>

    </div>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/config.js"></script>

    <script>
        // ============================================================
        // ESTADO GLOBAL
        // ============================================================
        let currentUser = null;
        let currentWorkerId = null;
        let currentWorkerEmail = null;

        // Año académico actual (default del selector)
        let currentYearId = null;

        // Catálogos y recursos cacheados
        let allYears = [];
        let allPrograms = [];
        let allGrades = [];
        let allSubjects = [];
        let allAreas = [];
        let allSections = [];
        let allWorkers = [];

        // Alcance del usuario (rol estructural)
        let gradeIdsForUser = new Set();         // grados accesibles por director de programa o sección
        let areaIdsAsCoordinator = new Set();    // áreas donde es coordinador
        let programIdsAsDirector = new Set();    // programas donde es director
        let sectionIdsAsDirector = new Set();    // secciones donde es director
        let subjectIdsAsCoordinator = new Set(); // asignaturas cuyas áreas coordina

        // Cache del año seleccionado
        // {
        //   planners: [...],                             // pln_planners
        //   cyclesByPlanner: Map<planner_id, [...]>,     // pln_planner_cycles
        //   criteriaCountByPlanner: Map<planner_id, n>,  // # criterios de evaluación
        //   commentsCountByPlanner: Map<planner_id, n>,  // # comentarios activos (planner + ciclos)
        //   unitTitleByUnitId: Map<unit_id, title>       // títulos de UIs vinculadas
        // }
        let yearData = null;

        // ============================================================
        // INICIALIZACIÓN
        // ============================================================
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const hasAccess = await validatePageAccess('Gestionar planeadores de área');
                if (!hasAccess) return;

                const session = getStoredSession();
                if (!session || !session.user) {
                    window.location.href = '../../login.html';
                    return;
                }
                currentUser = session.user;

                await loadCurrentWorker();
                if (!currentWorkerId) {
                    mostrarPantallaSinAcceso('No se encontró un trabajador vinculado a tu usuario.');
                    return;
                }

                await loadCatalogs();
                calcularAlcanceUsuario();

                inicializarFiltros();
                await cargarPlaneadoresDelAnio(currentYearId);
                aplicarFiltrosYRender();

                ocultarLoading();
                document.getElementById('page-content').style.display = 'block';

                console.log('✅ planners.html cargado');
            } catch (error) {
                console.error('❌ Error inicializando planners.html:', error);
                mostrarPantallaSinAcceso('Ocurrió un error al cargar la página: ' + error.message);
            }
        });

        // ============================================================
        // CARGA DE CONTEXTO
        // ============================================================
        async function loadCurrentWorker() {
            const userMail = currentUser.user_mail;
            if (!userMail) return;

            const data = await supabaseRequest(
                `/workers?select=worker_id,worker_first_name,worker_last_name_1,worker_last_name_2,email&email=eq.${encodeURIComponent(userMail)}&limit=1`
            );
            if (data && data.length > 0) {
                currentWorkerId = data[0].worker_id;
                currentWorkerEmail = (data[0].email || '').toLowerCase().trim();
            }
        }

        async function loadCatalogs() {
            const [
                yearsRes,
                programsRes,
                gradesRes,
                subjectsRes,
                areasRes,
                sectionsRes,
                workersRes
            ] = await Promise.all([
                supabaseRequest('/academic_years?select=year_id,year_name,is_current&order=year_name.desc'),
                supabaseRequest('/programs?select=program_id,program_name,program_director_email&order=program_name.asc'),
                supabaseRequest('/grades?select=grade_id,grade_name,program_id,section_id&order=grade_name.asc'),
                supabaseRequest('/academic_subjects?select=subject_id,subject_name,area_id&order=subject_name.asc'),
                supabaseRequest('/academic_areas?select=area_id,area_name,coordinator_worker_id&area_status=eq.active'),
                supabaseRequest('/sections?select=section_id,section_name,director_email&section_status=eq.active'),
                supabaseRequest('/workers?select=worker_id,worker_first_name,worker_last_name_1,worker_last_name_2,email,worker_status&worker_status=eq.active')
            ]);

            allYears = yearsRes || [];
            allPrograms = programsRes || [];
            allGrades = gradesRes || [];
            allSubjects = subjectsRes || [];
            allAreas = areasRes || [];
            allSections = sectionsRes || [];
            allWorkers = workersRes || [];

            const currentYear = allYears.find(y => y.is_current);
            currentYearId = currentYear ? currentYear.year_id : (allYears[0] ? allYears[0].year_id : null);

            if (!currentYearId) {
                throw new Error('No hay años académicos configurados.');
            }
        }

        // ============================================================
        // CÁLCULO DEL ALCANCE DEL USUARIO
        // ============================================================
        // Coherente con units.html (opción B): solo entran al listado quienes
        // tienen rol estructural. Los docentes ven sus planeadores en my-planners.html.
        function calcularAlcanceUsuario() {
            areaIdsAsCoordinator = new Set(
                allAreas
                    .filter(a => a.coordinator_worker_id === currentWorkerId)
                    .map(a => a.area_id)
            );

            programIdsAsDirector = new Set(
                allPrograms
                    .filter(p => (p.program_director_email || '').toLowerCase().trim() === currentWorkerEmail)
                    .map(p => p.program_id)
            );

            sectionIdsAsDirector = new Set(
                allSections
                    .filter(s => (s.director_email || '').toLowerCase().trim() === currentWorkerEmail)
                    .map(s => s.section_id)
            );

            gradeIdsForUser = new Set();
            allGrades.forEach(g => {
                if (g.program_id && programIdsAsDirector.has(g.program_id)) {
                    gradeIdsForUser.add(g.grade_id);
                }
                if (g.section_id && sectionIdsAsDirector.has(g.section_id)) {
                    gradeIdsForUser.add(g.grade_id);
                }
            });

            // Asignaturas cuyas áreas coordina (acelera el filtro por subject_id en planeadores)
            subjectIdsAsCoordinator = new Set();
            allSubjects.forEach(s => {
                if (s.area_id && areaIdsAsCoordinator.has(s.area_id)) {
                    subjectIdsAsCoordinator.add(s.subject_id);
                }
            });

            console.log('📊 Alcance del usuario:', {
                areasComoCoordinador: areaIdsAsCoordinator.size,
                asignaturasAccesiblesPorArea: subjectIdsAsCoordinator.size,
                programasComoDirector: programIdsAsDirector.size,
                seccionesComoDirector: sectionIdsAsDirector.size,
                gradosAccesibles: gradeIdsForUser.size
            });
        }

        // ============================================================
        // CARGA DE PLANEADORES DEL AÑO
        // ============================================================
        async function cargarPlaneadoresDelAnio(yearId) {
            mostrarLoading();
            try {
                const planners = await supabaseRequest(
                    `/pln_planners?select=*&academic_year_id=eq.${yearId}&planner_status=eq.active&order=created_at.desc`
                ) || [];

                if (planners.length === 0) {
                    yearData = {
                        planners: [],
                        cyclesByPlanner: new Map(),
                        criteriaCountByPlanner: new Map(),
                        commentsCountByPlanner: new Map(),
                        unitTitleByUnitId: new Map()
                    };
                    ocultarLoading();
                    return;
                }

                const plannerIds = planners.map(p => p.planner_id);

                // Cargar en paralelo lo que necesitamos para los contadores y la columna UI
                // Para los títulos de UIs vinculadas extraemos los unit_id no nulos
                const linkedUnitIds = [...new Set(planners.map(p => p.unit_id).filter(Boolean))];

                const promises = [
                    supabaseRequest(`/pln_planner_cycles?select=cycle_id,planner_id&planner_id=in.(${plannerIds.join(',')})`),
                    supabaseRequest(`/pln_planner_assessment_criteria?select=criterion_id,planner_id&planner_id=in.(${plannerIds.join(',')})`),
                    supabaseRequest(`/pln_comments?select=comment_id,entity_id&entity_type=eq.planner&comment_status=eq.active&entity_id=in.(${plannerIds.join(',')})`)
                ];

                if (linkedUnitIds.length > 0) {
                    promises.push(supabaseRequest(`/pln_units?select=unit_id,unit_title&unit_id=in.(${linkedUnitIds.join(',')})`));
                } else {
                    promises.push(Promise.resolve([]));
                }

                const [cyclesRes, criteriaRes, plannerCommentsRes, unitsRes] = await Promise.all(promises);

                // Índices
                const cyclesByPlanner = new Map();
                (cyclesRes || []).forEach(c => {
                    if (!cyclesByPlanner.has(c.planner_id)) cyclesByPlanner.set(c.planner_id, []);
                    cyclesByPlanner.get(c.planner_id).push(c);
                });

                const criteriaCountByPlanner = new Map();
                (criteriaRes || []).forEach(c => {
                    criteriaCountByPlanner.set(c.planner_id, (criteriaCountByPlanner.get(c.planner_id) || 0) + 1);
                });

                // Comentarios: directos del planeador + de sus ciclos
                const cycleIds = (cyclesRes || []).map(c => c.cycle_id);
                let cycleCommentsRes = [];
                if (cycleIds.length > 0) {
                    cycleCommentsRes = await supabaseRequest(
                        `/pln_comments?select=comment_id,entity_id&entity_type=eq.planner_cycle&comment_status=eq.active&entity_id=in.(${cycleIds.join(',')})`
                    ) || [];
                }

                const cycleToPlanner = new Map();
                (cyclesRes || []).forEach(c => cycleToPlanner.set(c.cycle_id, c.planner_id));

                const commentsCountByPlanner = new Map();
                (plannerCommentsRes || []).forEach(c => {
                    commentsCountByPlanner.set(c.entity_id, (commentsCountByPlanner.get(c.entity_id) || 0) + 1);
                });
                cycleCommentsRes.forEach(c => {
                    const pid = cycleToPlanner.get(c.entity_id);
                    if (pid) {
                        commentsCountByPlanner.set(pid, (commentsCountByPlanner.get(pid) || 0) + 1);
                    }
                });

                const unitTitleByUnitId = new Map();
                (unitsRes || []).forEach(u => {
                    unitTitleByUnitId.set(u.unit_id, u.unit_title || 'Sin título');
                });

                yearData = {
                    planners,
                    cyclesByPlanner,
                    criteriaCountByPlanner,
                    commentsCountByPlanner,
                    unitTitleByUnitId
                };

                console.log(`✅ ${planners.length} planeador(es) cargados para el año seleccionado`);
            } catch (err) {
                console.error('Error cargando planeadores del año:', err);
                showMessage('Error al cargar los planeadores: ' + err.message, 'danger');
                yearData = null;
            } finally {
                ocultarLoading();
            }
        }

        // ============================================================
        // FILTRADO POR ALCANCE (rol estructural)
        // ============================================================
        // Caminos aplicables a planners.html (NO se incluyen los caminos
        // "creador" ni "assignment activa" porque eso es my-planners.html):
        // - Director de programa: planeadores cuyo grado pertenece a un programa propio
        // - Director de sección: planeadores cuyo grado pertenece a una sección propia
        // - Coordinador de área: planeadores cuya asignatura pertenece a un área propia
        function aplicarFiltroAlcance(planners) {
            if (!planners) return [];

            const hasAnyStructuralRole =
                areaIdsAsCoordinator.size > 0 ||
                programIdsAsDirector.size > 0 ||
                sectionIdsAsDirector.size > 0;

            if (!hasAnyStructuralRole) return [];

            return planners.filter(p => {
                // Director de programa o sección → grado accesible
                if (p.grade_id && gradeIdsForUser.has(p.grade_id)) {
                    return true;
                }
                // Coordinador de área → asignatura accesible por área
                if (p.subject_id && subjectIdsAsCoordinator.has(p.subject_id)) {
                    return true;
                }
                return false;
            });
        }

        // ============================================================
        // INICIALIZACIÓN DE FILTROS
        // ============================================================
        function inicializarFiltros() {
            const yearSelect = document.getElementById('filter-year');
            yearSelect.innerHTML = allYears.map(y =>
                `<option value="${y.year_id}" ${y.year_id === currentYearId ? 'selected' : ''}>${escapeHtml(y.year_name)}${y.is_current ? ' (vigente)' : ''}</option>`
            ).join('');

            const programSelect = document.getElementById('filter-program');
            programSelect.innerHTML = '<option value="">Todos</option>' +
                allPrograms.map(p => `<option value="${p.program_id}">${escapeHtml(p.program_name)}</option>`).join('');

            poblarFiltroGrados('');
            poblarFiltroAsignaturas('');

            yearSelect.addEventListener('change', async (e) => {
                await cargarPlaneadoresDelAnio(e.target.value);
                aplicarFiltrosYRender();
            });

            document.getElementById('filter-trimester').addEventListener('change', aplicarFiltrosYRender);

            programSelect.addEventListener('change', (e) => {
                poblarFiltroGrados(e.target.value);
                aplicarFiltrosYRender();
            });

            document.getElementById('filter-grade').addEventListener('change', aplicarFiltrosYRender);
            document.getElementById('filter-subject').addEventListener('change', aplicarFiltrosYRender);

            let searchTimer = null;
            document.getElementById('filter-search').addEventListener('input', () => {
                if (searchTimer) clearTimeout(searchTimer);
                searchTimer = setTimeout(aplicarFiltrosYRender, 300);
            });
        }

        function poblarFiltroGrados(programId) {
            const gradeSelect = document.getElementById('filter-grade');
            const selectedGrade = gradeSelect.value;

            let availableGrades = allGrades;
            if (programId) {
                availableGrades = allGrades.filter(g => g.program_id === programId);
            }

            gradeSelect.innerHTML = '<option value="">Todos</option>' +
                availableGrades.map(g => `<option value="${g.grade_id}">${escapeHtml(g.grade_name)}</option>`).join('');

            if (selectedGrade && availableGrades.find(g => g.grade_id === selectedGrade)) {
                gradeSelect.value = selectedGrade;
            } else {
                gradeSelect.value = '';
            }
        }

        function poblarFiltroAsignaturas(filterText) {
            const subjectSelect = document.getElementById('filter-subject');
            const selectedSubject = subjectSelect.value;

            subjectSelect.innerHTML = '<option value="">Todas</option>' +
                allSubjects.map(s => `<option value="${s.subject_id}">${escapeHtml(s.subject_name)}</option>`).join('');

            if (selectedSubject && allSubjects.find(s => s.subject_id === selectedSubject)) {
                subjectSelect.value = selectedSubject;
            } else {
                subjectSelect.value = '';
            }
        }

        // ============================================================
        // APLICACIÓN DE FILTROS + RENDER
        // ============================================================
        function aplicarFiltrosYRender() {
            if (!yearData) {
                renderTabla([]);
                return;
            }

            let visible = aplicarFiltroAlcance(yearData.planners);

            const trimesterFilter = document.getElementById('filter-trimester').value;
            const programFilter = document.getElementById('filter-program').value;
            const gradeFilter = document.getElementById('filter-grade').value;
            const subjectFilter = document.getElementById('filter-subject').value;
            const searchFilter = document.getElementById('filter-search').value.trim().toLowerCase();

            if (trimesterFilter) {
                visible = visible.filter(p => String(p.trimester) === trimesterFilter);
            }
            if (programFilter) {
                visible = visible.filter(p => p.program_id === programFilter);
            }
            if (gradeFilter) {
                visible = visible.filter(p => p.grade_id === gradeFilter);
            }
            if (subjectFilter) {
                visible = visible.filter(p => p.subject_id === subjectFilter);
            }
            if (searchFilter) {
                visible = visible.filter(p => (p.strand || '').toLowerCase().includes(searchFilter));
            }

            // Orden: grado → asignatura → trimestre
            visible.sort((a, b) => {
                const gA = allGrades.find(g => g.grade_id === a.grade_id);
                const gB = allGrades.find(g => g.grade_id === b.grade_id);
                const nameGA = gA ? gA.grade_name : 'zzz';
                const nameGB = gB ? gB.grade_name : 'zzz';
                if (nameGA !== nameGB) return nameGA.localeCompare(nameGB);

                const sA = allSubjects.find(s => s.subject_id === a.subject_id);
                const sB = allSubjects.find(s => s.subject_id === b.subject_id);
                const nameSA = sA ? sA.subject_name : 'zzz';
                const nameSB = sB ? sB.subject_name : 'zzz';
                if (nameSA !== nameSB) return nameSA.localeCompare(nameSB);

                return (a.trimester || 0) - (b.trimester || 0);
            });

            renderTabla(visible);
            renderResumen(visible);
        }

        // ============================================================
        // RENDER DE LA TABLA
        // ============================================================
        function renderTabla(planners) {
            const container = document.getElementById('planners-list-container');

            if (!yearData) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-exclamation-circle"></i>
                        <h4>No se pudieron cargar los planeadores</h4>
                        <p>Intente recargar la página.</p>
                    </div>
                `;
                return;
            }

            if (planners.length === 0) {
                const hasAnyStructuralRole =
                    areaIdsAsCoordinator.size > 0 ||
                    programIdsAsDirector.size > 0 ||
                    sectionIdsAsDirector.size > 0;

                if (!hasAnyStructuralRole) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="bi bi-shield-lock"></i>
                            <h4>No tiene rol estructural asignado</h4>
                            <p>Esta pantalla muestra los planeadores a los que tiene acceso por ser coordinador de área, director de programa o director de sección. Si requiere acceso, contacte al administrador.</p>
                        </div>
                    `;
                } else {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="bi bi-inbox"></i>
                            <h4>Sin planeadores para mostrar</h4>
                            <p>No hay planeadores que coincidan con los filtros aplicados.</p>
                        </div>
                    `;
                }
                return;
            }

            const rows = planners.map(p => renderRow(p)).join('');

            container.innerHTML = `
                <table class="planners-table">
                    <thead>
                        <tr>
                            <th>Asignatura — Grado — Trimestre</th>
                            <th>Programa</th>
                            <th>Autor (creador)</th>
                            <th>UI vinculada</th>
                            <th class="center"># criterios</th>
                            <th class="center"># ciclos</th>
                            <th class="center"># comentarios</th>
                            <th class="center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows}
                    </tbody>
                </table>
            `;

            container.querySelectorAll('tbody tr[data-planner-id]').forEach(tr => {
                const plannerId = tr.dataset.plannerId;
                tr.addEventListener('click', (e) => {
                    if (e.target.closest('input, select, textarea')) return;
                    window.location.href = `planner-form.html?planner_id=${plannerId}`;
                });
            });
        }

        function renderRow(planner) {
            const subject = allSubjects.find(s => s.subject_id === planner.subject_id);
            const subjectName = subject ? subject.subject_name : '—';

            const grade = allGrades.find(g => g.grade_id === planner.grade_id);
            const gradeName = grade ? grade.grade_name : '—';

            const program = planner.program_id ? allPrograms.find(p => p.program_id === planner.program_id) : null;
            const programName = program ? program.program_name : '—';
            const programBadgeClass = getProgramBadgeClass(programName);

            // Autor: creador histórico (teacher_id)
            const author = allWorkers.find(w => w.worker_id === planner.teacher_id);
            const authorName = author
                ? `${author.worker_first_name} ${author.worker_last_name_1}`
                : '—';

            // UI vinculada
            const linkedUnitId = planner.unit_id;
            const linkedUnitTitle = linkedUnitId ? (yearData.unitTitleByUnitId.get(linkedUnitId) || 'UI vinculada') : null;

            // Contadores
            const criteriaCount = yearData.criteriaCountByPlanner.get(planner.planner_id) || 0;
            const cycles = yearData.cyclesByPlanner.get(planner.planner_id) || [];
            const cyclesCount = cycles.length;
            const commentsCount = yearData.commentsCountByPlanner.get(planner.planner_id) || 0;

            const strand = planner.strand && planner.strand.trim() ? planner.strand : null;

            return `
                <tr data-planner-id="${planner.planner_id}">
                    <td class="planner-id-cell">
                        <div class="planner-id-primary">
                            ${escapeHtml(subjectName)} — ${escapeHtml(gradeName)} —
                            <span class="badge-pill badge-trimester">T${planner.trimester || '?'}</span>
                        </div>
                        ${strand ? `<div class="planner-id-strand">${escapeHtml(strand)}</div>` : ''}
                    </td>
                    <td>
                        <span class="badge-pill ${programBadgeClass}">${escapeHtml(programName)}</span>
                    </td>
                    <td class="planner-author">${escapeHtml(authorName)}</td>
                    <td class="planner-ui-link ${linkedUnitTitle ? '' : 'empty'}">
                        ${linkedUnitTitle ? escapeHtml(linkedUnitTitle) : 'Sin UI vinculada'}
                    </td>
                    <td class="center">
                        <span class="badge-count ${criteriaCount > 0 ? 'has-data' : ''}">${criteriaCount}</span>
                    </td>
                    <td class="center">
                        <span class="badge-count ${cyclesCount > 0 ? 'has-data' : ''}">${cyclesCount}</span>
                    </td>
                    <td class="center">
                        <span class="badge-count ${commentsCount > 0 ? 'has-data' : ''}">${commentsCount}</span>
                    </td>
                    <td class="center">
                        <button type="button" class="btn-open" onclick="event.stopPropagation(); window.location.href='planner-form.html?planner_id=${planner.planner_id}'">
                            <i class="bi bi-arrow-right me-1"></i>Abrir
                        </button>
                    </td>
                </tr>
            `;
        }

        function renderResumen(planners) {
            const summary = document.getElementById('filters-summary');
            const totalAccessible = aplicarFiltroAlcance(yearData ? yearData.planners : []).length;
            summary.innerHTML = `Mostrando <strong>${planners.length}</strong> planeador(es) de <strong>${totalAccessible}</strong> accesibles en el año seleccionado.`;
        }

        function getProgramBadgeClass(programName) {
            const n = (programName || '').toUpperCase();
            if (n.includes('PEP')) return 'badge-program-pep';
            if (n.includes('PAI')) return 'badge-program-pai';
            if (n === 'PD' || n.includes('DIPLOMA')) return 'badge-program-pd';
            return 'badge-program-other';
        }

        // ============================================================
        // UTILIDADES GENÉRICAS
        // ============================================================
        function escapeHtml(text) {
            if (text === null || text === undefined) return '';
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }

        function mostrarLoading() {
            document.getElementById('loading-overlay')?.classList.remove('hidden');
        }
        function ocultarLoading() {
            document.getElementById('loading-overlay')?.classList.add('hidden');
        }

        function mostrarPantallaSinAcceso(mensaje) {
            ocultarLoading();
            const pageContent = document.getElementById('page-content');
            if (pageContent) {
                pageContent.style.display = 'block';
                pageContent.innerHTML = `
                    <div class="access-error-screen">
                        <i class="bi bi-exclamation-triangle"></i>
                        <h3>No es posible mostrar el listado</h3>
                        <p>${escapeHtml(mensaje)}</p>
                        <div class="mt-4">
                            <a href="../../dashboard.html" class="btn btn-primary">
                                <i class="bi bi-house me-1"></i>Volver al inicio
                            </a>
                        </div>
                    </div>
                `;
            }
        }

        console.log('✅ planners.html — paso 7 (listado general de planeadores para coordinaciones)');
    </script>
</body>
</html>
