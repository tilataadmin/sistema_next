<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="page-version" content="26.5.28.1">
    <title>Unidades de Indagación - SchoolNet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --planning-primary: #2C5F9B;
            --planning-primary-dark: #1F4775;
            --planning-light: #E8EFF7;
            --planning-border: #D0DCEC;
        }

        body {
            background: #f7f9fc;
        }

        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .loading-overlay.hidden { display: none; }
        .loading-content { background: white; padding: 2rem; border-radius: 8px; text-align: center; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid var(--planning-primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ====================================================
           HEADER DE LA PÁGINA
           ==================================================== */
        .page-header {
            background: white;
            border: 1px solid var(--planning-border);
            border-radius: 8px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.25rem;
        }
        .page-header h2 {
            color: var(--planning-primary-dark);
            font-size: 1.4rem;
            font-weight: 600;
            margin: 0 0 0.25rem 0;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .page-header h2 i {
            color: var(--planning-primary);
        }
        .page-header .header-subtitle {
            color: #6c757d;
            font-size: 0.88rem;
            margin: 0;
        }

        /* ====================================================
           FILTROS
           ==================================================== */
        .filters-bar {
            background: white;
            border: 1px solid var(--planning-border);
            border-radius: 8px;
            padding: 1rem 1.25rem;
            margin-bottom: 1.25rem;
        }
        .filters-bar .form-label {
            font-size: 0.78rem;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 0.3rem;
        }
        .filters-bar .form-select,
        .filters-bar .form-control {
            font-size: 0.88rem;
        }
        .filters-summary {
            font-size: 0.82rem;
            color: #6c757d;
            margin-top: 0.6rem;
        }
        .filters-summary strong {
            color: #333;
        }

        /* ====================================================
           TABLA DE UNIDADES
           ==================================================== */
        .units-table-wrapper {
            background: white;
            border: 1px solid var(--planning-border);
            border-radius: 8px;
            overflow: hidden;
        }
        .units-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }
        .units-table thead {
            background: var(--planning-light);
        }
        .units-table th {
            padding: 0.65rem 0.85rem;
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: var(--planning-primary-dark);
            text-align: left;
            border-bottom: 1px solid var(--planning-border);
            white-space: nowrap;
        }
        .units-table th.center {
            text-align: center;
        }
        .units-table tbody tr {
            border-top: 1px solid #f0f0f0;
            transition: background 0.1s;
        }
        .units-table tbody tr:hover {
            background: #fafbfc;
            cursor: pointer;
        }
        .units-table td {
            padding: 0.7rem 0.85rem;
            vertical-align: middle;
        }
        .units-table td.center {
            text-align: center;
        }
        .units-table .unit-title-cell {
            font-weight: 500;
            color: #1a1a1a;
            min-width: 200px;
        }
        .units-table .unit-title-cell.empty {
            color: #adb5bd;
            font-style: italic;
            font-weight: normal;
        }
        .units-table .unit-dates {
            font-size: 0.82rem;
            color: #555;
            white-space: nowrap;
        }
        .units-table .unit-dates.empty {
            color: #adb5bd;
            font-style: italic;
        }
        .units-table .author-cell {
            font-size: 0.82rem;
            color: #555;
        }

        /* Badges */
        .badge-pill {
            display: inline-block;
            padding: 0.18rem 0.5rem;
            border-radius: 12px;
            font-size: 0.72rem;
            font-weight: 500;
            white-space: nowrap;
        }
        .badge-program-pep { background: #e8f4f8; color: #0c5a73; }
        .badge-program-pai { background: #f0e8f8; color: #4a2773; }
        .badge-program-pd  { background: #f8efe8; color: #73450c; }
        .badge-program-other { background: #f0f0f0; color: #555; }

        .badge-stage-pending   { background: #f0f0f0; color: #6c757d; }
        .badge-stage-active    { background: #e8f4f8; color: #0c5a73; }
        .badge-stage-completed { background: #e8f5e9; color: #2e7d32; }
        .badge-stage-none      { background: #fff8e1; color: #7e6500; font-style: italic; }

        .badge-count {
            display: inline-block;
            min-width: 22px;
            padding: 0.15rem 0.45rem;
            border-radius: 11px;
            background: #f0f0f0;
            color: #555;
            font-size: 0.78rem;
            font-weight: 600;
            text-align: center;
        }
        .badge-count.has-data {
            background: var(--planning-light);
            color: var(--planning-primary-dark);
        }

        /* Acciones */
        .btn-open {
            background: var(--planning-primary);
            color: white;
            border: none;
            padding: 0.3rem 0.75rem;
            border-radius: 4px;
            font-size: 0.82rem;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn-open:hover {
            background: var(--planning-primary-dark);
            color: white;
        }

        /* ====================================================
           ESTADO VACÍO
           ==================================================== */
        .empty-state {
            text-align: center;
            padding: 3rem 1.5rem;
            color: #6c757d;
        }
        .empty-state i {
            font-size: 3rem;
            color: #adb5bd;
            display: block;
            margin-bottom: 0.75rem;
        }
        .empty-state h4 {
            color: #555;
            font-size: 1.05rem;
            margin-bottom: 0.5rem;
        }
        .empty-state p {
            font-size: 0.88rem;
            margin: 0;
        }

        /* ====================================================
           PANTALLA DE ERROR / SIN ACCESO
           ==================================================== */
        .access-error-screen {
            max-width: 600px;
            margin: 4rem auto;
            text-align: center;
            padding: 2rem;
        }
        .access-error-screen i {
            font-size: 4rem;
            color: #f59e0b;
        }
        .access-error-screen h3 {
            color: #333;
            margin-top: 1rem;
        }
        .access-error-screen p {
            color: #6c757d;
            font-size: 1rem;
            line-height: 1.6;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-content">
            <div class="spinner"></div>
            <p class="mb-0">Cargando unidades de indagación...</p>
        </div>
    </div>

    <div class="container-fluid" id="page-content" style="display:none;">

        <!-- BREADCRUMBS -->
        <nav aria-label="breadcrumb" class="mt-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="../../dashboard.html"><i class="bi bi-house me-1"></i>Dashboard</a></li>
                <li class="breadcrumb-item active" aria-current="page">Unidades de Indagación</li>
            </ol>
        </nav>

        <div id="alertContainer"></div>

        <!-- HEADER -->
        <div class="page-header">
            <h2><i class="bi bi-collection"></i>Unidades de Indagación</h2>
            <p class="header-subtitle">Listado de unidades a las que tiene acceso por su rol en la institución.</p>
        </div>

        <!-- FILTROS -->
        <div class="filters-bar">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Año académico</label>
                    <select class="form-select" id="filter-year"></select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Programa</label>
                    <select class="form-select" id="filter-program">
                        <option value="">Todos</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Grado</label>
                    <select class="form-select" id="filter-grade">
                        <option value="">Todos</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Buscar por título</label>
                    <input type="text" class="form-control" id="filter-search" placeholder="Texto del título...">
                </div>
            </div>
            <div class="filters-summary" id="filters-summary"></div>
        </div>

        <!-- TABLA -->
        <div class="units-table-wrapper">
            <div id="units-list-container">
                <!-- Render dinámico -->
            </div>
        </div>

    </div>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/config.js"></script>

    <script>
        // ============================================================
        // ESTADO GLOBAL
        // ============================================================
        let currentUser = null;
        let currentWorkerId = null;
        let currentWorkerEmail = null;

        // Año académico actual (default del selector)
        let currentYearId = null;

        // Catálogos y recursos cacheados
        let allYears = [];
        let allPrograms = [];
        let allGrades = [];
        let allSubjects = [];
        let allAreas = [];
        let allSections = [];
        let allWorkers = [];

        // Universo accesible para el usuario actual:
        // - gradeIdsForUser: grados donde tiene rol estructural (director de sección, director de programa, docente del grado)
        // - areaIdsAsCoordinator: áreas donde es coordinador
        // - programIdsAsDirector: programas donde es director
        // - sectionIdsAsDirector: secciones donde es director
        let gradeIdsForUser = new Set();
        let areaIdsAsCoordinator = new Set();
        let programIdsAsDirector = new Set();
        let sectionIdsAsDirector = new Set();

        // Cache de la última carga del año seleccionado
        // {
        //   units: [...],                                     // pln_units filtradas por alcance
        //   collaboratorsByUnit: Map<unit_id, [...]>,         // pln_unit_collaborators
        //   subjectIdsByUnit: Map<unit_id, Set<subject_id>>,  // pln_unit_subjects
        //   gradeIdByUnit: Map<unit_id, grade_id>,            // pln_unit_grades (1 por UI)
        //   cyclesByUnit: Map<unit_id, [...]>,                // pln_unit_cycles
        //   commentsCountByUnit: Map<unit_id, number>         // pln_comments activos
        // }
        let yearData = null;

        // ============================================================
        // INICIALIZACIÓN
        // ============================================================
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const hasAccess = await validatePageAccess('Gestionar unidades de indagación');
                if (!hasAccess) return;

                const session = getStoredSession();
                if (!session || !session.user) {
                    window.location.href = '../../login.html';
                    return;
                }
                currentUser = session.user;

                await loadCurrentWorker();
                if (!currentWorkerId) {
                    mostrarPantallaSinAcceso('No se encontró un trabajador vinculado a tu usuario.');
                    return;
                }

                // Cargar catálogos base + calcular alcance del usuario
                await loadCatalogs();
                calcularAlcanceUsuario();

                // Configurar filtros y cargar año vigente
                inicializarFiltros();
                await cargarUnidadesDelAnio(currentYearId);
                aplicarFiltrosYRender();

                ocultarLoading();
                document.getElementById('page-content').style.display = 'block';

                console.log('✅ units.html cargado');
            } catch (error) {
                console.error('❌ Error inicializando units.html:', error);
                mostrarPantallaSinAcceso('Ocurrió un error al cargar la página: ' + error.message);
            }
        });

        // ============================================================
        // CARGA DE CONTEXTO
        // ============================================================
        async function loadCurrentWorker() {
            const userMail = currentUser.user_mail;
            if (!userMail) return;

            const data = await supabaseRequest(
                `/workers?select=worker_id,worker_first_name,worker_last_name_1,worker_last_name_2,email&email=eq.${encodeURIComponent(userMail)}&limit=1`
            );
            if (data && data.length > 0) {
                currentWorkerId = data[0].worker_id;
                currentWorkerEmail = (data[0].email || '').toLowerCase().trim();
            }
        }

        async function loadCatalogs() {
            const [
                yearsRes,
                programsRes,
                gradesRes,
                subjectsRes,
                areasRes,
                sectionsRes,
                workersRes
            ] = await Promise.all([
                supabaseRequest('/academic_years?select=year_id,year_name,is_current&order=year_name.desc'),
                supabaseRequest('/programs?select=program_id,program_name,program_director_email&order=program_name.asc'),
                supabaseRequest('/grades?select=grade_id,grade_name,program_id,section_id&order=grade_name.asc'),
                supabaseRequest('/academic_subjects?select=subject_id,subject_name,area_id'),
                supabaseRequest('/academic_areas?select=area_id,area_name,coordinator_worker_id&area_status=eq.active'),
                supabaseRequest('/sections?select=section_id,section_name,director_email&section_status=eq.active'),
                supabaseRequest('/workers?select=worker_id,worker_first_name,worker_last_name_1,worker_last_name_2,email,worker_status&worker_status=eq.active')
            ]);

            allYears = yearsRes || [];
            allPrograms = programsRes || [];
            allGrades = gradesRes || [];
            allSubjects = subjectsRes || [];
            allAreas = areasRes || [];
            allSections = sectionsRes || [];
            allWorkers = workersRes || [];

            // Determinar año vigente
            const currentYear = allYears.find(y => y.is_current);
            currentYearId = currentYear ? currentYear.year_id : (allYears[0] ? allYears[0].year_id : null);

            if (!currentYearId) {
                throw new Error('No hay años académicos configurados.');
            }
        }

        // ============================================================
        // CÁLCULO DEL ALCANCE DEL USUARIO
        // ============================================================
        // Replica la lógica de canEdit() de unit-form.html pero a nivel global:
        // determina QUÉ GRADOS puede ver el usuario según su rol estructural.
        // Las UIs concretas se cruzan después con los datos cargados.
        function calcularAlcanceUsuario() {
            // 1. Áreas donde el worker es coordinador
            areaIdsAsCoordinator = new Set(
                allAreas
                    .filter(a => a.coordinator_worker_id === currentWorkerId)
                    .map(a => a.area_id)
            );

            // 2. Programas donde el worker es director (vía email)
            programIdsAsDirector = new Set(
                allPrograms
                    .filter(p => (p.program_director_email || '').toLowerCase().trim() === currentWorkerEmail)
                    .map(p => p.program_id)
            );

            // 3. Secciones donde el worker es director (vía email)
            sectionIdsAsDirector = new Set(
                allSections
                    .filter(s => (s.director_email || '').toLowerCase().trim() === currentWorkerEmail)
                    .map(s => s.section_id)
            );

            // 4. Grados accesibles por rol estructural:
            //    - grados de programas donde es director
            //    - grados de secciones donde es director
            gradeIdsForUser = new Set();
            allGrades.forEach(g => {
                if (g.program_id && programIdsAsDirector.has(g.program_id)) {
                    gradeIdsForUser.add(g.grade_id);
                }
                if (g.section_id && sectionIdsAsDirector.has(g.section_id)) {
                    gradeIdsForUser.add(g.grade_id);
                }
            });

            console.log('📊 Alcance del usuario:', {
                areasComoCoordinador: areaIdsAsCoordinator.size,
                programasComoDirector: programIdsAsDirector.size,
                seccionesComoDirector: sectionIdsAsDirector.size,
                gradosAccesibles: gradeIdsForUser.size
            });
        }

        // ============================================================
        // CARGA DE UIs DEL AÑO
        // ============================================================
        async function cargarUnidadesDelAnio(yearId) {
            mostrarLoading();
            try {
                // 1. Cargar TODAS las UIs activas del año (luego filtramos por alcance en cliente)
                const units = await supabaseRequest(
                    `/pln_units?select=*&academic_year_id=eq.${yearId}&unit_status=eq.active&order=created_at.desc`
                ) || [];

                if (units.length === 0) {
                    yearData = {
                        units: [],
                        collaboratorsByUnit: new Map(),
                        subjectIdsByUnit: new Map(),
                        gradeIdByUnit: new Map(),
                        cyclesByUnit: new Map(),
                        commentsCountByUnit: new Map()
                    };
                    ocultarLoading();
                    return;
                }

                const unitIds = units.map(u => u.unit_id);

                // 2. Cargar en paralelo las relaciones que necesitamos
                const [
                    collabs,
                    subjects,
                    grades,
                    cycles,
                    commentsActive
                ] = await Promise.all([
                    supabaseRequest(`/pln_unit_collaborators?select=unit_id,worker_id,is_lead&unit_id=in.(${unitIds.join(',')})`),
                    supabaseRequest(`/pln_unit_subjects?select=unit_id,subject_id&unit_id=in.(${unitIds.join(',')})`),
                    supabaseRequest(`/pln_unit_grades?select=unit_id,grade_id&unit_id=in.(${unitIds.join(',')})`),
                    supabaseRequest(`/pln_unit_cycles?select=cycle_id,unit_id,cycle_number,start_date,end_date,inquiry_stage_id&unit_id=in.(${unitIds.join(',')})&order=cycle_number.asc`),
                    supabaseRequest(`/pln_comments?select=comment_id,entity_id&entity_type=eq.unit&comment_status=eq.active&entity_id=in.(${unitIds.join(',')})`)
                ]);

                // 3. Construir índices
                const collaboratorsByUnit = new Map();
                (collabs || []).forEach(c => {
                    if (!collaboratorsByUnit.has(c.unit_id)) collaboratorsByUnit.set(c.unit_id, []);
                    collaboratorsByUnit.get(c.unit_id).push(c);
                });

                const subjectIdsByUnit = new Map();
                (subjects || []).forEach(s => {
                    if (!subjectIdsByUnit.has(s.unit_id)) subjectIdsByUnit.set(s.unit_id, new Set());
                    subjectIdsByUnit.get(s.unit_id).add(s.subject_id);
                });

                const gradeIdByUnit = new Map();
                (grades || []).forEach(g => {
                    gradeIdByUnit.set(g.unit_id, g.grade_id);
                });

                const cyclesByUnit = new Map();
                (cycles || []).forEach(c => {
                    if (!cyclesByUnit.has(c.unit_id)) cyclesByUnit.set(c.unit_id, []);
                    cyclesByUnit.get(c.unit_id).push(c);
                });

                // Comentarios de ciclos también cuentan: cada UI suma sus comentarios directos
                // + los comentarios de todos sus ciclos
                const cycleIds = (cycles || []).map(c => c.cycle_id);
                let cycleComments = [];
                if (cycleIds.length > 0) {
                    cycleComments = await supabaseRequest(
                        `/pln_comments?select=comment_id,entity_id&entity_type=eq.unit_cycle&comment_status=eq.active&entity_id=in.(${cycleIds.join(',')})`
                    ) || [];
                }

                // Mapeo cycle_id → unit_id para acumular
                const cycleToUnit = new Map();
                (cycles || []).forEach(c => cycleToUnit.set(c.cycle_id, c.unit_id));

                const commentsCountByUnit = new Map();
                (commentsActive || []).forEach(c => {
                    commentsCountByUnit.set(c.entity_id, (commentsCountByUnit.get(c.entity_id) || 0) + 1);
                });
                cycleComments.forEach(c => {
                    const uid = cycleToUnit.get(c.entity_id);
                    if (uid) {
                        commentsCountByUnit.set(uid, (commentsCountByUnit.get(uid) || 0) + 1);
                    }
                });

                yearData = {
                    units,
                    collaboratorsByUnit,
                    subjectIdsByUnit,
                    gradeIdByUnit,
                    cyclesByUnit,
                    commentsCountByUnit
                };

                console.log(`✅ ${units.length} UI(s) cargadas para el año seleccionado`);
            } catch (err) {
                console.error('Error cargando UIs del año:', err);
                showMessage('Error al cargar las unidades: ' + err.message, 'danger');
                yearData = null;
            } finally {
                ocultarLoading();
            }
        }

        // ============================================================
        // FILTRADO POR ALCANCE (rol estructural)
        // ============================================================
        // Aplica los 5 caminos de visibilidad (excluyendo "creador" porque
        // no tiene sentido para una vista de coordinación; el creador ya tiene
        // my-units.html para sus propias UIs)
        // 1. Es colaborador activo
        // 2. Es docente del grado en el año (cargado bajo demanda más abajo)
        // 3. Es coordinador del área de alguna materia de la UI
        // 4. Es director del programa del grado
        // 5. Es director de la sección del grado
        //
        // Para evitar consultar academic_assignments por cada UI (camino 2),
        // se decide: SI el usuario tiene rol estructural global (coordinador de
        // área, director de programa, director de sección), las UIs accesibles
        // se calculan por intersección de conjuntos en memoria. NO se consideran
        // las UIs visibles solo por ser colaborador (eso ya está cubierto en
        // my-units.html, donde el docente ve sus propias UIs).
        function aplicarFiltroAlcance(units) {
            if (!units) return [];

            // Si el usuario no tiene ningún rol estructural, no ve nada en esta pantalla
            const hasAnyStructuralRole =
                areaIdsAsCoordinator.size > 0 ||
                programIdsAsDirector.size > 0 ||
                sectionIdsAsDirector.size > 0;

            if (!hasAnyStructuralRole) return [];

            return units.filter(u => {
                // Camino 4 y 5: director de programa o sección → grado accesible
                const unitGradeId = yearData.gradeIdByUnit.get(u.unit_id);
                if (unitGradeId && gradeIdsForUser.has(unitGradeId)) {
                    return true;
                }

                // Camino 3: coordinador de área → alguna materia de la UI pertenece a un área propia
                if (areaIdsAsCoordinator.size > 0) {
                    const subjectIds = yearData.subjectIdsByUnit.get(u.unit_id) || new Set();
                    for (const sid of subjectIds) {
                        const subj = allSubjects.find(s => s.subject_id === sid);
                        if (subj && subj.area_id && areaIdsAsCoordinator.has(subj.area_id)) {
                            return true;
                        }
                    }
                }

                return false;
            });
        }

        // ============================================================
        // INICIALIZACIÓN DE FILTROS
        // ============================================================
        function inicializarFiltros() {
            // Años (selector)
            const yearSelect = document.getElementById('filter-year');
            yearSelect.innerHTML = allYears.map(y =>
                `<option value="${y.year_id}" ${y.year_id === currentYearId ? 'selected' : ''}>${escapeHtml(y.year_name)}${y.is_current ? ' (vigente)' : ''}</option>`
            ).join('');

            // Programas
            const programSelect = document.getElementById('filter-program');
            programSelect.innerHTML = '<option value="">Todos</option>' +
                allPrograms.map(p => `<option value="${p.program_id}">${escapeHtml(p.program_name)}</option>`).join('');

            // Grados (al cargar el filtro de programa se filtran)
            poblarFiltroGrados('');

            // Listeners
            yearSelect.addEventListener('change', async (e) => {
                await cargarUnidadesDelAnio(e.target.value);
                aplicarFiltrosYRender();
            });

            programSelect.addEventListener('change', (e) => {
                poblarFiltroGrados(e.target.value);
                aplicarFiltrosYRender();
            });

            document.getElementById('filter-grade').addEventListener('change', aplicarFiltrosYRender);

            // Buscador con debounce
            let searchTimer = null;
            document.getElementById('filter-search').addEventListener('input', () => {
                if (searchTimer) clearTimeout(searchTimer);
                searchTimer = setTimeout(aplicarFiltrosYRender, 300);
            });
        }

        function poblarFiltroGrados(programId) {
            const gradeSelect = document.getElementById('filter-grade');
            const selectedGrade = gradeSelect.value;

            let availableGrades = allGrades;
            if (programId) {
                availableGrades = allGrades.filter(g => g.program_id === programId);
            }

            gradeSelect.innerHTML = '<option value="">Todos</option>' +
                availableGrades.map(g => `<option value="${g.grade_id}">${escapeHtml(g.grade_name)}</option>`).join('');

            // Conservar la selección si sigue disponible
            if (selectedGrade && availableGrades.find(g => g.grade_id === selectedGrade)) {
                gradeSelect.value = selectedGrade;
            } else {
                gradeSelect.value = '';
            }
        }

        // ============================================================
        // APLICACIÓN DE FILTROS + RENDER
        // ============================================================
        function aplicarFiltrosYRender() {
            if (!yearData) {
                renderTabla([]);
                return;
            }

            // 1. Filtrar por alcance estructural
            let visibleUnits = aplicarFiltroAlcance(yearData.units);

            // 2. Aplicar filtros de UI
            const programFilter = document.getElementById('filter-program').value;
            const gradeFilter = document.getElementById('filter-grade').value;
            const searchFilter = document.getElementById('filter-search').value.trim().toLowerCase();

            if (programFilter) {
                visibleUnits = visibleUnits.filter(u => u.program_id === programFilter);
            }
            if (gradeFilter) {
                visibleUnits = visibleUnits.filter(u => yearData.gradeIdByUnit.get(u.unit_id) === gradeFilter);
            }
            if (searchFilter) {
                visibleUnits = visibleUnits.filter(u =>
                    (u.unit_title || '').toLowerCase().includes(searchFilter)
                );
            }

            // 3. Ordenar: por grado ascendente, luego por título
            visibleUnits.sort((a, b) => {
                const ga = yearData.gradeIdByUnit.get(a.unit_id);
                const gb = yearData.gradeIdByUnit.get(b.unit_id);
                const nameA = ga ? (allGrades.find(g => g.grade_id === ga)?.grade_name || 'zzz') : 'zzz';
                const nameB = gb ? (allGrades.find(g => g.grade_id === gb)?.grade_name || 'zzz') : 'zzz';
                if (nameA !== nameB) return nameA.localeCompare(nameB);
                return (a.unit_title || '').localeCompare(b.unit_title || '');
            });

            renderTabla(visibleUnits);
            renderResumen(visibleUnits);
        }

        // ============================================================
        // RENDER DE LA TABLA
        // ============================================================
        function renderTabla(units) {
            const container = document.getElementById('units-list-container');

            if (!yearData) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-exclamation-circle"></i>
                        <h4>No se pudieron cargar las unidades</h4>
                        <p>Intente recargar la página.</p>
                    </div>
                `;
                return;
            }

            if (units.length === 0) {
                const hasAnyStructuralRole =
                    areaIdsAsCoordinator.size > 0 ||
                    programIdsAsDirector.size > 0 ||
                    sectionIdsAsDirector.size > 0;

                if (!hasAnyStructuralRole) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="bi bi-shield-lock"></i>
                            <h4>No tiene rol estructural asignado</h4>
                            <p>Esta pantalla muestra las unidades a las que tiene acceso por ser coordinador de área, director de programa o director de sección. Si requiere acceso, contacte al administrador.</p>
                        </div>
                    `;
                } else {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="bi bi-inbox"></i>
                            <h4>Sin unidades para mostrar</h4>
                            <p>No hay unidades de indagación que coincidan con los filtros aplicados.</p>
                        </div>
                    `;
                }
                return;
            }

            const rows = units.map(u => renderRow(u)).join('');

            container.innerHTML = `
                <table class="units-table">
                    <thead>
                        <tr>
                            <th>Título</th>
                            <th>Grado</th>
                            <th>Programa</th>
                            <th>Autor</th>
                            <th>Fechas</th>
                            <th class="center"># ciclos</th>
                            <th class="center">Ciclo activo</th>
                            <th class="center"># comentarios</th>
                            <th class="center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows}
                    </tbody>
                </table>
            `;

            // Listeners: click en fila o en botón "Abrir" → ir a unit-form.html
            container.querySelectorAll('tbody tr[data-unit-id]').forEach(tr => {
                const unitId = tr.dataset.unitId;
                const handler = (e) => {
                    // No interferir si el click fue en un input/select (no hay en filas, pero por defensa)
                    if (e.target.closest('input, select, textarea')) return;
                    window.location.href = `unit-form.html?unit_id=${unitId}`;
                };
                tr.addEventListener('click', handler);
            });
        }

        function renderRow(unit) {
            // Grado y programa
            const gradeId = yearData.gradeIdByUnit.get(unit.unit_id);
            const grade = gradeId ? allGrades.find(g => g.grade_id === gradeId) : null;
            const gradeName = grade ? grade.grade_name : '—';

            const program = unit.program_id ? allPrograms.find(p => p.program_id === unit.program_id) : null;
            const programName = program ? program.program_name : '—';
            const programBadgeClass = getProgramBadgeClass(programName);

            // Autor: prioriza is_lead, fallback a created_by
            const authorName = obtenerAutorPrincipal(unit);

            // Fechas
            const datesLabel = formatearRangoFechas(unit.start_date, unit.end_date);

            // Ciclos: total + estado del ciclo activo
            const cycles = yearData.cyclesByUnit.get(unit.unit_id) || [];
            const cyclesCount = cycles.length;

            const activeStage = calcularEstadoCicloActivo(cycles);

            // Comentarios
            const commentsCount = yearData.commentsCountByUnit.get(unit.unit_id) || 0;

            // Título (puede ser "Sin título")
            const title = unit.unit_title && unit.unit_title.trim() && unit.unit_title.trim() !== 'Sin título'
                ? unit.unit_title
                : null;

            return `
                <tr data-unit-id="${unit.unit_id}">
                    <td class="unit-title-cell ${title ? '' : 'empty'}">
                        ${title ? escapeHtml(title) : 'Sin título'}
                    </td>
                    <td>${escapeHtml(gradeName)}</td>
                    <td>
                        <span class="badge-pill ${programBadgeClass}">${escapeHtml(programName)}</span>
                    </td>
                    <td class="author-cell">${escapeHtml(authorName)}</td>
                    <td class="unit-dates ${datesLabel ? '' : 'empty'}">
                        ${datesLabel || 'Sin definir'}
                    </td>
                    <td class="center">
                        <span class="badge-count ${cyclesCount > 0 ? 'has-data' : ''}">${cyclesCount}</span>
                    </td>
                    <td class="center">
                        ${renderActiveCycleBadge(activeStage)}
                    </td>
                    <td class="center">
                        <span class="badge-count ${commentsCount > 0 ? 'has-data' : ''}">${commentsCount}</span>
                    </td>
                    <td class="center">
                        <button type="button" class="btn-open" onclick="event.stopPropagation(); window.location.href='unit-form.html?unit_id=${unit.unit_id}'">
                            <i class="bi bi-arrow-right me-1"></i>Abrir
                        </button>
                    </td>
                </tr>
            `;
        }

        function renderResumen(units) {
            const summary = document.getElementById('filters-summary');
            const totalAccessible = aplicarFiltroAlcance(yearData ? yearData.units : []).length;
            summary.innerHTML = `Mostrando <strong>${units.length}</strong> unidad(es) de <strong>${totalAccessible}</strong> accesibles en el año seleccionado.`;
        }

        function renderActiveCycleBadge(stage) {
            if (!stage) {
                return `<span class="badge-pill badge-stage-none">Sin ciclos</span>`;
            }
            const labels = {
                pending: { label: 'Pendiente', cls: 'badge-stage-pending' },
                active: { label: 'En curso', cls: 'badge-stage-active' },
                completed: { label: 'Completado', cls: 'badge-stage-completed' }
            };
            const info = labels[stage] || labels.pending;
            return `<span class="badge-pill ${info.cls}">${info.label}</span>`;
        }

        // ============================================================
        // UTILIDADES DE NEGOCIO
        // ============================================================
        // Devuelve el nombre del autor principal de la UI:
        // - Si hay un colaborador con is_lead = true, ese.
        // - Si no, el creador (created_by).
        function obtenerAutorPrincipal(unit) {
            const collabs = yearData.collaboratorsByUnit.get(unit.unit_id) || [];
            const lead = collabs.find(c => c.is_lead);
            const leadWorkerId = lead ? lead.worker_id : unit.created_by;
            if (!leadWorkerId) return '—';
            const w = allWorkers.find(x => x.worker_id === leadWorkerId);
            if (!w) return '—';
            return `${w.worker_first_name} ${w.worker_last_name_1}`;
        }

        // Calcula el "estado del ciclo activo" de la UI:
        // - Si no hay ciclos, devuelve null.
        // - Si todos los ciclos tienen end_date < hoy, devuelve 'completed'.
        // - Si algún ciclo tiene start_date <= hoy <= end_date, devuelve 'active'.
        // - Si todos los ciclos tienen start_date > hoy, devuelve 'pending'.
        // - Casos mixtos sin ciclo "actual": el más cercano en el futuro define 'pending';
        //   si hay completados pero ninguno activo ni futuro, devuelve 'completed'.
        function calcularEstadoCicloActivo(cycles) {
            if (!cycles || cycles.length === 0) return null;
            const today = getCurrentDateColombia();

            // ¿Hay un ciclo activo (start <= hoy <= end)?
            const inProgress = cycles.find(c =>
                c.start_date && c.end_date &&
                c.start_date <= today && today <= c.end_date
            );
            if (inProgress) return 'active';

            // ¿Hay ciclos futuros (start > hoy)?
            const future = cycles.find(c => c.start_date && c.start_date > today);
            if (future) return 'pending';

            // ¿Todos completados?
            const allCompleted = cycles.every(c => c.end_date && c.end_date < today);
            if (allCompleted) return 'completed';

            // Caso por defecto: ciclos sin fechas → pending
            return 'pending';
        }

        function getProgramBadgeClass(programName) {
            const n = (programName || '').toUpperCase();
            if (n.includes('PEP')) return 'badge-program-pep';
            if (n.includes('PAI')) return 'badge-program-pai';
            if (n === 'PD' || n.includes('DIPLOMA')) return 'badge-program-pd';
            return 'badge-program-other';
        }

        function formatearRangoFechas(start, end) {
            if (!start && !end) return null;
            const fmt = (iso) => {
                if (!iso) return '?';
                const d = new Date(iso + 'T00:00:00');
                return d.toLocaleDateString('es-CO', { day: '2-digit', month: 'short' });
            };
            if (start && end) return `${fmt(start)} → ${fmt(end)}`;
            if (start) return `desde ${fmt(start)}`;
            return `hasta ${fmt(end)}`;
        }

        // ============================================================
        // UTILIDADES GENÉRICAS
        // ============================================================
        // Fecha actual Colombia (UTC-5 sin DST) en 'YYYY-MM-DD'
        function getCurrentDateColombia() {
            const now = new Date();
            // Offset Colombia: UTC-5
            const colombiaMs = now.getTime() - (5 * 60 * 60 * 1000);
            const d = new Date(colombiaMs);
            const y = d.getUTCFullYear();
            const m = String(d.getUTCMonth() + 1).padStart(2, '0');
            const dd = String(d.getUTCDate()).padStart(2, '0');
            return `${y}-${m}-${dd}`;
        }

        function escapeHtml(text) {
            if (text === null || text === undefined) return '';
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }

        function mostrarLoading() {
            document.getElementById('loading-overlay')?.classList.remove('hidden');
        }
        function ocultarLoading() {
            document.getElementById('loading-overlay')?.classList.add('hidden');
        }

        function mostrarPantallaSinAcceso(mensaje) {
            ocultarLoading();
            const pageContent = document.getElementById('page-content');
            if (pageContent) {
                pageContent.style.display = 'block';
                pageContent.innerHTML = `
                    <div class="access-error-screen">
                        <i class="bi bi-exclamation-triangle"></i>
                        <h3>No es posible mostrar el listado</h3>
                        <p>${escapeHtml(mensaje)}</p>
                        <div class="mt-4">
                            <a href="../../dashboard.html" class="btn btn-primary">
                                <i class="bi bi-house me-1"></i>Volver al inicio
                            </a>
                        </div>
                    </div>
                `;
            }
        }

        console.log('✅ units.html — paso 5 (listado general de UIs para coordinaciones)');
    </script>
</body>
</html>
