<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="page-version" content="26.07.09.10.00">
    <title>Mis unidades interdisciplinarias PAI - SchoolNet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --planning-primary: #2C5F9B;
            --planning-primary-dark: #1F4775;
            --planning-light: #E8EFF7;
            --planning-border: #D0DCEC;
        }
        body { background: #f8f9fa; }
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; justify-content: center;
            align-items: center; z-index: 9999;
        }
        .loading-overlay.hidden { display: none; }
        .loading-content {
            background: white; padding: 2rem; border-radius: 8px; text-align: center;
        }
        .spinner {
            border: 3px solid #f3f3f3; border-top: 3px solid var(--planning-primary);
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 0 auto 1rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .page-header {
            background: white; border: 1px solid var(--planning-border);
            border-radius: 8px; padding: 1.25rem 1.5rem; margin-bottom: 1.5rem;
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 1rem;
        }
        .page-header h1 {
            margin: 0; font-size: 1.35rem; font-weight: 600;
            color: var(--planning-primary-dark);
        }
        .page-header h1 i { color: var(--planning-primary); margin-right: 0.4rem; }
        .year-selector { display: flex; align-items: center; gap: 0.5rem; }
        .year-selector label { font-size: 0.9rem; color: #555; margin: 0; }
        .year-selector select {
            padding: 0.35rem 0.75rem; border: 1px solid #ced4da;
            border-radius: 4px; font-size: 0.9rem; min-width: 140px;
        }

        .section-card {
            background: white; border: 1px solid #e0e0e0; border-radius: 8px;
            margin-bottom: 1.5rem; overflow: hidden;
        }
        .section-card-header {
            padding: 0.9rem 1.25rem; background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
        }
        .section-card-header h5 {
            margin: 0; font-size: 1rem; font-weight: 600; color: #333;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .section-card-header h5 i { color: var(--planning-primary); }
        .section-card-body { padding: 1.25rem; }

        .form-row {
            display: grid; grid-template-columns: 2fr 1fr auto; gap: 1rem;
            align-items: end;
        }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
        .form-field label {
            font-weight: 500; font-size: 0.88rem; color: #333;
            margin-bottom: 0.3rem; display: block;
        }
        .form-field input, .form-field select {
            padding: 0.45rem 0.7rem; border: 1px solid #ced4da;
            border-radius: 4px; font-size: 0.92rem; width: 100%;
        }
        .form-field input:focus, .form-field select:focus {
            outline: none; border-color: var(--planning-primary);
            box-shadow: 0 0 0 0.15rem rgba(44,95,155,0.15);
        }
        .btn-create {
            background: var(--planning-primary); color: white;
            border: none; padding: 0.5rem 1.2rem; border-radius: 4px;
            font-size: 0.92rem; font-weight: 500; cursor: pointer;
            white-space: nowrap;
        }
        .btn-create:hover:not(:disabled) { background: var(--planning-primary-dark); }
        .btn-create:disabled { opacity: 0.5; cursor: not-allowed; }

        .unit-list { display: flex; flex-direction: column; gap: 0.6rem; }
        .unit-item {
            display: flex; align-items: center; justify-content: space-between;
            gap: 1rem; padding: 0.9rem 1.1rem; background: white;
            border: 1px solid #e0e0e0; border-radius: 6px;
            cursor: pointer; transition: all 0.15s;
        }
        .unit-item:hover {
            border-color: var(--planning-primary);
            background: var(--planning-light);
        }
        .unit-item-main { flex: 1; min-width: 0; }
        .unit-item-title {
            font-weight: 600; font-size: 0.98rem; color: #333;
            margin-bottom: 0.25rem;
        }
        .unit-item-meta {
            display: flex; gap: 0.85rem; flex-wrap: wrap;
            font-size: 0.82rem; color: #6c757d;
        }
        .unit-item-meta .meta-piece {
            display: flex; align-items: center; gap: 0.3rem;
        }
        .unit-item-creator {
            font-size: 0.78rem; color: #6c757d; font-style: italic;
            margin-top: 0.15rem;
        }
        .grade-badge {
            background: white; color: var(--planning-primary-dark);
            font-weight: 600; font-size: 0.82rem; padding: 0.2rem 0.55rem;
            border-radius: 4px; border: 1px solid var(--planning-border);
        }
        .empty-state {
            padding: 2.5rem 1rem; text-align: center;
            color: #6c757d;
        }
        .empty-state i {
            font-size: 2.5rem; color: #adb5bd; display: block;
            margin-bottom: 0.65rem;
        }
        .empty-state-title { font-weight: 500; color: #555; margin-bottom: 0.3rem; }
        .empty-state-hint { font-size: 0.88rem; }

        .alert-inline {
            padding: 0.75rem 1rem; border-radius: 4px; font-size: 0.9rem;
            margin-top: 0.75rem;
        }
        .alert-inline.info { background: #e7f3fe; color: #0c5460; border: 1px solid #b8e0f9; }
        .alert-inline.warn { background: #fff3cd; color: #6c4400; border: 1px solid #ffe69c; }
    </style>
</head>
<body>
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-content">
            <div class="spinner"></div>
            <p class="mb-0">Cargando...</p>
        </div>
    </div>

    <div class="container-fluid" id="page-content" style="display:none;">
        <nav aria-label="breadcrumb" class="mt-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="../../dashboard.html"><i class="bi bi-house me-1"></i>Dashboard</a></li>
                <li class="breadcrumb-item"><a href="index.html">Planeación</a></li>
                <li class="breadcrumb-item active" aria-current="page">Mis unidades interdisciplinarias PAI</li>
            </ol>
        </nav>

        <div class="page-header">
            <h1><i class="bi bi-diagram-3"></i>Mis unidades interdisciplinarias PAI</h1>
            <div class="year-selector">
                <label for="select-year">Año académico:</label>
                <select id="select-year"></select>
            </div>
        </div>

        <!-- CREAR UNIDAD NUEVA -->
        <div class="section-card">
            <div class="section-card-header">
                <h5><i class="bi bi-plus-circle"></i>Crear unidad interdisciplinaria</h5>
            </div>
            <div class="section-card-body">
                <div id="create-container">
                    <div class="form-row">
                        <div class="form-field">
                            <label for="input-title">Título de la unidad</label>
                            <input type="text" id="input-title" maxlength="300" placeholder="Ej: Sostenibilidad urbana en nuestra región">
                        </div>
                        <div class="form-field">
                            <label for="select-grade">Grado</label>
                            <select id="select-grade"><option value="">— Elegir grado —</option></select>
                        </div>
                        <div class="form-field">
                            <label>&nbsp;</label>
                            <button class="btn-create" id="btn-create" disabled>
                                <i class="bi bi-plus-lg me-1"></i>Crear
                            </button>
                        </div>
                    </div>
                    <div id="create-alert"></div>
                </div>
            </div>
        </div>

        <!-- LISTADO DE UNIDADES -->
        <div class="section-card">
            <div class="section-card-header">
                <h5><i class="bi bi-list-ul"></i>Mis unidades interdisciplinarias <span id="unit-count" style="font-weight:400;color:#6c757d;font-size:0.88rem;margin-left:0.4rem;"></span></h5>
            </div>
            <div class="section-card-body">
                <div id="units-list"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/config.js"></script>
    <script>
// ============================================================
// ESTADO GLOBAL
// ============================================================
let currentUser = null;
let currentWorkerId = null;
let allYears = [];
let allGrades = [];
let allPrograms = [];
let allSubjects = [];
let allWorkers = [];
let selectedYearId = null;

// Grados donde el docente tiene assignment activa en el año seleccionado
let misGradosEnAno = [];
// Asignaturas donde tengo assignment activa este año (por si las necesito para el listado)
let misSubjectsEnAno = [];

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', async function() {
    try {
        const session = getStoredSession();
        if (!session || !session.user) { window.location.href = '../../login.html'; return; }
        currentUser = session.user;

        const requiredPermissions = [
            'Mis unidades interdisciplinarias PAI',
            'Coordinar planeación de asignatura',
            'Coordinar planeación de programa',
            'Coordinar planeación de sección'
        ];
        const hasAccess = await checkModuleAccess(session.user.user_id, requiredPermissions);
        if (!hasAccess) { showAccessDenied(requiredPermissions.join(' / ')); return; }

        await loadCurrentWorker();
        if (!currentWorkerId) {
            mostrarPantallaError('No se encontró un trabajador vinculado a tu usuario.');
            return;
        }

        await loadContext();
        setupYearSelector();
        setupCreateForm();

        await refrescarVista();

        ocultarLoading();
        document.getElementById('page-content').style.display = 'block';
        console.log('✅ my-interdisc-units.html cargado');
    } catch (error) {
        console.error('❌', error);
        mostrarPantallaError(error.message);
    }
});

async function loadCurrentWorker() {
    const userMail = currentUser.user_mail;
    if (!userMail) return;
    const data = await supabaseRequest(
        `/workers?select=worker_id,worker_first_name,worker_last_name_1,email&email=eq.${encodeURIComponent(userMail)}&limit=1`
    );
    if (data && data.length > 0) currentWorkerId = data[0].worker_id;
}

async function loadContext() {
    const [yR, gR, pR, sR, wR] = await Promise.all([
        supabaseRequest('/academic_years?select=year_id,year_name,is_current&order=year_name.desc'),
        supabaseRequest('/grades?select=grade_id,grade_name,program_id,section_id&order=grade_name.asc'),
        supabaseRequest('/programs?select=program_id,program_name'),
        supabaseRequest('/academic_subjects?select=subject_id,subject_name,area_id'),
        supabaseRequest('/workers?select=worker_id,worker_first_name,worker_last_name_1&worker_status=eq.active')
    ]);
    allYears = yR || [];
    allGrades = gR || [];
    allPrograms = pR || [];
    allSubjects = sR || [];
    allWorkers = wR || [];
}

// ============================================================
// SELECTOR DE AÑO
// ============================================================
function setupYearSelector() {
    const sel = document.getElementById('select-year');
    sel.innerHTML = allYears.map(y =>
        `<option value="${y.year_id}" ${y.is_current ? 'selected' : ''}>${y.year_name}</option>`
    ).join('');
    // Si ninguno es_current, tomar el primero
    const current = allYears.find(y => y.is_current) || allYears[0];
    selectedYearId = current ? current.year_id : null;
    if (selectedYearId) sel.value = selectedYearId;

    sel.addEventListener('change', async () => {
        selectedYearId = sel.value;
        mostrarLoading();
        try {
            await refrescarVista();
        } finally {
            ocultarLoading();
        }
    });
}

// ============================================================
// CÁLCULO DE GRADOS Y ASIGNATURAS DEL DOCENTE EN EL AÑO
// ============================================================
async function calcularMisGradosYAsignaturas() {
    misGradosEnAno = [];
    misSubjectsEnAno = [];
    if (!selectedYearId || !currentWorkerId) return;

    const misAssignments = await supabaseRequest(
        `/academic_assignments?select=subject_id,course_id&worker_id=eq.${currentWorkerId}&academic_year_id=eq.${selectedYearId}&assignment_status=eq.active`
    );
    if (!misAssignments || misAssignments.length === 0) return;

    misSubjectsEnAno = [...new Set(misAssignments.map(a => a.subject_id))];
    const courseIds = [...new Set(misAssignments.map(a => a.course_id))];
    if (courseIds.length === 0) return;

    const misCourses = await supabaseRequest(
        `/courses?select=course_id,grade_id&course_id=in.(${courseIds.join(',')})`
    );
    misGradosEnAno = [...new Set((misCourses || []).map(c => c.grade_id))];
}

// ============================================================
// CREAR UNIDAD NUEVA
// ============================================================
function setupCreateForm() {
    const titleInput = document.getElementById('input-title');
    const gradeSelect = document.getElementById('select-grade');
    const btnCreate = document.getElementById('btn-create');

    const validar = () => {
        const okTitle = titleInput.value.trim().length > 0;
        const okGrade = gradeSelect.value !== '';
        btnCreate.disabled = !(okTitle && okGrade);
    };
    titleInput.addEventListener('input', validar);
    gradeSelect.addEventListener('change', validar);

    btnCreate.addEventListener('click', crearUnidad);
}

function renderGradeSelector() {
    const sel = document.getElementById('select-grade');
    const alertEl = document.getElementById('create-alert');
    alertEl.innerHTML = '';

    if (misGradosEnAno.length === 0) {
        sel.innerHTML = '<option value="">— Sin grados disponibles —</option>';
        sel.disabled = true;
        document.getElementById('btn-create').disabled = true;
        alertEl.innerHTML = `<div class="alert-inline warn"><i class="bi bi-info-circle me-1"></i>No tiene asignaciones académicas activas en el año seleccionado. No puede crear unidades interdisciplinarias en este año.</div>`;
        return;
    }

    const gradosOpciones = misGradosEnAno
        .map(gid => allGrades.find(g => g.grade_id === gid))
        .filter(g => g)
        .sort((a, b) => a.grade_name.localeCompare(b.grade_name));

    sel.innerHTML = '<option value="">— Elegir grado —</option>' +
        gradosOpciones.map(g => `<option value="${g.grade_id}">${escapeHtml(g.grade_name)}</option>`).join('');
    sel.disabled = false;
    document.getElementById('input-title').value = '';
    document.getElementById('btn-create').disabled = true;
}

async function crearUnidad() {
    const titleInput = document.getElementById('input-title');
    const gradeSelect = document.getElementById('select-grade');
    const btnCreate = document.getElementById('btn-create');
    const alertEl = document.getElementById('create-alert');

    const title = titleInput.value.trim();
    const gradeId = gradeSelect.value;
    if (!title || !gradeId) return;

    const grade = allGrades.find(g => g.grade_id === gradeId);
    const programId = grade ? grade.program_id : null;

    btnCreate.disabled = true;
    alertEl.innerHTML = '';

    try {
        // 1) INSERT en pln_interdisc_units
        const nuevaUnidad = await supabaseRequest('/pln_interdisc_units', {
            method: 'POST',
            body: JSON.stringify({
                unit_title: title,
                grade_id: gradeId,
                academic_year_id: selectedYearId,
                program_id: programId,
                created_by: currentWorkerId
            })
        });
        const unidad = Array.isArray(nuevaUnidad) ? nuevaUnidad[0] : nuevaUnidad;
        if (!unidad || !unidad.interdisc_unit_id) {
            throw new Error('No se pudo crear la unidad.');
        }

        // 2) INSERT vacío en pln_interdisc_unit_body (1:1)
        await supabaseRequest('/pln_interdisc_unit_body', {
            method: 'POST',
            body: JSON.stringify({ interdisc_unit_id: unidad.interdisc_unit_id })
        });

        // 3) Redirigir al form
        window.location.href = `interdisc-unit-form.html?interdisc_unit_id=${unidad.interdisc_unit_id}`;
    } catch (err) {
        console.error('Error al crear unidad:', err);
        alertEl.innerHTML = `<div class="alert-inline warn"><i class="bi bi-exclamation-triangle me-1"></i>No se pudo crear la unidad. Intente de nuevo.</div>`;
        btnCreate.disabled = false;
    }
}

// ============================================================
// LISTADO DE UNIDADES
// ============================================================
async function refrescarVista() {
    await calcularMisGradosYAsignaturas();
    renderGradeSelector();
    await cargarUnidades();
}

async function cargarUnidades() {
    const listContainer = document.getElementById('units-list');
    const countEl = document.getElementById('unit-count');
    listContainer.innerHTML = '';
    countEl.textContent = '';

    if (!selectedYearId) {
        listContainer.innerHTML = renderEmpty('bi-calendar-x', 'Seleccione un año académico');
        return;
    }

    // 1) Unidades donde soy el creador
    const creadas = await supabaseRequest(
        `/pln_interdisc_units?select=*&academic_year_id=eq.${selectedYearId}&created_by=eq.${currentWorkerId}&unit_status=eq.active&order=created_at.desc`
    ) || [];

    // 2) Unidades donde participo como profesor de alguna disciplina
    const mapaUnidades = new Map();
    creadas.forEach(u => mapaUnidades.set(u.interdisc_unit_id, u));

    if (misSubjectsEnAno.length > 0 && misGradosEnAno.length > 0) {
        const disciplinas = await supabaseRequest(
            `/pln_interdisc_unit_disciplines?select=interdisc_unit_id,subject_id&subject_id=in.(${misSubjectsEnAno.join(',')})`
        ) || [];
        const unitIds = [...new Set(disciplinas.map(d => d.interdisc_unit_id))];
        if (unitIds.length > 0) {
            const unidadesParticipa = await supabaseRequest(
                `/pln_interdisc_units?select=*&interdisc_unit_id=in.(${unitIds.join(',')})&academic_year_id=eq.${selectedYearId}&grade_id=in.(${misGradosEnAno.join(',')})&unit_status=eq.active&order=created_at.desc`
            ) || [];
            unidadesParticipa.forEach(u => {
                if (!mapaUnidades.has(u.interdisc_unit_id)) {
                    mapaUnidades.set(u.interdisc_unit_id, u);
                }
            });
        }
    }

    const unidades = Array.from(mapaUnidades.values())
        .sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));

    if (unidades.length === 0) {
        listContainer.innerHTML = renderEmpty(
            'bi-diagram-3',
            'Aún no hay unidades interdisciplinarias en este año',
            misGradosEnAno.length > 0 ? 'Puede crear una desde el bloque superior.' : ''
        );
        return;
    }

    countEl.textContent = `(${unidades.length})`;
    listContainer.innerHTML = `<div class="unit-list">${unidades.map(renderUnitItem).join('')}</div>`;
    listContainer.querySelectorAll('.unit-item').forEach(el => {
        el.addEventListener('click', () => {
            const uid = el.dataset.unitId;
            window.location.href = `interdisc-unit-form.html?interdisc_unit_id=${uid}`;
        });
    });
}

function renderUnitItem(u) {
    const grade = allGrades.find(g => g.grade_id === u.grade_id);
    const gradeName = grade ? grade.grade_name : '—';
    const creator = allWorkers.find(w => w.worker_id === u.created_by);
    const soyCreador = u.created_by === currentWorkerId;
    const creatorName = creator
        ? `${creator.worker_first_name} ${creator.worker_last_name_1}`
        : '—';
    const creatorLine = soyCreador ? '' :
        `<div class="unit-item-creator"><i class="bi bi-person me-1"></i>Creada por ${escapeHtml(creatorName)}</div>`;

    return `
        <div class="unit-item" data-unit-id="${u.interdisc_unit_id}">
            <div class="unit-item-main">
                <div class="unit-item-title">${escapeHtml(u.unit_title || '(Sin título)')}</div>
                <div class="unit-item-meta">
                    <span class="meta-piece"><span class="grade-badge">${escapeHtml(gradeName)}</span></span>
                    ${u.duration_hours ? `<span class="meta-piece"><i class="bi bi-clock"></i>${escapeHtml(u.duration_hours)}</span>` : ''}
                    <span class="meta-piece"><i class="bi bi-calendar3"></i>${u.updated_at ? formatDate(u.updated_at) : '—'}</span>
                </div>
                ${creatorLine}
            </div>
            <i class="bi bi-chevron-right" style="color:#adb5bd;"></i>
        </div>
    `;
}

function renderEmpty(icon, title, hint = '') {
    return `<div class="empty-state">
        <i class="bi ${icon}"></i>
        <div class="empty-state-title">${escapeHtml(title)}</div>
        ${hint ? `<div class="empty-state-hint">${escapeHtml(hint)}</div>` : ''}
    </div>`;
}

// ============================================================
// UTILIDADES
// ============================================================
function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric' });
}
function escapeHtml(text) {
    if (text === null || text === undefined) return '';
    const div = document.createElement('div');
    div.textContent = String(text);
    return div.innerHTML;
}
function mostrarLoading() { document.getElementById('loading-overlay')?.classList.remove('hidden'); }
function ocultarLoading() { document.getElementById('loading-overlay')?.classList.add('hidden'); }
function mostrarPantallaError(mensaje) {
    ocultarLoading();
    const pc = document.getElementById('page-content');
    if (pc) {
        pc.style.display = 'block';
        pc.innerHTML = `<div style="max-width:600px;margin:4rem auto;text-align:center;padding:2rem;">
            <i class="bi bi-exclamation-triangle" style="font-size:4rem;color:#f59e0b;"></i>
            <h3 class="mt-3" style="color:#333;">No es posible continuar</h3>
            <p class="text-muted mt-3" style="font-size:1rem;line-height:1.6;">${escapeHtml(mensaje)}</p>
            <div class="mt-4">
                <a href="index.html" class="btn btn-primary me-2"><i class="bi bi-arrow-left me-1"></i>Volver a Planeación</a>
                <a href="../../dashboard.html" class="btn btn-outline-secondary"><i class="bi bi-house me-1"></i>Inicio</a>
            </div>
        </div>`;
    }
}
console.log('✅ my-interdisc-units.html — cargado correctamente');
    </script>
</body>
</html>
