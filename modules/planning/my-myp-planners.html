<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="page-version" content="26.7.2.1">
    <title>Mis planeadores PAI - SchoolNet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --planning-primary: #2C5F9B;
            --planning-primary-dark: #1F4775;
            --planning-light: #E8EFF7;
            --planning-border: #D0DCEC;
        }
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; justify-content: center;
            align-items: center; z-index: 9999;
        }
        .loading-overlay.hidden { display: none; }
        .loading-content { background: white; padding: 2rem; border-radius: 8px; text-align: center; }
        .spinner {
            border: 3px solid #f3f3f3; border-top: 3px solid var(--planning-primary);
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 0 auto 1rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .page-header {
            background: var(--planning-light); border: 1px solid var(--planning-border);
            border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;
        }
        .page-header h1 { margin: 0; font-size: 1.6rem; font-weight: 600; color: #1a1a1a; }
        .year-selector { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; }
        .year-selector label { color: #555; margin: 0; }
        .year-selector select { min-width: 160px; }

        .block-card {
            background: white; border: 1px solid #e0e0e0;
            border-radius: 8px; margin-bottom: 1.5rem; overflow: hidden;
        }
        .block-header {
            padding: 1rem 1.25rem; background: #f8f9fa; border-bottom: 1px solid #e0e0e0;
            display: flex; align-items: center; justify-content: space-between;
        }
        .block-header h5 {
            margin: 0; font-size: 1rem; font-weight: 600; color: #333;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .block-header h5 i { color: var(--planning-primary); }
        .block-body { padding: 1.25rem; }

        .create-form {
            display: grid;
            grid-template-columns: 2fr 1.5fr 1fr auto;
            gap: 0.75rem; align-items: end;
        }
        .create-form .form-label { font-weight: 500; font-size: 0.85rem; color: #333; margin-bottom: 0.3rem; }
        .btn-create {
            background: var(--planning-primary); color: white; border: none;
            padding: 0.5rem 1rem; border-radius: 4px; font-size: 0.9rem;
            cursor: pointer; white-space: nowrap; height: fit-content;
        }
        .btn-create:hover { background: var(--planning-primary-dark); }
        .btn-create:disabled { background: #adb5bd; cursor: not-allowed; }
        @media (max-width: 900px) { .create-form { grid-template-columns: 1fr 1fr; } .btn-create { width: 100%; } }
        @media (max-width: 576px) { .create-form { grid-template-columns: 1fr; } }

        .planners-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .planners-table thead { background: #f8f9fa; }
        .planners-table th {
            padding: 0.75rem 1rem; font-weight: 600; color: #555; font-size: 0.82rem;
            text-transform: uppercase; letter-spacing: 0.3px;
            border-bottom: 1px solid #e0e0e0; text-align: left;
        }
        .planners-table td { padding: 0.85rem 1rem; border-bottom: 1px solid #f0f0f0; color: #333; vertical-align: middle; }
        .planners-table tbody tr { cursor: pointer; transition: background 0.15s; }
        .planners-table tbody tr:hover { background: var(--planning-light); }

        .planner-subject { font-weight: 500; color: var(--planning-primary-dark); }
        .planner-creator { font-size: 0.78rem; color: #6c757d; font-style: italic; }

        .trimester-badge {
            display: inline-block; background: var(--planning-light);
            color: var(--planning-primary-dark); padding: 0.2rem 0.5rem;
            border-radius: 12px; font-size: 0.78rem; font-weight: 600;
        }
        .status-badge { display: inline-block; padding: 0.2rem 0.55rem; border-radius: 12px; font-size: 0.76rem; font-weight: 500; }
        .status-badge.active  { background: #d4edda; color: #155724; }
        .status-badge.archived { background: #f0f0f0; color: #555; }
        .planner-date { color: #6c757d; font-size: 0.82rem; }

        .empty-state { text-align: center; padding: 2.5rem 1rem; color: #6c757d; }
        .empty-state i { font-size: 2.5rem; color: #adb5bd; margin-bottom: 0.75rem; display: block; }
        .empty-state p { margin-bottom: 0; }

        .existing-planner-alert {
            display: flex; align-items: center; justify-content: space-between;
            gap: 1rem; padding: 0.85rem 1rem; background: #fff3cd;
            border: 1px solid #ffe69c; color: #6c4400;
            border-radius: 6px; margin-top: 0.75rem; font-size: 0.88rem;
        }
        .existing-planner-alert .btn-go {
            background: #856404; color: white; border: none;
            padding: 0.35rem 0.85rem; border-radius: 4px;
            font-size: 0.82rem; cursor: pointer; text-decoration: none; white-space: nowrap;
        }
        .existing-planner-alert .btn-go:hover { background: #6c4400; }
    </style>
</head>
<body>

    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-content">
            <div class="spinner"></div>
            <p class="mb-0">Cargando...</p>
        </div>
    </div>

    <div class="container-fluid" id="page-content" style="display:none;">

        <nav aria-label="breadcrumb" class="mt-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item">
                    <a href="../../dashboard.html"><i class="bi bi-house me-1"></i>Dashboard</a>
                </li>
                <li class="breadcrumb-item active" aria-current="page">Mis planeadores PAI</li>
            </ol>
        </nav>

        <div id="alertContainer"></div>

        <div class="page-header">
            <h1><i class="bi bi-journal-richtext me-2" style="color: var(--planning-primary);"></i>Mis planeadores PAI</h1>
            <div class="year-selector">
                <label for="year-select">Año académico:</label>
                <select class="form-select form-select-sm" id="year-select"></select>
            </div>
        </div>

        <!-- BLOQUE: CREAR -->
        <div class="block-card">
            <div class="block-header">
                <h5><i class="bi bi-plus-circle"></i>Crear planeador PAI</h5>
            </div>
            <div class="block-body">
                <div class="create-form">
                    <div>
                        <label class="form-label" for="select-subject">Asignatura</label>
                        <select class="form-select" id="select-subject">
                            <option value="">Seleccionar...</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label" for="select-grade">Grado</label>
                        <select class="form-select" id="select-grade" disabled>
                            <option value="">Primero elija asignatura</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label" for="select-trimester">Trimestre</label>
                        <select class="form-select" id="select-trimester">
                            <option value="">Seleccionar...</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                        </select>
                    </div>
                    <button type="button" class="btn-create" id="btn-create-planner" disabled>
                        <i class="bi bi-plus-lg me-1"></i>Crear
                    </button>
                </div>
                <div id="existing-planner-container"></div>
            </div>
        </div>

        <!-- BLOQUE: LISTADO -->
        <div class="block-card">
            <div class="block-header">
                <h5>
                    <i class="bi bi-list-ul"></i>
                    Planeadores del año <span id="header-year-name">—</span>
                    <span class="text-muted small fw-normal ms-1" id="planners-count-label"></span>
                </h5>
            </div>
            <div class="block-body">
                <div id="planners-list-container">
                    <div class="empty-state">
                        <i class="bi bi-hourglass-split"></i>
                        <p>Cargando planeadores...</p>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/config.js"></script>
    <script>
        // ============================================================
        // ESTADO GLOBAL
        // ============================================================
        let currentUser    = null;
        let currentWorkerId = null;
        let allYears       = [];
        let selectedYearId = null;
        let allGrades      = [];
        let allSubjects    = [];
        let allWorkers     = [];

        // Map<subject_id, Map<grade_id, {grade_id, grade_name, program_id, section_id}>>
        let myAssignmentsBySubject = new Map();
        let visiblePlanners = [];

        // ============================================================
        // INICIALIZACIÓN
        // ============================================================
        document.addEventListener('DOMContentLoaded', async function () {
            try {
                const session = getStoredSession();
                if (!session || !session.user) { window.location.href = '../../login.html'; return; }
                currentUser = session.user;

                const requiredPermissions = [
                    'Mis planeadores PAI',
                    'Coordinar planeación de asignatura',
                    'Coordinar planeación de programa',
                    'Coordinar planeación de sección'
                ];
                const hasAccess = await checkModuleAccess(session.user.user_id, requiredPermissions);
                if (!hasAccess) {
                    showAccessDenied(requiredPermissions.join(' / '));
                    return;
                }

                await loadCurrentWorker();
                if (!currentWorkerId) { mostrarError('No se encontró un trabajador vinculado a tu usuario.'); return; }

                await loadContext();
                renderYearSelector();

                document.getElementById('year-select').addEventListener('change', onYearChange);
                document.getElementById('select-subject').addEventListener('change', onSubjectChange);
                document.getElementById('select-grade').addEventListener('change', validateExistingPlanner);
                document.getElementById('select-trimester').addEventListener('change', validateExistingPlanner);
                document.getElementById('btn-create-planner').addEventListener('click', crearPlaneador);

                await refreshYearData();

                ocultarLoading();
                document.getElementById('page-content').style.display = 'block';
                console.log('✅ my-myp-planners.html cargado');
            } catch (error) {
                console.error('❌ Error inicializando:', error);
                mostrarError(error.message);
            }
        });

        // ============================================================
        // CARGA DEL WORKER ACTUAL
        // ============================================================
        async function loadCurrentWorker() {
            const userMail = currentUser.user_mail;
            if (!userMail) return;
            const data = await supabaseRequest(
                `/workers?select=worker_id,worker_first_name,worker_last_name_1&email=eq.${encodeURIComponent(userMail)}&limit=1`
            );
            if (data && data.length > 0) currentWorkerId = data[0].worker_id;
        }

        // ============================================================
        // CARGA DE CATÁLOGOS
        // ============================================================
        async function loadContext() {
            const [yearsRes, gradesRes, subjectsRes, workersRes] = await Promise.all([
                supabaseRequest('/academic_years?select=year_id,year_name,is_current&order=year_name.desc'),
                supabaseRequest('/grades?select=grade_id,grade_name,program_id,section_id&order=grade_name.asc'),
                supabaseRequest('/academic_subjects?select=subject_id,subject_name&order=subject_name.asc'),
                supabaseRequest('/workers?select=worker_id,worker_first_name,worker_last_name_1&worker_status=eq.active')
            ]);
            allYears    = yearsRes    || [];
            allGrades   = gradesRes   || [];
            allSubjects = subjectsRes || [];
            allWorkers  = workersRes  || [];

            const current = allYears.find(y => y.is_current);
            selectedYearId = current ? current.year_id : (allYears[0]?.year_id || null);
        }

        function renderYearSelector() {
            const select = document.getElementById('year-select');
            select.innerHTML = allYears.map(y =>
                `<option value="${y.year_id}" ${y.year_id === selectedYearId ? 'selected' : ''}>
                    ${escapeHtml(y.year_name)}${y.is_current ? ' (vigente)' : ''}
                </option>`
            ).join('');
        }

        async function onYearChange(e) {
            selectedYearId = e.target.value;
            mostrarLoading();
            try { await refreshYearData(); } finally { ocultarLoading(); }
        }

        // ============================================================
        // CARGA DE DATOS DEL AÑO SELECCIONADO
        // ============================================================
        async function refreshYearData() {
            // Solo asignaciones en grados del Programa de los Años Intermedios (PAI)
            const paiProgramRes = await supabaseRequest(
                `/programs?select=program_id&program_name=like.PAI*&program_status=eq.active`
            );
            const paiProgramIds = (paiProgramRes || []).map(p => p.program_id);

            myAssignmentsBySubject = new Map();

            if (paiProgramIds.length > 0) {
                const assignmentsRes = await supabaseRequest(
                    `/academic_assignments?select=subject_id,courses(grade_id,grades(grade_id,grade_name,program_id,section_id))&worker_id=eq.${currentWorkerId}&academic_year_id=eq.${selectedYearId}&assignment_status=eq.active`
                );

                (assignmentsRes || []).forEach(a => {
                    const grade = a.courses?.grades;
                    if (!grade) return;
                    if (!paiProgramIds.includes(grade.program_id)) return;
                    if (!myAssignmentsBySubject.has(a.subject_id)) myAssignmentsBySubject.set(a.subject_id, new Map());
                    const gradesMap = myAssignmentsBySubject.get(a.subject_id);
                    if (!gradesMap.has(grade.grade_id)) {
                        gradesMap.set(grade.grade_id, {
                            grade_id: grade.grade_id, grade_name: grade.grade_name,
                            program_id: grade.program_id, section_id: grade.section_id
                        });
                    }
                });
            }

            // Pares (subject_id, grade_id) donde tengo assignment
            const myPairs = [];
            myAssignmentsBySubject.forEach((gradesMap, subjectId) => {
                gradesMap.forEach((_, gradeId) => myPairs.push({ subject_id: subjectId, grade_id: gradeId }));
            });

            // Planeadores PAI visibles (level IS NULL, dentro de mis pares subject+grade)
            visiblePlanners = [];
            if (myPairs.length > 0) {
                const subjectIds = [...new Set(myPairs.map(p => p.subject_id))];
                const gradeIds   = [...new Set(myPairs.map(p => p.grade_id))];

                const plannersRes = await supabaseRequest(
                    `/pln_planners?select=*&academic_year_id=eq.${selectedYearId}&subject_id=in.(${subjectIds.join(',')})&grade_id=in.(${gradeIds.join(',')})&planner_status=neq.deleted&level=is.null&dp_outline_id=is.null&unit_id=is.null&order=updated_at.desc`
                );

                const pairKey = (s, g) => `${s}::${g}`;
                const myPairsSet = new Set(myPairs.map(p => pairKey(p.subject_id, p.grade_id)));
                visiblePlanners = (plannersRes || []).filter(p => myPairsSet.has(pairKey(p.subject_id, p.grade_id)));
            }

            renderSubjectSelector();
            renderPlannersList();

            document.getElementById('select-subject').value = '';
            document.getElementById('select-grade').innerHTML = '<option value="">Primero elija asignatura</option>';
            document.getElementById('select-grade').disabled = true;
            document.getElementById('select-trimester').value = '';
            document.getElementById('existing-planner-container').innerHTML = '';
            updateCreateButtonState();

            const yearObj = allYears.find(y => y.year_id === selectedYearId);
            document.getElementById('header-year-name').textContent = yearObj ? yearObj.year_name : '—';
        }

        // ============================================================
        // FORMULARIO
        // ============================================================
        function renderSubjectSelector() {
            const select = document.getElementById('select-subject');
            if (myAssignmentsBySubject.size === 0) {
                select.innerHTML = '<option value="">No tiene asignaciones en este año</option>';
                select.disabled = true;
                return;
            }
            const subjectIds = Array.from(myAssignmentsBySubject.keys());
            const subjects = subjectIds
                .map(sid => allSubjects.find(s => s.subject_id === sid))
                .filter(s => s)
                .sort((a, b) => a.subject_name.localeCompare(b.subject_name));
            select.disabled = false;
            select.innerHTML = '<option value="">Seleccionar...</option>' +
                subjects.map(s => `<option value="${s.subject_id}">${escapeHtml(s.subject_name)}</option>`).join('');
        }

        function onSubjectChange(e) {
            const subjectId = e.target.value;
            const gradeSelect = document.getElementById('select-grade');
            document.getElementById('existing-planner-container').innerHTML = '';

            if (!subjectId) {
                gradeSelect.innerHTML = '<option value="">Primero elija asignatura</option>';
                gradeSelect.disabled = true;
                updateCreateButtonState();
                return;
            }
            const gradesMap = myAssignmentsBySubject.get(subjectId);
            if (!gradesMap || gradesMap.size === 0) {
                gradeSelect.innerHTML = '<option value="">Sin grados para esta asignatura</option>';
                gradeSelect.disabled = true;
                updateCreateButtonState();
                return;
            }
            const grades = Array.from(gradesMap.values()).sort((a, b) => a.grade_name.localeCompare(b.grade_name));
            gradeSelect.disabled = false;
            if (grades.length === 1) {
                gradeSelect.innerHTML = `<option value="${grades[0].grade_id}" selected>${escapeHtml(grades[0].grade_name)}</option>`;
            } else {
                gradeSelect.innerHTML = '<option value="">Seleccionar...</option>' +
                    grades.map(g => `<option value="${g.grade_id}">${escapeHtml(g.grade_name)}</option>`).join('');
            }
            updateCreateButtonState();
            validateExistingPlanner();
        }

        function updateCreateButtonState() {
            const sid = document.getElementById('select-subject').value;
            const gid = document.getElementById('select-grade').value;
            const tri = document.getElementById('select-trimester').value;
            document.getElementById('btn-create-planner').disabled = !(sid && gid && tri);
        }

        async function validateExistingPlanner() {
            updateCreateButtonState();
            const subjectId  = document.getElementById('select-subject').value;
            const gradeId    = document.getElementById('select-grade').value;
            const trimester  = document.getElementById('select-trimester').value;
            const container  = document.getElementById('existing-planner-container');

            if (!subjectId || !gradeId || !trimester) { container.innerHTML = ''; return; }

            // Buscar en visibles primero
            let existing = visiblePlanners.find(p =>
                p.subject_id === subjectId && p.grade_id === gradeId &&
                p.trimester === parseInt(trimester, 10)
            );

            // Si no está, consultar BD (puede haberlo creado otro docente)
            if (!existing) {
                const res = await supabaseRequest(
                    `/pln_planners?select=*&subject_id=eq.${subjectId}&grade_id=eq.${gradeId}&level=is.null&trimester=eq.${trimester}&academic_year_id=eq.${selectedYearId}&planner_status=neq.deleted&limit=1`
                );
                if (res && res.length > 0) existing = res[0];
            }

            if (existing) {
                const subject = allSubjects.find(s => s.subject_id === subjectId);
                const grade   = allGrades.find(g => g.grade_id === gradeId);
                const creator = allWorkers.find(w => w.worker_id === existing.teacher_id);
                const creatorLabel = creator
                    ? `, creado por ${creator.worker_first_name} ${creator.worker_last_name_1}` : '';
                container.innerHTML = `
                    <div class="existing-planner-alert">
                        <div>
                            <i class="bi bi-info-circle me-1"></i>
                            Ya existe el planeador de <strong>${escapeHtml(subject?.subject_name || '')}</strong>
                            ${escapeHtml(grade?.grade_name || '')},
                            trimestre <strong>${trimester}</strong>${escapeHtml(creatorLabel)}.
                        </div>
                        <a href="myp-planner-form.html?planner_id=${existing.planner_id}" class="btn-go">
                            <i class="bi bi-arrow-right me-1"></i>Abrir planeador
                        </a>
                    </div>
                `;
                document.getElementById('btn-create-planner').disabled = true;
            } else {
                container.innerHTML = '';
                updateCreateButtonState();
            }
        }

        // ============================================================
        // CREAR PLANEADOR PAI
        // 1. POST pln_planners (level=NULL, dp_outline_id=NULL, unit_id=NULL)
        // 2. POST pln_planner_myp (extensión vacía)
        // 3. Redirigir a myp-planner-form.html
        // ============================================================
        async function crearPlaneador() {
            const btn = document.getElementById('btn-create-planner');
            if (btn.disabled) return;
            btn.disabled = true;

            try {
                const subjectId = document.getElementById('select-subject').value;
                const gradeId   = document.getElementById('select-grade').value;
                const trimester = parseInt(document.getElementById('select-trimester').value, 10);

                const grade = allGrades.find(g => g.grade_id === gradeId);
                if (!grade) throw new Error('Grado no encontrado.');
                if (!grade.program_id) {
                    throw new Error(`El grado "${grade.grade_name}" no tiene programa asignado. Pida al administrador configurarlo en "Gestión de Grados".`);
                }

                // 1. Crear el planeador base
                const plannerRes = await supabaseRequest('/pln_planners', {
                    method: 'POST',
                    body: JSON.stringify({
                        subject_id:       subjectId,
                        grade_id:         gradeId,
                        trimester:        trimester,
                        academic_year_id: selectedYearId,
                        teacher_id:       currentWorkerId,
                        program_id:       grade.program_id,
                        level:            null,
                        dp_outline_id:    null,
                        unit_id:          null,
                        planner_status:   'active'
                    })
                });

                if (!plannerRes || plannerRes.length === 0) throw new Error('No se pudo crear el planeador.');
                const newPlannerId = plannerRes[0].planner_id;

                // 2. Crear la extensión PAI (vacía)
                await supabaseRequest('/pln_planner_myp', {
                    method: 'POST',
                    body: JSON.stringify({ planner_id: newPlannerId })
                });

                console.log(`✅ Planeador PAI creado: ${newPlannerId}`);
                window.location.href = `myp-planner-form.html?planner_id=${newPlannerId}`;

            } catch (error) {
                console.error('❌ Error creando planeador:', error);
                showMessage('Error al crear el planeador: ' + error.message, 'danger');
                btn.disabled = false;
            }
        }

        // ============================================================
        // LISTADO DE PLANEADORES
        // ============================================================
        function renderPlannersList() {
            const container  = document.getElementById('planners-list-container');
            const countLabel = document.getElementById('planners-count-label');

            if (visiblePlanners.length === 0) {
                if (countLabel) countLabel.textContent = '';
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-journal-x"></i>
                        <p>Aún no hay planeadores PAI para sus asignaciones de este año.</p>
                        <small class="text-muted">Use el formulario de arriba para crear uno.</small>
                    </div>
                `;
                return;
            }

            if (countLabel) countLabel.textContent = `(${visiblePlanners.length})`;

            const rows = visiblePlanners.map(p => {
                const subject = allSubjects.find(s => s.subject_id === p.subject_id);
                const grade   = allGrades.find(g => g.grade_id === p.grade_id);
                const statusClass = p.planner_status === 'active' ? 'active' : 'archived';
                const statusLabel = p.planner_status === 'active' ? 'Activo' : 'Archivado';
                const updatedAt = p.updated_at ? formatDate(p.updated_at) : '—';

                let creatorBadge = '';
                if (p.teacher_id !== currentWorkerId) {
                    const creator = allWorkers.find(w => w.worker_id === p.teacher_id);
                    if (creator) {
                        creatorBadge = `<div class="planner-creator">Creado por ${escapeHtml(creator.worker_first_name)} ${escapeHtml(creator.worker_last_name_1)}</div>`;
                    }
                }

                return `
                    <tr data-planner-id="${p.planner_id}">
                        <td>
                            <div class="planner-subject">${escapeHtml(subject?.subject_name || 'Sin asignatura')}</div>
                            ${creatorBadge}
                        </td>
                        <td>${escapeHtml(grade?.grade_name || '—')}</td>
                        <td><span class="trimester-badge">T${p.trimester}</span></td>
                        <td><span class="status-badge ${statusClass}">${statusLabel}</span></td>
                        <td class="planner-date">${updatedAt}</td>
                    </tr>
                `;
            }).join('');

            container.innerHTML = `
                <table class="planners-table">
                    <thead>
                        <tr>
                            <th>Asignatura</th>
                            <th>Grado</th>
                            <th>Trimestre</th>
                            <th>Estado</th>
                            <th>Última edición</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;

            container.querySelectorAll('tbody tr').forEach(tr => {
                tr.addEventListener('click', () => {
                    window.location.href = `myp-planner-form.html?planner_id=${tr.dataset.plannerId}`;
                });
            });
        }

        // ============================================================
        // UTILIDADES
        // ============================================================
        function formatDate(isoDate) {
            if (!isoDate) return '';
            const d = new Date(isoDate);
            return d.toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric' }) +
                   ' ' + d.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
        }

        function escapeHtml(text) {
            if (text === null || text === undefined) return '';
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }

        function mostrarLoading()  { document.getElementById('loading-overlay')?.classList.remove('hidden'); }
        function ocultarLoading()  { document.getElementById('loading-overlay')?.classList.add('hidden'); }

        function mostrarError(mensaje) {
            ocultarLoading();
            const pc = document.getElementById('page-content');
            if (pc) {
                pc.style.display = 'block';
                pc.innerHTML = `
                    <div style="max-width:600px;margin:4rem auto;text-align:center;padding:2rem;">
                        <i class="bi bi-exclamation-triangle" style="font-size:4rem;color:#f59e0b;"></i>
                        <h3 class="mt-3" style="color:#333;">No es posible continuar</h3>
                        <p class="text-muted mt-3" style="font-size:1rem;line-height:1.6;">${escapeHtml(mensaje)}</p>
                        <div class="mt-4">
                            <a href="../../dashboard.html" class="btn btn-primary">
                                <i class="bi bi-house me-1"></i>Volver al inicio
                            </a>
                        </div>
                    </div>
                `;
            }
        }

        console.log('✅ my-myp-planners.html — script cargado');
    </script>
</body>
</html>
