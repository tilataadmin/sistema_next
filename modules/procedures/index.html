<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="page-version" content="26.03.31.11.35">
    
    <title>Procedimientos - SchoolNet</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #6f42c1;
            --secondary-color: #9b6fd9;
            --tertiary-color: #f3effa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
        }

        .main-content {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .breadcrumb {
            background: transparent;
            padding: 0;
            margin-bottom: 1.5rem;
        }

        .breadcrumb-item a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            transition: all 0.2s;
        }

        .breadcrumb-item a i {
            font-size: 1.25rem;
        }

        .breadcrumb-item a:hover {
            color: var(--secondary-color);
            transform: translateY(-1px);
        }

        .breadcrumb-item.active {
            color: #64748b;
            font-weight: 500;
        }

        .module-header {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .module-icon-large {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .module-title {
            font-size: 2rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .module-subtitle {
            color: #64748b;
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--secondary-color);
            text-decoration: none;
            font-weight: 500;
            transition: gap 0.2s;
        }

        .back-link:hover {
            gap: 0.75rem;
        }

        .functions-section {
            margin-top: 2rem;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .function-card {
            background: white;
            border-radius: 12px;
            padding: 1.75rem;
            height: 100%;
            border: 2px solid #e2e8f0;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .function-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.12);
            border-color: var(--secondary-color);
        }

        .function-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--primary-color);
        }

        .function-name {
            font-size: 1.15rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        .function-description {
            font-size: 0.9rem;
            color: #64748b;
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .function-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--secondary-color);
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            transition: gap 0.2s;
        }

        .function-card:hover .function-link {
            gap: 0.75rem;
        }

        .loading-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }

        .spinner-container {
            text-align: center;
        }

        .spinner-border {
            width: 3rem;
            height: 3rem;
            border-width: 0.3rem;
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 1rem;
            }

            .module-header {
                padding: 1.5rem;
            }

            .module-title {
                font-size: 1.5rem;
            }

            .function-card {
                padding: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <!-- Main Content -->
    <div class="main-content">
        <!-- Loading State -->
        <div class="loading-container" id="loadingContainer">
            <div class="spinner-container">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-3 text-muted">Cargando módulo...</p>
            </div>
        </div>

        <!-- Module Content (hidden initially) -->
        <div id="moduleContent" style="display: none;">
            <!-- Breadcrumb -->
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item">
                        <a href="../../dashboard.html">
                            <i class="bi bi-house-door-fill"></i>
                        </a>
                    </li>
                    <li class="breadcrumb-item active" aria-current="page">
                        Procedimientos
                    </li>
                </ol>
            </nav>

            <!-- Module Header -->
            <div class="module-header">
                <div class="module-icon-large">
                    <i class="bi bi-diagram-3"></i>
                </div>
                <h1 class="module-title">Procedimientos</h1>
                <p class="module-subtitle">
                    Gestiona procedimientos institucionales con flujos definidos
                </p>
                <a href="../../dashboard.html" class="back-link">
                    <i class="bi bi-arrow-left"></i>
                    Volver al Dashboard
                </a>
            </div>

            <!-- Functions Grid -->
            <div class="functions-section">
                <h2 class="section-title">
                    <i class="bi bi-grid-3x3-gap"></i>
                    Funcionalidades
                </h2>
                <div class="row g-4" id="functionsGrid">
                    <!-- Se llenará dinámicamente -->
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Config.js -->
    <script src="../../assets/js/config.js"></script>
    
    <script>
        // ==========================================
        // CONFIGURACIÓN DEL MÓDULO
        // ==========================================
        
        const MODULE_CONFIG = {
            id: 'procedures',
            name: 'Procedimientos',
            description: 'Gestiona procedimientos institucionales con flujos definidos',
            icon: 'bi-diagram-3',
            modulePermissions: [
                'Acceso al módulo de procedimientos',
                'Gestionar formularios',
                'Gestionar procedimientos',
                'Ejecutar procedimientos',
                'Ver mis solicitudes',
                'Consultar todos los registros',
                'Ver dashboard de procedimientos',
                'Ejecutar formularios',
                'Consultar respuestas de formularios'
            ],
            functions: [
                {
                    name: 'Dashboard',
                    description: 'Vista general con métricas, tareas pendientes y alertas',
                    icon: 'bi-speedometer2',
                    path: 'dashboard.html',
                    permission: 'Ver dashboard de procedimientos'
                },
                {
                    name: 'Gestionar Formularios',
                    description: 'Crear y configurar formularios reutilizables',
                    icon: 'bi-file-earmark-text',
                    path: 'forms.html',
                    permission: 'Gestionar formularios'
                },
                {
                    name: 'Gestionar Procedimientos',
                    description: 'Diseñar y configurar procedimientos con pasos y bifurcaciones',
                    icon: 'bi-diagram-3',
                    path: 'procedures.html',
                    permission: 'Gestionar procedimientos'
                },
                {
                    name: 'Ejecutar Procedimiento',
                    description: 'Iniciar una nueva instancia de procedimiento',
                    icon: 'bi-play-circle',
                    path: 'execute.html',
                    permission: 'Ejecutar procedimientos'
                },
                {
                    name: 'Mis Solicitudes',
                    description: 'Ver el estado de mis procedimientos iniciados',
                    icon: 'bi-folder2-open',
                    path: 'my-requests.html',
                    permission: 'Ver mis solicitudes'
                },
                {
                    name: 'Consultar Registros',
                    description: 'Ver historial completo de todos los procedimientos',
                    icon: 'bi-search',
                    path: 'records.html',
                    permission: 'Consultar todos los registros'
                },
                {
                    name: 'Llenar Formulario',
                    description: 'Completar formularios independientes disponibles',
                    icon: 'bi-pencil-square',
                    path: 'execute-form.html',
                    permission: 'Ejecutar formularios'
                },
                {
                    name: 'Consultar Respuestas',
                    description: 'Ver y filtrar respuestas de formularios',
                    icon: 'bi-inbox',
                    path: 'query-submissions.html',
                    permission: 'Consultar respuestas de formularios'
                }
            ]
        };
        
        // ==========================================
        // VARIABLES GLOBALES
        // ==========================================
        
        let currentUser = null;
        let isSuperAdmin = false;
        let userPermissions = [];
        
        // ==========================================
        // INICIALIZACIÓN
        // ==========================================
        
        document.addEventListener('DOMContentLoaded', async function() {
            console.log(`📦 Módulo ${MODULE_CONFIG.name} iniciado`);
            
            // Validar sesión
            const session = getStoredSession();
            if (!session || !session.user) {
                console.log('❌ No hay sesión activa, redirigiendo a login...');
                window.location.href = '/login.html';
                return;
            }
            
            currentUser = session.user;
            console.log('✅ Usuario autenticado:', currentUser.user_display_name || currentUser.user_name);
            
            // Verificar super admin
            isSuperAdmin = await checkUserIsSuperAdmin(currentUser.user_id);
            console.log('👑 ¿Es Super Admin?:', isSuperAdmin);
            
            // Obtener permisos del usuario (solo si no es super admin)
            if (!isSuperAdmin) {
                userPermissions = await obtenerPermisosUsuario(currentUser.user_id);
                console.log('🔑 Permisos del usuario:', userPermissions.length);
            }
            
            // Verificar acceso al módulo
            const hasAccess = isSuperAdmin || MODULE_CONFIG.modulePermissions.some(p => userPermissions.includes(p));
            if (!hasAccess) {
                showError('No tienes permisos para acceder a este módulo. Contacta al administrador.');
                return;
            }
            
            // Cargar módulo
            renderFunctionsGrid();
            
            // Mostrar contenido
            document.getElementById('loadingContainer').style.display = 'none';
            document.getElementById('moduleContent').style.display = 'block';
            
            console.log(`✅ Módulo ${MODULE_CONFIG.name} cargado correctamente`);
        });
        
        // ==========================================
        // OBTENER PERMISOS DEL USUARIO
        // ==========================================
        
        async function obtenerPermisosUsuario(userId) {
            try {
                const data = await supabaseRequest(
                    `/users?select=user_roles!user_roles_user_id_fkey(role_id,roles(role_permissions(permissions(permission_name))))&user_id=eq.${userId}`
                );
                
                if (!data || data.length === 0) return [];
                
                const permissions = [];
                data[0].user_roles?.forEach(userRole => {
                    userRole.roles?.role_permissions?.forEach(rolePermission => {
                        const permName = rolePermission.permissions?.permission_name;
                        if (permName && !permissions.includes(permName)) {
                            permissions.push(permName);
                        }
                    });
                });
                
                return permissions;
                
            } catch (error) {
                console.error('❌ Error obteniendo permisos:', error);
                return [];
            }
        }
        
        // ==========================================
        // RENDERIZAR FUNCIONES
        // ==========================================
        
        function renderFunctionsGrid() {
            const grid = document.getElementById('functionsGrid');
            grid.innerHTML = '';
            
            const allowedFunctions = MODULE_CONFIG.functions.filter(func => {
                if (isSuperAdmin) return true;
                return userPermissions.includes(func.permission);
            });
            
            if (allowedFunctions.length === 0) {
                grid.innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-warning">
                            <i class="bi bi-exclamation-triangle me-2"></i>
                            No tienes permisos para acceder a las funcionalidades de este módulo.
                            Contacta al administrador del sistema.
                        </div>
                    </div>
                `;
                return;
            }
            
            allowedFunctions.forEach(func => {
                const col = document.createElement('div');
                col.className = 'col-12 col-md-6 col-lg-4';
                
                col.innerHTML = `
                    <a href="${func.path}" class="function-card">
                        <div class="function-icon">
                            <i class="bi ${func.icon}"></i>
                        </div>
                        <div class="function-name">${func.name}</div>
                        <div class="function-description">${func.description}</div>
                        <div class="function-link">
                            Acceder
                            <i class="bi bi-arrow-right"></i>
                        </div>
                    </a>
                `;
                
                grid.appendChild(col);
            });
        }
        
        // ==========================================
        // UTILIDADES
        // ==========================================
        
        function showError(message) {
            document.getElementById('loadingContainer').innerHTML = `
                <div class="text-center">
                    <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
                    <p class="mt-3 text-danger">${message}</p>
                    <a href="../../dashboard.html" class="btn btn-primary mt-2">
                        <i class="bi bi-house me-1"></i>Ir al Dashboard
                    </a>
                </div>
            `;
        }
    </script>
</body>
</html>
