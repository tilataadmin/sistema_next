<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="page-version" content="26.03.29.04.00">
    
    <title>Ejecutar Procedimiento - SchoolNet</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #6f42c1;
            --secondary-color: #9b6fd9;
            --tertiary-color: #f3effa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
        }

        .main-content {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .breadcrumb {
            background: transparent;
            padding: 0;
            margin-bottom: 1.5rem;
        }

        .breadcrumb-item a {
            color: var(--secondary-color);
            text-decoration: none;
        }

        .breadcrumb-item a:hover {
            text-decoration: underline;
        }

        .page-header {
            background: white;
            border-radius: 12px;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .page-title {
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--primary-color);
            margin: 0;
        }

        .page-subtitle {
            color: #64748b;
            font-size: 0.95rem;
            margin-top: 0.5rem;
        }

        .search-toolbar {
            background: white;
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .procedures-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .procedure-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .procedure-card:hover {
            border-color: var(--secondary-color);
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            transform: translateY(-2px);
        }

        .procedure-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }

        .procedure-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--primary-color);
            margin: 0;
        }

        .procedure-type-badge {
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            background: #dbeafe;
            color: #1e40af;
        }

        .procedure-description {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .procedure-meta {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: #64748b;
        }

        .procedure-meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-start-procedure {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            color: white;
            font-weight: 500;
            padding: 0.75rem;
            transition: all 0.3s;
        }

        .btn-start-procedure:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(111, 66, 193, 0.4);
            color: white;
        }

        .form-field-group {
            margin-bottom: 1.5rem;
        }

        .field-label {
            font-weight: 500;
            margin-bottom: 0.5rem;
            display: block;
        }

        .required-asterisk {
            color: #dc2626;
            margin-left: 0.25rem;
        }

        .field-help-text {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 0.25rem;
        }

        .auto-fill-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.75rem;
            background: #f3f4f6;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            color: #6b7280;
            margin-left: 0.5rem;
        }

        .file-upload-info {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 0.25rem;
        }

        .upload-progress {
            margin-top: 0.5rem;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #64748b;
        }

        .empty-state i {
            font-size: 5rem;
            color: #cbd5e1;
            margin-bottom: 1.5rem;
        }

        .loading-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }

        .alert {
            border-radius: 8px;
            border: none;
        }

        .alert-success { background: rgba(16,185,129,0.1); color: #059669; border-left: 4px solid #059669; }
        .alert-danger { background: rgba(220,38,38,0.1); color: #dc2626; border-left: 4px solid #dc2626; }
        .alert-warning { background: rgba(245,158,11,0.1); color: #d97706; border-left: 4px solid #d97706; }
        .alert-info { background: rgba(2,132,199,0.1); color: #0284c7; border-left: 4px solid #0284c7; }

        @media (max-width: 768px) {
            .main-content { padding: 1rem; }
            .procedures-grid { grid-template-columns: 1fr; }
            .page-title { font-size: 1.25rem; }
        }
    </style>
</head>
<body>

<!-- Main Content -->
    <div class="main-content">
        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="../../dashboard.html"><i class="bi bi-house-door-fill"></i></a></li>
                <li class="breadcrumb-item"><a href="index.html">Procedimientos</a></li>
                <li class="breadcrumb-item active">Ejecutar Procedimiento</li>
            </ol>
        </nav>

        <!-- Page Header -->
        <div class="page-header">
            <h1 class="page-title"><i class="bi bi-play-circle me-2"></i>Iniciar Procedimiento</h1>
            <p class="page-subtitle mb-0">Selecciona un procedimiento activo para comenzar</p>
        </div>

        <!-- Alert Container -->
        <div id="alertContainer"></div>

        <!-- Search Toolbar -->
        <div class="search-toolbar">
            <div class="flex-grow-1">
                <input type="text" class="form-control" id="searchInput" placeholder="Buscar procedimiento..." onkeyup="filterProcedures()">
            </div>
        </div>

        <!-- Loading -->
        <div class="loading-container" id="loadingContainer">
            <div class="text-center">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-3 text-muted">Cargando procedimientos disponibles...</p>
            </div>
        </div>

        <!-- Procedures Grid -->
        <div id="proceduresGrid" style="display: none;"></div>
    </div>

    <!-- Modal: Formulario Inicial -->
    <div class="modal fade" id="formModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <div>
                        <h5 class="modal-title" id="formModalTitle">Formulario de Procedimiento</h5>
                        <p class="text-muted mb-0" style="font-size: 0.9rem;">Complete los campos requeridos para iniciar</p>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="procedureForm">
                        <div id="formFields"></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary btn-lg" id="btnSubmit" onclick="submitForm()">
                        <i class="bi bi-send me-2"></i>Enviar Solicitud
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../assets/js/config.js"></script>
    
    <script>
        // ==========================================
        // VARIABLES GLOBALES
        // ==========================================
        
        let currentUser = null;
        let isSuperAdmin = false;
        let allProcedures = [];
        let currentProcedure = null;
        let currentForm = null;
        let formFields = [];
        let uploadedFiles = {};
        
        const formModalInstance = new bootstrap.Modal(document.getElementById('formModal'));

        // ==========================================
        // INICIALIZACIÓN
        // ==========================================
        
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('🚀 Inicializando Ejecutar Procedimiento...');
            
            const session = getStoredSession();
            if (!session || !session.user) {
                window.location.href = '/login.html';
                return;
            }
            
            currentUser = session.user;
            console.log('👤 Usuario:', currentUser.user_display_name || currentUser.user_name);
            
            // Verificar super admin
            isSuperAdmin = await checkUserIsSuperAdmin(currentUser.user_id);
            
            // Validar permiso
            if (!isSuperAdmin) {
                const hasAccess = await checkUserPermission(currentUser.user_id, 'Ejecutar procedimientos');
                if (!hasAccess) {
                    showError('No tienes permisos para acceder a esta página.');
                    return;
                }
            }
            
            await loadProcedures();
        });

        // ==========================================
        // CARGAR PROCEDIMIENTOS
        // ==========================================
        
        async function loadProcedures() {
            try {
                console.log('📡 Cargando procedimientos disponibles...');
                
                const response = await supabaseRequest(
                    '/procedures?procedure_status=eq.active&procedure_type=eq.internal&select=*,procedure_steps(count)'
                );
                
                // Filtrar solo los que tienen pasos configurados
                allProcedures = response.filter(p => {
                    const stepsCount = p.procedure_steps?.[0]?.count || 0;
                    return stepsCount > 0;
                });
                
                console.log(`✅ ${allProcedures.length} procedimientos disponibles`);
                renderProcedures();
                
            } catch (error) {
                console.error('❌ Error:', error);
                showError('Error al cargar los procedimientos');
            } finally {
                document.getElementById('loadingContainer').style.display = 'none';
                document.getElementById('proceduresGrid').style.display = 'block';
            }
        }

        // ==========================================
        // RENDERIZAR PROCEDIMIENTOS
        // ==========================================
        
        function renderProcedures() {
            const container = document.getElementById('proceduresGrid');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = allProcedures.filter(p => 
                p.procedure_name.toLowerCase().includes(searchTerm) ||
                (p.procedure_description && p.procedure_description.toLowerCase().includes(searchTerm))
            );
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-inbox"></i>
                        <h5>No hay procedimientos disponibles</h5>
                        <p>No se encontraron procedimientos activos para iniciar</p>
                    </div>
                `;
                return;
            }
            
            container.className = 'procedures-grid';
            container.innerHTML = filtered.map(procedure => {
                const stepsCount = procedure.procedure_steps?.[0]?.count || 0;
                
                return `
                    <div class="procedure-card">
                        <div class="procedure-header">
                            <h5 class="procedure-title">
                                <i class="bi bi-file-earmark-text me-2"></i>${escapeHtml(procedure.procedure_name)}
                            </h5>
                            <span class="procedure-type-badge">Interno</span>
                        </div>
                        
                        ${procedure.procedure_description ? `
                            <p class="procedure-description">${escapeHtml(procedure.procedure_description)}</p>
                        ` : ''}
                        
                        <div class="procedure-meta">
                            <div class="procedure-meta-item">
                                <i class="bi bi-diagram-3"></i>
                                <span>${stepsCount} ${stepsCount === 1 ? 'paso' : 'pasos'}</span>
                            </div>
                        </div>
                        
                        <button class="btn btn-start-procedure" onclick="startProcedure('${procedure.procedure_id}')">
                            <i class="bi bi-play-fill me-2"></i>Iniciar Procedimiento
                        </button>
                    </div>
                `;
            }).join('');
        }
        
        function filterProcedures() {
            renderProcedures();
        }

        // ==========================================
        // INICIAR PROCEDIMIENTO
        // ==========================================
        
        async function startProcedure(procedureId) {
            try {
                console.log('🔄 Iniciando procedimiento:', procedureId);
                
                const procData = await supabaseRequest(
                    `/procedures?procedure_id=eq.${procedureId}&select=*`
                );
                
                if (!procData || procData.length === 0) {
                    throw new Error('Procedimiento no encontrado');
                }
                
                currentProcedure = procData[0];
                
                // Cargar formulario con campos y opciones
                console.log('📋 Cargando formulario...');
                const formData = await supabaseRequest(
                    `/forms?form_id=eq.${currentProcedure.form_id}&select=*,form_fields(*,field_option_catalog(*))`
                );
                
                if (!formData || formData.length === 0) {
                    throw new Error('Formulario no encontrado');
                }
                
                currentForm = formData[0];
                formFields = (currentForm.form_fields || []).sort((a, b) => a.field_order - b.field_order);
                
                // Para campos system_table, cargar datos de la tabla
                for (const field of formFields) {
                    if (field.field_type === 'system_table' && field.system_table_name) {
                        field.system_options = await loadSystemTableOptions(field.system_table_name);
                    }
                }
                
                console.log(`✅ Formulario cargado: ${formFields.length} campos`);
                
                // Renderizar formulario
                renderForm();
                
                // Mostrar modal
                document.getElementById('formModalTitle').textContent = currentProcedure.procedure_name;
                formModalInstance.show();
                
            } catch (error) {
                console.error('❌ Error:', error);
                showAlert('Error al cargar el formulario: ' + error.message, 'danger');
            }
        }

        // ==========================================
        // CARGAR OPCIONES DE TABLA DEL SISTEMA
        // ==========================================
        
        async function loadSystemTableOptions(tableName) {
            const tableConfig = {
                'academic_areas': { query: '/academic_areas?select=area_id,area_name&order=area_name', id: 'area_id', label: 'area_name' },
                'courses': { query: '/courses?select=course_id,course_name&order=course_order', id: 'course_id', label: 'course_name' },
                'families': { query: '/families?select=family_id,family_name&family_status=eq.active&order=family_name', id: 'family_id', label: 'family_name' },
                'genders': { query: '/genders?select=gender_id,gender_name&order=gender_name', id: 'gender_id', label: 'gender_name' },
                'grades': { query: '/grades?select=grade_id,grade_name&order=grade_order', id: 'grade_id', label: 'grade_name' },
                'job_roles': { query: '/job_roles?select=role_id,role_name&order=role_name', id: 'role_id', label: 'role_name' },
                'sections': { query: '/sections?select=section_id,section_name&section_status=eq.active&order=section_name', id: 'section_id', label: 'section_name' },
                'students': { query: '/students?select=student_id,first_name,last_name1&order=last_name1', id: 'student_id', label: 'CONCAT' },
                'workers': { query: '/workers?select=worker_id,worker_first_name,worker_last_name_1&worker_status=eq.active&order=worker_first_name', id: 'worker_id', label: 'CONCAT' }
            };
            
            const config = tableConfig[tableName];
            if (!config) return [];
            
            try {
                const data = await supabaseRequest(config.query);
                return (data || []).map(item => {
                    let label = '';
                    if (config.label === 'CONCAT') {
                        if (tableName === 'students') {
                            label = `${item.first_name} ${item.last_name1}`;
                        } else if (tableName === 'workers') {
                            label = `${item.worker_first_name} ${item.worker_last_name_1}`;
                        }
                    } else {
                        label = item[config.label];
                    }
                    return { id: item[config.id], label: label };
                });
            } catch (error) {
                console.error(`❌ Error cargando tabla ${tableName}:`, error);
                return [];
            }
        }

        // ==========================================
        // RENDERIZAR FORMULARIO DINÁMICO
        // ==========================================
        
        function renderForm() {
            const container = document.getElementById('formFields');
            uploadedFiles = {};
            
            container.innerHTML = formFields.map(field => renderField(field)).join('');
            
            applyAutoFill();
            applyConditionalLogic();
        }
        
        function renderField(field) {
            const isRequired = field.is_required ? '<span class="required-asterisk">*</span>' : '';
            const autoFillType = field.auto_fill_type || field.prefill_source || null;
            const autoFillBadge = autoFillType && autoFillType !== 'none' 
                ? '<span class="auto-fill-badge"><i class="bi bi-lock-fill"></i> Automático</span>' : '';
            const helpText = field.help_text && field.field_type !== 'checkbox' 
                ? `<div class="field-help-text">${escapeHtml(field.help_text)}</div>` : '';
            const placeholder = field.placeholder_text || '';
            const isReadonly = autoFillType && autoFillType !== 'none' ? 'readonly' : '';
            
            let fieldHtml = '';
            
            switch (field.field_type) {
                case 'text':
                    fieldHtml = `
                        <div class="form-field-group" data-field-wrapper="${field.field_id}">
                            <label class="field-label">${escapeHtml(field.field_label)}${isRequired}${autoFillBadge}</label>
                            <input type="text" class="form-control" id="field_${field.field_id}"
                                data-field-id="${field.field_id}" data-field-type="text" data-required="${field.is_required}"
                                data-validation="${field.validation_format || ''}"
                                placeholder="${escapeHtml(placeholder)}" ${isReadonly}>
                            ${helpText}
                        </div>`;
                    break;
                    
                case 'textarea':
                    fieldHtml = `
                        <div class="form-field-group" data-field-wrapper="${field.field_id}">
                            <label class="field-label">${escapeHtml(field.field_label)}${isRequired}${autoFillBadge}</label>
                            <textarea class="form-control" id="field_${field.field_id}" rows="4"
                                data-field-id="${field.field_id}" data-field-type="textarea" data-required="${field.is_required}"
                                placeholder="${escapeHtml(placeholder)}" ${isReadonly}></textarea>
                            ${helpText}
                        </div>`;
                    break;
                    
                case 'number':
                    const minAttr = field.min_value ? `min="${field.min_value}"` : '';
                    const maxAttr = field.max_value ? `max="${field.max_value}"` : '';
                    fieldHtml = `
                        <div class="form-field-group" data-field-wrapper="${field.field_id}">
                            <label class="field-label">${escapeHtml(field.field_label)}${isRequired}</label>
                            <input type="number" class="form-control" id="field_${field.field_id}"
                                data-field-id="${field.field_id}" data-field-type="number" data-required="${field.is_required}"
                                placeholder="${escapeHtml(placeholder)}" ${minAttr} ${maxAttr}>
                            ${helpText}
                        </div>`;
                    break;
                    
                case 'date':
                    fieldHtml = `
                        <div class="form-field-group" data-field-wrapper="${field.field_id}">
                            <label class="field-label">${escapeHtml(field.field_label)}${isRequired}${autoFillBadge}</label>
                            <input type="date" class="form-control" id="field_${field.field_id}"
                                data-field-id="${field.field_id}" data-field-type="date" data-required="${field.is_required}" ${isReadonly}>
                            ${helpText}
                        </div>`;
                    break;
                    
                case 'select':
                    const selectOptions = (field.field_option_catalog || [])
                        .sort((a, b) => a.option_order - b.option_order)
                        .filter(o => o.is_active !== false)
                        .map(opt => `<option value="${opt.option_id}">${escapeHtml(opt.option_label)}</option>`)
                        .join('');
                    fieldHtml = `
                        <div class="form-field-group" data-field-wrapper="${field.field_id}">
                            <label class="field-label">${escapeHtml(field.field_label)}${isRequired}</label>
                            <select class="form-select" id="field_${field.field_id}"
                                data-field-id="${field.field_id}" data-field-type="select" data-required="${field.is_required}">
                                <option value="">Seleccione una opción...</option>
                                ${selectOptions}
                            </select>
                            ${helpText}
                        </div>`;
                    break;

                case 'radio':
                    const radioOptions = (field.field_option_catalog || [])
                        .sort((a, b) => a.option_order - b.option_order)
                        .filter(o => o.is_active !== false)
                        .map(opt => `
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="field_${field.field_id}"
                                    id="field_${field.field_id}_${opt.option_id}" value="${opt.option_id}"
                                    data-field-id="${field.field_id}" data-field-type="radio">
                                <label class="form-check-label" for="field_${field.field_id}_${opt.option_id}">
                                    ${escapeHtml(opt.option_label)}
                                </label>
                            </div>
                        `).join('');
                    fieldHtml = `
                        <div class="form-field-group" data-field-wrapper="${field.field_id}">
                            <label class="field-label">${escapeHtml(field.field_label)}${isRequired}</label>
                            ${radioOptions}
                            ${helpText}
                        </div>`;
                    break;

                case 'checkbox':
                    const checkLabel = field.help_text || field.field_label;
                    fieldHtml = `
                        <div class="form-field-group" data-field-wrapper="${field.field_id}">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="field_${field.field_id}"
                                    data-field-id="${field.field_id}" data-field-type="checkbox" data-required="${field.is_required}">
                                <label class="form-check-label" for="field_${field.field_id}">
                                    ${escapeHtml(checkLabel)}${isRequired}
                                </label>
                            </div>
                        </div>`;
                    break;

                case 'boolean':
                    fieldHtml = `
                        <div class="form-field-group" data-field-wrapper="${field.field_id}">
                            <label class="field-label">${escapeHtml(field.field_label)}${isRequired}</label>
                            <select class="form-select" id="field_${field.field_id}"
                                data-field-id="${field.field_id}" data-field-type="boolean" data-required="${field.is_required}">
                                <option value="">Seleccione...</option>
                                <option value="true">Sí</option>
                                <option value="false">No</option>
                            </select>
                            ${helpText}
                        </div>`;
                    break;

                case 'system_table':
                    const sysOptions = (field.system_options || [])
                        .map(opt => `<option value="${opt.id}">${escapeHtml(opt.label)}</option>`)
                        .join('');
                    fieldHtml = `
                        <div class="form-field-group" data-field-wrapper="${field.field_id}">
                            <label class="field-label">${escapeHtml(field.field_label)}${isRequired}</label>
                            <select class="form-select" id="field_${field.field_id}"
                                data-field-id="${field.field_id}" data-field-type="system_table" data-required="${field.is_required}">
                                <option value="">Seleccione...</option>
                                ${sysOptions}
                            </select>
                            ${helpText}
                        </div>`;
                    break;
                    
                case 'file':
                    const maxSize = field.max_file_size || 5;
                    const allowedTypes = field.allowed_file_types 
                        ? field.allowed_file_types.split(',').map(t => '.' + t.trim()).join(',') : '';
                    fieldHtml = `
                        <div class="form-field-group" data-field-wrapper="${field.field_id}">
                            <label class="field-label">${escapeHtml(field.field_label)}${isRequired}</label>
                            <input type="file" class="form-control" id="field_${field.field_id}"
                                data-field-id="${field.field_id}" data-field-type="file" data-required="${field.is_required}"
                                data-max-size="${maxSize}" accept="${allowedTypes}"
                                onchange="handleFileSelect(event, '${field.field_id}')">
                            <div class="file-upload-info">
                                Tamaño máximo: ${maxSize} MB
                                ${field.allowed_file_types ? ' | Tipos permitidos: ' + field.allowed_file_types : ''}
                            </div>
                            <div class="upload-progress" id="progress_${field.field_id}" style="display: none;">
                                <div class="progress"><div class="progress-bar" role="progressbar" style="width: 0%"></div></div>
                            </div>
                            ${helpText}
                        </div>`;
                    break;
            }
            
            return fieldHtml;
        }

        // ==========================================
        // PRE-LLENADO AUTOMÁTICO
        // ==========================================
        
        function applyAutoFill() {
            formFields.forEach(field => {
                const autoFillType = field.auto_fill_type || field.prefill_source || null;
                if (!autoFillType || autoFillType === 'none') return;
                
                const input = document.getElementById(`field_${field.field_id}`);
                if (!input) return;
                
                switch (autoFillType) {
                    case 'user_name':
                        input.value = currentUser.user_display_name || currentUser.user_name || '';
                        break;
                    case 'user_email':
                        input.value = currentUser.user_mail || '';
                        break;
                    case 'current_date':
                        input.value = new Date().toISOString().split('T')[0];
                        break;
                }
            });
        }

        // ==========================================
        // MANEJO DE ARCHIVOS
        // ==========================================
        
        function handleFileSelect(event, fieldId) {
            const file = event.target.files[0];
            if (!file) return;
            
            const field = formFields.find(f => f.field_id == fieldId);
            const maxSize = (field.max_file_size || 5) * 1024 * 1024;
            
            if (file.size > maxSize) {
                showAlert(`El archivo excede el tamaño máximo de ${field.max_file_size || 5} MB`, 'warning');
                event.target.value = '';
                return;
            }
            
            if (field.allowed_file_types) {
                const allowedTypes = field.allowed_file_types.split(',').map(t => t.trim().toLowerCase());
                const fileExtension = file.name.split('.').pop().toLowerCase();
                
                if (!allowedTypes.includes(fileExtension)) {
                    showAlert(`Tipo de archivo no permitido. Tipos aceptados: ${field.allowed_file_types}`, 'warning');
                    event.target.value = '';
                    return;
                }
            }
            
            console.log(`📎 Archivo seleccionado: ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`);
        }
        
        async function uploadFile(fieldId, file, instanceId) {
            const field = formFields.find(f => f.field_id == fieldId);
            const extension = file.name.split('.').pop();
            const timestamp = Date.now();
            const fileName = `${timestamp}_${file.name}`;
            const filePath = `procedures/${currentProcedure.procedure_id}/${instanceId}/${fileName}`;
            
            console.log(`📤 Subiendo archivo: ${filePath}`);
            
            const progressContainer = document.getElementById(`progress_${fieldId}`);
            if (progressContainer) progressContainer.style.display = 'block';
            
            try {
                const supabaseClient = supabase.createClient(
                    SUPABASE_CONFIG.url,
                    SUPABASE_CONFIG.anonKey
                );
                
                const { data, error } = await supabaseClient
                    .storage
                    .from('procedure-files')
                    .upload(filePath, file, {
                        cacheControl: '3600',
                        upsert: false
                    });
                
                if (error) throw error;
                
                const { data: urlData } = supabaseClient
                    .storage
                    .from('procedure-files')
                    .getPublicUrl(filePath);
                
                console.log(`✅ Archivo subido: ${urlData.publicUrl}`);
                return { publicUrl: urlData.publicUrl, fileName: file.name };
                
            } catch (error) {
                console.error('❌ Error subiendo archivo:', error);
                throw error;
            } finally {
                if (progressContainer) progressContainer.style.display = 'none';
            }
        }

        // ==========================================
        // LÓGICA CONDICIONAL
        // ==========================================
        
        function applyConditionalLogic() {
            formFields.forEach(field => {
                if (!field.show_if_field_id) return;
                
                const fieldWrapper = document.querySelector(`[data-field-wrapper="${field.field_id}"]`);
                if (!fieldWrapper) return;
                
                const parentField = formFields.find(f => f.field_id == field.show_if_field_id);
                if (!parentField) return;
                
                console.log(`🔗 Campo "${field.field_label}" depende de "${parentField.field_label}" = "${field.show_if_value}"`);
                
                // Ocultar por defecto
                fieldWrapper.style.display = 'none';
                
                const evaluateCondition = () => {
                    let parentValue = null;
                    
                    if (parentField.field_type === 'select') {
                        const selectEl = document.getElementById(`field_${parentField.field_id}`);
                        if (selectEl && selectEl.value) {
                            const selectedOption = (parentField.field_option_catalog || []).find(o => o.option_id == selectEl.value);
                            parentValue = selectedOption?.option_value;
                        }
                    } else if (parentField.field_type === 'radio') {
                        const radioEl = document.querySelector(`input[name="field_${parentField.field_id}"]:checked`);
                        if (radioEl) {
                            const selectedOption = (parentField.field_option_catalog || []).find(o => o.option_id == radioEl.value);
                            parentValue = selectedOption?.option_value;
                        }
                    }
                    
                    if (parentValue === field.show_if_value) {
                        fieldWrapper.style.display = 'block';
                    } else {
                        fieldWrapper.style.display = 'none';
                        clearFieldValue(field);
                    }
                };
                
                evaluateCondition();
                
                if (parentField.field_type === 'select') {
                    const selectEl = document.getElementById(`field_${parentField.field_id}`);
                    if (selectEl) selectEl.addEventListener('change', evaluateCondition);
                } else if (parentField.field_type === 'radio') {
                    document.querySelectorAll(`input[name="field_${parentField.field_id}"]`)
                        .forEach(radio => radio.addEventListener('change', evaluateCondition));
                }
            });
        }
        
        function clearFieldValue(field) {
            switch (field.field_type) {
                case 'text': case 'textarea': case 'number': case 'date': case 'select': case 'boolean': case 'system_table':
                    const input = document.getElementById(`field_${field.field_id}`);
                    if (input) input.value = '';
                    break;
                case 'radio':
                    document.querySelectorAll(`input[name="field_${field.field_id}"]`)
                        .forEach(r => r.checked = false);
                    break;
                case 'checkbox':
                    const cb = document.getElementById(`field_${field.field_id}`);
                    if (cb) cb.checked = false;
                    break;
                case 'file':
                    const fi = document.getElementById(`field_${field.field_id}`);
                    if (fi) fi.value = '';
                    break;
            }
        }

        // ==========================================
        // OBTENER VALOR DE CAMPO
        // ==========================================
        
        function getFieldValue(field) {
            switch (field.field_type) {
                case 'text': case 'textarea': case 'number': case 'date': case 'select': case 'boolean': case 'system_table':
                    const input = document.getElementById(`field_${field.field_id}`);
                    return input ? input.value.trim() : '';
                case 'radio':
                    const radio = document.querySelector(`input[name="field_${field.field_id}"]:checked`);
                    return radio ? radio.value : '';
                case 'checkbox':
                    const cb = document.getElementById(`field_${field.field_id}`);
                    return cb ? cb.checked : false;
                case 'file':
                    const fi = document.getElementById(`field_${field.field_id}`);
                    return fi?.files?.[0] ? fi.files[0] : null;
                default:
                    return '';
            }
        }

        // ==========================================
        // VALIDACIONES
        // ==========================================
        
        function validateFormat(value, format) {
            const patterns = {
                email: /^[^\s@]+@[^\s@]+\.[^\s@]+$/,
                phone: /^[\d\s\-\+\(\)]+$/,
                url: /^https?:\/\/.+/
            };
            return patterns[format] ? patterns[format].test(value) : true;
        }

        function calculateDueDate(slaDays) {
            if (!slaDays) return null;
            const today = new Date();
            let daysAdded = 0;
            let currentDate = new Date(today);
            while (daysAdded < slaDays) {
                currentDate.setDate(currentDate.getDate() + 1);
                const day = currentDate.getDay();
                if (day !== 0 && day !== 6) daysAdded++;
            }
            return currentDate.toISOString().split('T')[0];
        }

        // ==========================================
        // ENVIAR FORMULARIO
        // ==========================================
        
        async function submitForm() {
            try {
                console.log('📝 Validando y enviando formulario...');
                
                // Validar campos
                let isValid = true;
                const formData = {};
                
                for (const field of formFields) {
                    // Verificar si el campo está visible (lógica condicional)
                    const wrapper = document.querySelector(`[data-field-wrapper="${field.field_id}"]`);
                    const isVisible = wrapper ? wrapper.style.display !== 'none' : true;
                    
                    if (!isVisible) {
                        formData[field.field_id] = null;
                        continue;
                    }
                    
                    const value = getFieldValue(field);
                    
                    // Validar obligatorios
                    if (field.is_required) {
                        if (field.field_type === 'checkbox' && value === false) {
                            showAlert(`Debe aceptar "${field.help_text || field.field_label}"`, 'warning');
                            isValid = false;
                            break;
                        } else if (field.field_type === 'file' && !value) {
                            showAlert(`El campo "${field.field_label}" es obligatorio`, 'warning');
                            isValid = false;
                            break;
                        } else if (field.field_type !== 'checkbox' && field.field_type !== 'file' && !value) {
                            showAlert(`El campo "${field.field_label}" es obligatorio`, 'warning');
                            isValid = false;
                            break;
                        }
                    }
                    
                    // Validar formato
                    const valFormat = field.validation_format;
                    if (value && valFormat && valFormat !== 'none') {
                        if (!validateFormat(value, valFormat)) {
                            showAlert(`El campo "${field.field_label}" tiene un formato inválido`, 'warning');
                            isValid = false;
                            break;
                        }
                    }
                    
                    formData[field.field_id] = value;
                }
                
                if (!isValid) return;
                
                // Deshabilitar botón
                const submitBtn = document.getElementById('btnSubmit');
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Enviando...';
                
                // =====================
                // PASO 1: Construir form_data JSON para respaldo
                // =====================
                console.log('📋 Construyendo datos del formulario...');
                
                const formDataJson = {};
                for (const field of formFields) {
                    const val = formData[field.field_id];
                    if (val === null || val === undefined) continue;
                    
                    if (field.field_type === 'file') {
                        formDataJson[field.field_name] = val ? val.name : null;
                    } else if (field.field_type === 'select' || field.field_type === 'radio') {
                        const selectedOpt = (field.field_option_catalog || []).find(o => o.option_id == val);
                        formDataJson[field.field_name] = selectedOpt?.option_label || val;
                    } else if (field.field_type === 'system_table') {
                        const selectedSys = (field.system_options || []).find(o => o.id == val);
                        formDataJson[field.field_name] = selectedSys?.label || val;
                    } else {
                        formDataJson[field.field_name] = val;
                    }
                }
                
                // =====================
                // PASO 2: Crear procedure_instance
                // =====================
                console.log('📝 Creando instancia del procedimiento...');
                
                const instanceData = {
                    procedure_id: currentProcedure.procedure_id,
                    initiated_by_user_id: currentUser.user_id,
                    initiated_by_email: currentUser.user_mail,
                    initiated_by_name: currentUser.user_display_name || currentUser.user_name,
                    form_data: formDataJson,
                    instance_status: 'in_progress',
                    started_at: new Date().toISOString()
                };
                
                const instanceResult = await supabaseRequest('/procedure_instances', {
                    method: 'POST',
                    body: JSON.stringify(instanceData)
                });
                
                if (!instanceResult || instanceResult.length === 0) {
                    throw new Error('No se pudo crear la instancia del procedimiento');
                }
                
                const instance = instanceResult[0];
                console.log('✅ Instancia creada:', instance.instance_id);
                
                // =====================
                // PASO 3: Guardar respuestas en form_responses
                // =====================
                console.log('💾 Guardando respuestas...');
                
                for (const field of formFields) {
                    const value = formData[field.field_id];
                    if (value === null || value === undefined) continue;
                    if (field.field_type !== 'file' && value === '' && !field.is_required) continue;
                    
                    const responseData = {
                        instance_id: instance.instance_id,
                        field_id: field.field_id
                    };
                    
                    switch (field.field_type) {
                        case 'text':
                        case 'textarea':
                        case 'boolean':
                        case 'system_table':
                            if (value) responseData.response_text = String(value);
                            break;
                            
                        case 'number':
                            if (value) responseData.response_number = parseFloat(value);
                            break;
                            
                        case 'date':
                            if (value) responseData.response_date = value;
                            break;
                            
                        case 'select':
                        case 'radio':
                            if (value) responseData.selected_option_id = parseInt(value);
                            break;
                            
                        case 'checkbox':
                            responseData.response_text = value ? 'true' : 'false';
                            break;
                            
                        case 'file':
                            if (value) {
                                try {
                                    const uploaded = await uploadFile(field.field_id, value, instance.instance_id);

                                    responseData.file_name = uploaded.fileName;

                                    responseData.response_text = 'Error al subir archivo';
                                }

                            break;
                    }
                    
                    // Solo insertar si hay datos más allá de instance_id y field_id

        // ==========================================
        // UTILIDADES
        // ==========================================
        
        function showAlert(message, type = 'info') {
            const container = document.getElementById('alertContainer');
            const alertId = 'alert_' + Date.now();
            
            const icons = {
                success: 'check-circle',
                danger: 'exclamation-triangle',
                warning: 'exclamation-triangle',
                info: 'info-circle'
            };
            
            container.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert" id="${alertId}">
                    <i class="bi bi-${icons[type]} me-2"></i>
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            
            setTimeout(() => {
                const alert = document.getElementById(alertId);
                if (alert) {
                    const bsAlert = bootstrap.Alert.getOrCreateInstance(alert);
                    bsAlert.close();
                }
            }, 6000);
        }
        
        function showError(message) {
            document.getElementById('loadingContainer').innerHTML = `
                <div class="text-center">
                    <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
                    <p class="mt-3 text-danger">${message}</p>
                    <a href="index.html" class="btn btn-primary mt-2">
                        <i class="bi bi-arrow-left me-1"></i>Volver al módulo
                    </a>
                </div>
            `;
            document.getElementById('loadingContainer').style.display = 'flex';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        console.log('✅ execute.html cargado correctamente');
    </script>
</body>
</html>
