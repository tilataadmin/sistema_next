<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="page-version" content="26.03.29.12.00">
    
    <title>Seguimiento de Solicitud - SchoolNet</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #6f42c1;
            --secondary-color: #9b6fd9;
            --tertiary-color: #764ba2;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--secondary-color) 0%, var(--tertiary-color) 100%);
            min-height: 100vh;
            padding: 2rem 0;
        }

        .main-container { max-width: 900px; margin: 0 auto; padding: 0 1rem; }

        .public-header {
            background: white; padding: 1.5rem; border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1); margin-bottom: 2rem; text-align: center;
        }

        .institution-logo { max-height: 80px; margin-bottom: 1rem; }
        .institution-name { font-size: 1.5rem; font-weight: 600; color: var(--primary-color); margin: 0; }

        .form-card {
            background: white; border-radius: 12px; padding: 2rem;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1); margin-bottom: 2rem;
        }

        .page-title { font-size: 1.75rem; font-weight: 600; color: var(--primary-color); margin-bottom: 0.5rem; text-align: center; }
        .page-subtitle { color: #64748b; text-align: center; margin-bottom: 2rem; }

        .form-label { font-weight: 500; color: #334155; margin-bottom: 0.5rem; }

        .form-control {
            border: 2px solid #e2e8f0; border-radius: 8px; padding: 0.75rem;
            font-family: 'Courier New', monospace; font-size: 1rem;
        }

        .form-control:focus { border-color: var(--secondary-color); box-shadow: 0 0 0 3px rgba(111, 66, 193, 0.1); }

        .captcha-container { margin: 2rem 0; display: flex; justify-content: center; }

        .btn-search {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none; color: white; font-weight: 500; padding: 1rem;
            font-size: 1.1rem; border-radius: 8px; transition: all 0.3s;
        }

        .btn-search:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(111, 66, 193, 0.4); color: white;
        }

        .btn-search:disabled { opacity: 0.6; cursor: not-allowed; }

        .status-badge { display: inline-block; padding: 0.5rem 1rem; border-radius: 20px; font-weight: 500; font-size: 0.9rem; }
        .status-in_progress { background: #fef3c7; color: #92400e; }
        .status-completed { background: #d1fae5; color: #065f46; }
        .status-cancelled { background: #fee2e2; color: #991b1b; }

        .result-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white; padding: 1.5rem; border-radius: 12px 12px 0 0; margin: -2rem -2rem 0 -2rem;
        }

        .result-title { font-size: 1.5rem; font-weight: 600; margin: 0 0 0.5rem 0; }
        .result-subtitle { opacity: 0.9; margin: 0; }
        .result-content { padding: 2rem 0; }

        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .info-item { background: #f8fafc; padding: 1rem; border-radius: 8px; border-left: 4px solid var(--secondary-color); }
        .info-label { font-size: 0.85rem; color: #64748b; margin-bottom: 0.25rem; font-weight: 500; }
        .info-value { font-size: 1.1rem; color: #1e293b; font-weight: 600; }

        .progress-container { margin: 2rem 0; }
        .progress-title { font-size: 1.1rem; font-weight: 600; color: #334155; margin-bottom: 1rem; }
        .progress { height: 12px; border-radius: 10px; background: #e2e8f0; margin-bottom: 0.5rem; }
        .progress-bar { background: linear-gradient(90deg, var(--primary-color), var(--secondary-color)); }
        .progress-text { text-align: center; font-size: 0.9rem; color: #64748b; font-weight: 500; }

        .timeline { position: relative; padding: 2rem 0; }
        .timeline::before { content: ''; position: absolute; left: 30px; top: 0; bottom: 0; width: 2px; background: #e2e8f0; }

        .timeline-item { position: relative; padding-left: 70px; margin-bottom: 2rem; }
        .timeline-item:last-child { margin-bottom: 0; }

        .timeline-icon {
            position: absolute; left: 0; top: 0; width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
            background: white; border: 3px solid #e2e8f0; color: #94a3b8; z-index: 1;
        }

        .timeline-item.completed .timeline-icon { background: var(--secondary-color); border-color: var(--secondary-color); color: white; }
        .timeline-item.current .timeline-icon { background: #fef3c7; border-color: #fbbf24; color: #92400e; animation: pulse 2s infinite; }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(251, 191, 36, 0); }
        }

        .timeline-content { background: #f8fafc; padding: 1.25rem; border-radius: 8px; border-left: 4px solid #e2e8f0; }
        .timeline-item.completed .timeline-content { border-left-color: var(--secondary-color); }
        .timeline-item.current .timeline-content { border-left-color: #fbbf24; background: #fffbeb; }

        .timeline-title { font-size: 1.1rem; font-weight: 600; color: #1e293b; margin-bottom: 0.25rem; }
        .timeline-meta { font-size: 0.85rem; color: #64748b; margin-bottom: 0.75rem; }
        .timeline-description { color: #475569; line-height: 1.5; }

        .alert { border-radius: 8px; border: none; margin-bottom: 1.5rem; }
        .alert-danger { background: rgba(220, 38, 38, 0.1); color: #dc2626; border-left: 4px solid #dc2626; }
        .alert-info { background: rgba(59, 130, 246, 0.1); color: #1e40af; border-left: 4px solid #3b82f6; }

        .public-footer { text-align: center; color: white; margin-top: 3rem; padding: 1rem; font-size: 0.9rem; }

        @media (max-width: 768px) {
            body { padding: 1rem 0; }
            .form-card { padding: 1.5rem; }
            .result-header { margin: -1.5rem -1.5rem 0 -1.5rem; }
            .info-grid { grid-template-columns: 1fr; }
            .timeline::before { left: 20px; }
            .timeline-item { padding-left: 60px; }
            .timeline-icon { width: 50px; height: 50px; font-size: 1.25rem; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Header -->
        <div class="public-header" id="publicHeader"></div>

        <!-- Search -->
        <div class="form-card" id="searchCard">
            <h1 class="page-title">Seguimiento de Solicitud</h1>
            <p class="page-subtitle">Ingresa el número de seguimiento que recibiste al enviar tu solicitud</p>
            <div id="alertContainer"></div>
            <form id="searchForm">
                <div class="mb-3">
                    <label for="trackingNumber" class="form-label">
                        <i class="bi bi-search me-2"></i>Número de Seguimiento
                    </label>
                    <input type="text" class="form-control" id="trackingNumber" placeholder="Ej: ce5c1bcc-78de-4317-a384-a12ca71f8b60" required>
                    <small class="text-muted">Formato UUID (xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx)</small>
                </div>
                <div class="captcha-container">
                    <div class="g-recaptcha" id="recaptchaWidget"></div>
                </div>
                <button type="submit" class="btn btn-search" id="searchBtn">
                    <i class="bi bi-search me-2"></i>Consultar Estado
                </button>
            </form>
        </div>

        <!-- Results -->
        <div class="form-card" id="resultCard" style="display: none;">
            <div class="result-header">
                <h2 class="result-title" id="resultTitle"></h2>
                <p class="result-subtitle" id="resultSubtitle"></p>
            </div>
            <div class="result-content">
                <div class="info-grid" id="infoGrid"></div>
                <div class="progress-container" id="progressContainer">
                    <div class="progress-title">Progreso General</div>
                    <div class="progress">
                        <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                    </div>
                    <div class="progress-text" id="progressText"></div>
                </div>
                <div class="timeline" id="timeline"></div>
                <div class="text-center mt-4">
                    <button class="btn btn-secondary" onclick="newSearch()">
                        <i class="bi bi-arrow-left me-2"></i>Nueva Búsqueda
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="public-footer">
            <p class="mb-0" id="footerText">Sistema de Gestión SchoolNet</p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/config.js"></script>
    
    <script>
        // ==========================================
        // VARIABLES GLOBALES
        // ==========================================
        
        let systemConfig = null;
        let currentInstance = null;
        let currentProcedure = null;
        let allSteps = [];
        let stepExecutions = [];

        // ==========================================
        // INICIALIZACIÓN
        // ==========================================
        
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('🔍 Página de seguimiento iniciada');
            await loadSystemConfig();
            document.getElementById('searchForm').addEventListener('submit', handleSearch);
        });

        // ==========================================
        // CONFIGURACIÓN DEL SISTEMA (BRANDING)
        // ==========================================
        
        async function loadSystemConfig() {
            try {
                const configs = await supabaseRequest('/system_config?select=*&limit=1');
                systemConfig = (configs && configs.length > 0) ? configs[0] : {
                    organization_name: 'SchoolNet', logo_url: null,
                    primary_color: '#6f42c1', secondary_color: '#9b6fd9', tertiary_color: '#764ba2'
                };
            } catch (error) {
                console.warn('⚠️ No se pudo cargar configuración');
                systemConfig = {
                    organization_name: 'SchoolNet', logo_url: null,
                    primary_color: '#6f42c1', secondary_color: '#9b6fd9', tertiary_color: '#764ba2'
                };
            }
            
            applyBranding();
            setupRecaptcha();
        }
        
        function applyBranding() {
            const header = document.getElementById('publicHeader');
            const orgName = systemConfig.organization_name || 'SchoolNet';
            
            header.innerHTML = `
                ${systemConfig.logo_url ? `<img src="${systemConfig.logo_url}" alt="Logo" class="institution-logo">` : ''}
                <h2 class="institution-name">${escapeHtml(orgName)}</h2>
            `;
            
            document.getElementById('footerText').textContent = `Sistema de Gestión - ${orgName}`;
            
            if (systemConfig.primary_color) document.documentElement.style.setProperty('--primary-color', systemConfig.primary_color);
            if (systemConfig.secondary_color) document.documentElement.style.setProperty('--secondary-color', systemConfig.secondary_color);
            if (systemConfig.tertiary_color) document.documentElement.style.setProperty('--tertiary-color', systemConfig.tertiary_color);
        }
        
        function setupRecaptcha() {
            const siteKey = systemConfig?.recaptcha_site_key;
            if (siteKey) {
                const widget = document.getElementById('recaptchaWidget');
                if (widget) {
                    widget.setAttribute('data-sitekey', siteKey);
                    if (!document.querySelector('script[src*="recaptcha"]')) {
                        const script = document.createElement('script');
                        script.src = 'https://www.google.com/recaptcha/api.js';
                        script.async = true; script.defer = true;
                        document.head.appendChild(script);
                    }
                }
            } else {
                const container = document.querySelector('.captcha-container');
                if (container) container.style.display = 'none';
            }
        }

        // ==========================================
        // BUSCAR SOLICITUD
        // ==========================================
        
        async function handleSearch(e) {
            e.preventDefault();
            
            const trackingNumber = document.getElementById('trackingNumber').value.trim();
            
            const uuidPattern = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
            if (!uuidPattern.test(trackingNumber)) {
                showAlert('El número de seguimiento no tiene un formato válido', 'danger');
                return;
            }
            
            if (systemConfig?.recaptcha_site_key) {
                try {
                    if (typeof grecaptcha !== 'undefined') {
                        const response = grecaptcha.getResponse();
                        if (!response) {
                            showAlert('Por favor, completa la verificación reCAPTCHA', 'danger');
                            return;
                        }
                    }
                } catch (error) {
                    console.warn('⚠️ Error validando reCAPTCHA:', error);
                }
            }
            
            const searchBtn = document.getElementById('searchBtn');
            searchBtn.disabled = true;
            searchBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Buscando...';
            
            try {
                await searchInstance(trackingNumber);
            } catch (error) {
                console.error('❌ Error:', error);
                showAlert('Error al buscar la solicitud: ' + error.message, 'danger');
            } finally {
                searchBtn.disabled = false;
                searchBtn.innerHTML = '<i class="bi bi-search me-2"></i>Consultar Estado';
            }
        }
        
        async function searchInstance(instanceId) {
            console.log('🔍 Buscando instancia:', instanceId);
            
            const instances = await supabaseRequest(
                `/procedure_instances?instance_id=eq.${instanceId}&select=*`
            );
            
            if (!instances || instances.length === 0) {
                showAlert('No se encontró ninguna solicitud con ese número de seguimiento', 'danger');
                return;
            }
            
            currentInstance = instances[0];
            
            const procedures = await supabaseRequest(
                `/procedures?procedure_id=eq.${currentInstance.procedure_id}&select=*`
            );
            
            if (!procedures || procedures.length === 0) {
                throw new Error('Procedimiento no encontrado');
            }
            
            currentProcedure = procedures[0];
            
            allSteps = await supabaseRequest(
                `/procedure_steps?procedure_id=eq.${currentProcedure.procedure_id}&select=*&order=step_sequence.asc`
            );
            allSteps = allSteps || [];
            
            stepExecutions = await supabaseRequest(
                `/procedure_instance_steps?instance_id=eq.${instanceId}&select=*,procedure_steps(step_name,step_description)&order=started_at.asc`
            );
            stepExecutions = stepExecutions || [];
            
            console.log(`✅ Procedimiento: ${currentProcedure.procedure_name}, ${allSteps.length} pasos, ${stepExecutions.length} ejecuciones`);
            
            renderResults();
        }

        // ==========================================
        // RENDERIZAR RESULTADOS
        // ==========================================
        
        function renderResults() {
            document.getElementById('searchCard').style.display = 'none';
            document.getElementById('resultCard').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            document.getElementById('resultTitle').textContent = currentProcedure.procedure_name;
            document.getElementById('resultSubtitle').textContent = `Solicitud: ${currentInstance.instance_id}`;
            
            renderInfoGrid();
            renderProgress();
            renderTimeline();
        }
        
        function renderInfoGrid() {
            const statusLabels = {
                'in_progress': 'En Proceso',
                'completed': 'Completada',
                'cancelled': 'Cancelada'
            };
            
            const statusLabel = statusLabels[currentInstance.instance_status] || currentInstance.instance_status;
            const requesterName = currentInstance.initiated_by_name || 'No especificado';
            
            document.getElementById('infoGrid').innerHTML = `
                <div class="info-item">
                    <div class="info-label">Estado</div>
                    <div class="info-value">
                        <span class="status-badge status-${currentInstance.instance_status}">${statusLabel}</span>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-label">Solicitante</div>
                    <div class="info-value">${escapeHtml(requesterName)}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Fecha de Inicio</div>
                    <div class="info-value">${formatDate(currentInstance.started_at)}</div>
                </div>
                ${currentInstance.completed_at ? `
                <div class="info-item">
                    <div class="info-label">Fecha de Finalización</div>
                    <div class="info-value">${formatDate(currentInstance.completed_at)}</div>
                </div>
                ` : ''}
                ${currentInstance.cancelled_at ? `
                <div class="info-item">
                    <div class="info-label">Fecha de Cancelación</div>
                    <div class="info-value">${formatDate(currentInstance.cancelled_at)}</div>
                </div>
                ` : ''}
            `;
        }
        
        function renderProgress() {
            const totalSteps = allSteps.length;
            const completedSteps = stepExecutions.filter(e => e.step_status === 'completed').length;
            const percentage = totalSteps > 0 ? (completedSteps / totalSteps) * 100 : 0;
            
            document.getElementById('progressBar').style.width = `${percentage}%`;
            document.getElementById('progressText').textContent = `${completedSteps} de ${totalSteps} pasos completados`;
        }

        // ==========================================
        // RENDERIZAR TIMELINE
        // ==========================================
        
        function renderTimeline() {
            const timeline = document.getElementById('timeline');
            
            const items = allSteps.map(step => {
                const execution = stepExecutions.find(e => e.step_id === step.step_id);
                
                let itemClass = '';
                let icon = 'bi-circle';
                let meta = '';
                
                if (execution) {
                    if (execution.step_status === 'completed') {
                        itemClass = 'completed';
                        icon = 'bi-check-circle-fill';
                        meta = `Completado el ${formatDate(execution.completed_at)}`;
                    } else if (execution.step_status === 'in_progress') {
                        itemClass = 'current';
                        icon = 'bi-arrow-right-circle-fill';
                        meta = 'En proceso';
                    } else {
                        itemClass = 'current';
                        icon = 'bi-clock';
                        meta = 'Pendiente';
                    }
                } else {
                    icon = 'bi-circle';
                    meta = 'Por iniciar';
                }
                
                return `
                    <div class="timeline-item ${itemClass}">
                        <div class="timeline-icon">
                            <i class="bi ${icon}"></i>
                        </div>
                        <div class="timeline-content">
                            <div class="timeline-title">${escapeHtml(step.step_name)}</div>
                            <div class="timeline-meta">${meta}</div>
                            ${step.step_description ? `<div class="timeline-description">${escapeHtml(step.step_description)}</div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
            
            timeline.innerHTML = items;
        }

        // ==========================================
        // NUEVA BÚSQUEDA
        // ==========================================
        
        function newSearch() {
            document.getElementById('resultCard').style.display = 'none';
            document.getElementById('searchCard').style.display = 'block';
            document.getElementById('searchForm').reset();
            document.getElementById('alertContainer').innerHTML = '';
            
            if (typeof grecaptcha !== 'undefined') {
                try { grecaptcha.reset(); } catch (e) {}
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ==========================================
        // UTILIDADES
        // ==========================================
        
        function showAlert(message, type = 'danger') {
            const container = document.getElementById('alertContainer');
            const alertId = 'alert_' + Date.now();
            
            const icons = {
                success: 'check-circle',
                danger: 'exclamation-triangle',
                warning: 'exclamation-triangle',
                info: 'info-circle'
            };
            
            container.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert" id="${alertId}">
                    <i class="bi bi-${icons[type]} me-2"></i>${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            
            setTimeout(() => {
                const alert = document.getElementById(alertId);
                if (alert) {
                    const bsAlert = bootstrap.Alert.getOrCreateInstance(alert);
                    bsAlert.close();
                }
            }, 5000);
        }
        
        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleDateString('es-CO', { 
                year: 'numeric', month: 'long', day: 'numeric',
                hour: '2-digit', minute: '2-digit',
                timeZone: 'America/Bogota'
            });
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        console.log('✅ track-public.html cargado correctamente');
    </script>
</body>
</html>
