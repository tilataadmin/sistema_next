<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="page-version" content="26.04.11.23.30">
    <title>Bitácora de Observaciones - SchoolNet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; justify-content: center;
            align-items: center; z-index: 9999;
        }
        .loading-overlay.hidden { display: none; }
        .loading-content { background: white; padding: 2rem; border-radius: 8px; text-align: center; }
        .spinner {
            border: 3px solid #f3f3f3; border-top: 3px solid #0ea5e9;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 0 auto 1rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .obs-card {
            border: 1px solid #e5e7eb; border-radius: 10px;
            padding: 1rem; margin-bottom: 0.75rem;
            transition: border-color 0.2s;
        }
        .obs-card:hover { border-color: #0ea5e9; }
        .obs-fortaleza { border-left: 4px solid #10b981; }
        .obs-oportunidad { border-left: 4px solid #f59e0b; }
        .vis-privada { background-color: #f3f4f6; color: #6b7280; }
        .vis-compartida { background-color: #dbeafe; color: #1e40af; }
        .vis-institucional { background-color: #fef3c7; color: #92400e; }
    </style>
</head>
<body>
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-content"><div class="spinner"></div><p class="mb-0">Cargando...</p></div>
    </div>

    <div class="container-fluid">
        <nav aria-label="breadcrumb" class="mt-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="../../dashboard.html"><i class="bi bi-house me-1"></i>Dashboard</a></li>
                <li class="breadcrumb-item"><a href="index.html">Evaluación de Desempeño</a></li>
                <li class="breadcrumb-item active">Bitácora de Observaciones</li>
            </ol>
        </nav>

        <div class="row mb-4">
            <div class="col">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <div>
                        <h1 class="h3"><i class="bi bi-journal-text me-2" style="color: #0ea5e9;"></i>Bitácora de Observaciones</h1>
                        <p class="text-muted">Registro continuo de observaciones sobre prácticas de liderazgo</p>
                    </div>
                    <button class="btn btn-primary" onclick="abrirModalObservacion()">
                        <i class="bi bi-plus-circle me-1"></i>Nueva Observación
                    </button>
                </div>
            </div>
        </div>

        <div id="alertContainer"></div>

        <!-- FILTROS -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="row g-3 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label">Líder observado</label>
                        <select class="form-select" id="filter-evaluatee" onchange="cargarObservaciones()">
                            <option value="">Todos</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Dimensión</label>
                        <select class="form-select" id="filter-dimension" onchange="cargarObservaciones()">
                            <option value="">Todas</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Tipo</label>
                        <select class="form-select" id="filter-type" onchange="cargarObservaciones()">
                            <option value="">Todos</option>
                            <option value="fortaleza">Fortaleza</option>
                            <option value="oportunidad_mejora">Oportunidad de mejora</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Desde</label>
                        <input type="date" class="form-control" id="filter-from" onchange="cargarObservaciones()">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Hasta</label>
                        <input type="date" class="form-control" id="filter-to" onchange="cargarObservaciones()">
                    </div>
                </div>
            </div>
        </div>

        <!-- LISTA DE OBSERVACIONES -->
        <div id="observations-container">
            <div class="text-center text-muted py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2">Cargando observaciones...</p>
            </div>
        </div>
    </div>

    <!-- MODAL NUEVA/EDITAR OBSERVACIÓN -->
    <div class="modal fade" id="modal-observation" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal-obs-title"><i class="bi bi-plus-circle me-2"></i>Nueva Observación</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="form-observation" onsubmit="guardarObservacion(event)">
                    <div class="modal-body">
                        <input type="hidden" id="obs-id">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Líder observado <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="obs-search-worker" placeholder="Buscar por nombre..." oninput="buscarWorkers(this.value)">
                                <div id="obs-worker-results" class="list-group mt-1" style="max-height: 150px; overflow-y: auto;"></div>
                                <input type="hidden" id="obs-evaluatee-id">
                                <small class="text-muted" id="obs-selected-name"></small>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label">Fecha <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" id="obs-date" required>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label">Tipo <span class="text-danger">*</span></label>
                                <select class="form-select" id="obs-type" required>
                                    <option value="fortaleza">Fortaleza</option>
                                    <option value="oportunidad_mejora">Oportunidad de mejora</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descripción del hecho observado <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="obs-description" rows="4" required placeholder="Describa el hecho concreto: qué pasó, en qué contexto, qué hizo el líder. Evite juicios generales."></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Dimensión <span class="text-danger">*</span></label>
                                <select class="form-select" id="obs-dimension" required></select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Atributo <small class="text-muted">(opcional)</small></label>
                                <select class="form-select" id="obs-attribute"></select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Visibilidad</label>
                                <select class="form-select" id="obs-visibility">
                                    <option value="privada">Privada (solo yo)</option>
                                    <option value="compartida">Compartida (yo + líder)</option>
                                    <option value="institucional">Institucional (yo + líder + superior)</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/config.js"></script>

    <script>
        // ==========================================
        // VARIABLES GLOBALES
        // ==========================================
        let currentWorkerId = null;
        let cacheDimensions = [];
        let cacheAttributes = [];
        let cacheObservations = [];
        let modalObservation;
        let searchTimeout = null;

        // ==========================================
        // INICIALIZACIÓN
        // ==========================================
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const hasAccess = await validatePageAccess('Bitácora de observaciones');
                if (!hasAccess) return;
                const session = getStoredSession();
                if (!session) { showMessage('Sesión no válida.', 'warning'); setTimeout(() => window.location.href = '../../login.html', 1500); return; }

                modalObservation = new bootstrap.Modal(document.getElementById('modal-observation'));
                await inicializarPagina(session.user);
            } catch (error) { console.error('❌ Error:', error); showMessage('Error: ' + error.message, 'danger'); }
        });

        async function inicializarPagina(user) {
            try {
                mostrarLoading();

                // Obtener worker_id
                const workers = await supabaseRequest(`/workers?select=worker_id&email=eq.${encodeURIComponent(user.user_mail)}&limit=1`);
                if (!workers || workers.length === 0) { ocultarLoading(); showMessage('No se encontró trabajador asociado.', 'warning'); return; }
                currentWorkerId = workers[0].worker_id;

                const [dimensions, attributes] = await Promise.all([
                    supabaseRequest('/leadership_dimensions?select=*&order=dimension_order.asc&is_active=eq.true'),
                    supabaseRequest('/leadership_attributes?select=*&order=attribute_order.asc&is_active=eq.true')
                ]);
                cacheDimensions = dimensions || [];
                cacheAttributes = attributes || [];

                // Poblar filtros
                document.getElementById('filter-dimension').innerHTML = '<option value="">Todas</option>' +
                    cacheDimensions.map(d => `<option value="${d.dimension_id}">${d.dimension_code} — ${d.dimension_name}</option>`).join('');

                // Poblar selects del modal
                document.getElementById('obs-dimension').innerHTML = '<option value="">Seleccione...</option>' +
                    cacheDimensions.map(d => `<option value="${d.dimension_id}">${d.dimension_code} — ${d.dimension_name}</option>`).join('');
                document.getElementById('obs-attribute').innerHTML = '<option value="">Ninguno</option>' +
                    cacheAttributes.map(a => `<option value="${a.attribute_id}">${a.attribute_code} — ${a.attribute_name}</option>`).join('');

                // Poblar filtro de evaluados (líderes a quienes he observado o que me han observado)
                await poblarFiltroEvaluados();

                // Fecha por defecto
                document.getElementById('obs-date').value = new Date().toISOString().split('T')[0];

                await cargarObservaciones();
                ocultarLoading();
            } catch (error) { showMessage('Error: ' + error.message, 'danger'); ocultarLoading(); }
        }

        async function poblarFiltroEvaluados() {
            // Cargar líderes únicos de las observaciones donde soy autor o evaluado
            try {
                const obs = await supabaseRequest(
                    `/leadership_observations?select=evaluatee_id,workers!leadership_observations_evaluatee_fkey(worker_id,worker_first_name,worker_last_name_1)&or=(author_id.eq.${currentWorkerId},evaluatee_id.eq.${currentWorkerId})`
                );
                const uniqueWorkers = {};
                (obs || []).forEach(o => {
                    const w = o.workers;
                    if (w && !uniqueWorkers[w.worker_id]) {
                        uniqueWorkers[w.worker_id] = `${w.worker_first_name || ''} ${w.worker_last_name_1 || ''}`.trim();
                    }
                });
                const select = document.getElementById('filter-evaluatee');
                select.innerHTML = '<option value="">Todos</option>' +
                    Object.entries(uniqueWorkers).map(([id, name]) => `<option value="${id}">${name}</option>`).join('');
            } catch (e) { console.error('Error poblando filtro:', e); }
        }

        // ==========================================
        // CARGAR OBSERVACIONES
        // ==========================================
        async function cargarObservaciones() {
            try {
                let query = `/leadership_observations?select=*,workers!leadership_observations_evaluatee_fkey(worker_first_name,worker_last_name_1,worker_last_name_2),author:workers!leadership_observations_author_fkey(worker_first_name,worker_last_name_1),leadership_dimensions(dimension_code,dimension_name),leadership_attributes(attribute_code,attribute_name)`;

                // Filtro de visibilidad: ver las propias + compartidas/institucionales donde soy evaluado + las que yo creé
                query += `&or=(author_id.eq.${currentWorkerId},and(evaluatee_id.eq.${currentWorkerId},visibility.neq.privada))`;

                const filterEvaluatee = document.getElementById('filter-evaluatee').value;
                if (filterEvaluatee) query += `&evaluatee_id=eq.${filterEvaluatee}`;

                const filterDim = document.getElementById('filter-dimension').value;
                if (filterDim) query += `&dimension_id=eq.${filterDim}`;

                const filterType = document.getElementById('filter-type').value;
                if (filterType) query += `&observation_type=eq.${filterType}`;

                const filterFrom = document.getElementById('filter-from').value;
                if (filterFrom) query += `&observation_date=gte.${filterFrom}`;

                const filterTo = document.getElementById('filter-to').value;
                if (filterTo) query += `&observation_date=lte.${filterTo}`;

                query += '&order=observation_date.desc';

                cacheObservations = await supabaseRequest(query);
                renderizarObservaciones();
            } catch (error) {
                showMessage('Error cargando observaciones: ' + error.message, 'danger');
            }
        }

        // ==========================================
        // RENDERIZAR
        // ==========================================
        function renderizarObservaciones() {
            const container = document.getElementById('observations-container');

            if (!cacheObservations || cacheObservations.length === 0) {
                container.innerHTML = `
                    <div class="text-center text-muted py-5">
                        <i class="bi bi-journal-x" style="font-size: 3rem;"></i>
                        <p class="mt-2">No hay observaciones registradas.</p>
                    </div>`;
                return;
            }

            container.innerHTML = cacheObservations.map(o => {
                const evaluatee = o.workers || {};
                const author = o.author || {};
                const dim = o.leadership_dimensions || {};
                const attr = o.leadership_attributes;
                const fullName = `${evaluatee.worker_first_name || ''} ${evaluatee.worker_last_name_1 || ''} ${evaluatee.worker_last_name_2 || ''}`.trim();
                const authorName = `${author.worker_first_name || ''} ${author.worker_last_name_1 || ''}`.trim();
                const typeClass = o.observation_type === 'fortaleza' ? 'obs-fortaleza' : 'obs-oportunidad';
                const typeLabel = o.observation_type === 'fortaleza' ? 'Fortaleza' : 'Oportunidad de mejora';
                const typeBadge = o.observation_type === 'fortaleza'
                    ? '<span class="badge bg-success">Fortaleza</span>'
                    : '<span class="badge bg-warning text-dark">Oportunidad</span>';
                const visBadge = `<span class="badge vis-${o.visibility}">${o.visibility}</span>`;
                const attrBadge = attr ? `<span class="badge bg-light text-dark">${attr.attribute_code}</span>` : '';

                const isAuthor = o.author_id === currentWorkerId;
                const editBtn = isAuthor ? `<button class="btn btn-sm btn-outline-primary" onclick="editarObservacion('${o.observation_id}')"><i class="bi bi-pencil"></i></button>` : '';

                return `
                <div class="obs-card ${typeClass}">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <div>
                            <strong>${fullName}</strong>
                            <span class="text-muted ms-2">${formatDate(o.observation_date)}</span>
                        </div>
                        <div class="d-flex gap-1 align-items-center">
                            ${typeBadge}
                            <span class="badge bg-info text-dark">${dim.dimension_code || ''}</span>
                            ${attrBadge}
                            ${visBadge}
                            ${editBtn}
                        </div>
                    </div>
                    <p class="mb-1">${o.description}</p>
                    <small class="text-muted">Registrada por: ${authorName}</small>
                </div>`;
            }).join('');
        }

        // ==========================================
        // CRUD
        // ==========================================
        function abrirModalObservacion() {
            document.getElementById('form-observation').reset();
            document.getElementById('obs-id').value = '';
            document.getElementById('obs-evaluatee-id').value = '';
            document.getElementById('obs-selected-name').textContent = '';
            document.getElementById('obs-worker-results').innerHTML = '';
            document.getElementById('obs-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('modal-obs-title').innerHTML = '<i class="bi bi-plus-circle me-2"></i>Nueva Observación';
            modalObservation.show();
        }

        function editarObservacion(id) {
            const o = cacheObservations.find(x => x.observation_id === id);
            if (!o) return;
            const evaluatee = o.workers || {};
            const fullName = `${evaluatee.worker_first_name || ''} ${evaluatee.worker_last_name_1 || ''} ${evaluatee.worker_last_name_2 || ''}`.trim();

            document.getElementById('obs-id').value = o.observation_id;
            document.getElementById('obs-evaluatee-id').value = o.evaluatee_id;
            document.getElementById('obs-search-worker').value = fullName;
            document.getElementById('obs-selected-name').textContent = fullName;
            document.getElementById('obs-date').value = o.observation_date;
            document.getElementById('obs-type').value = o.observation_type;
            document.getElementById('obs-description').value = o.description;
            document.getElementById('obs-dimension').value = o.dimension_id;
            document.getElementById('obs-attribute').value = o.attribute_id || '';
            document.getElementById('obs-visibility').value = o.visibility;
            document.getElementById('obs-worker-results').innerHTML = '';
            document.getElementById('modal-obs-title').innerHTML = '<i class="bi bi-pencil me-2"></i>Editar Observación';
            modalObservation.show();
        }

        async function guardarObservacion(e) {
            e.preventDefault();
            const id = document.getElementById('obs-id').value;
            const evaluateeId = document.getElementById('obs-evaluatee-id').value;

            if (!evaluateeId) { showMessage('Seleccione un líder observado.', 'warning'); return; }

            const payload = {
                evaluatee_id: evaluateeId,
                observation_date: document.getElementById('obs-date').value,
                observation_type: document.getElementById('obs-type').value,
                description: document.getElementById('obs-description').value.trim(),
                dimension_id: document.getElementById('obs-dimension').value,
                attribute_id: document.getElementById('obs-attribute').value || null,
                visibility: document.getElementById('obs-visibility').value
            };

            if (!id) payload.author_id = currentWorkerId;

            try {
                if (id) {
                    await supabaseRequest(`/leadership_observations?observation_id=eq.${id}`, { method: 'PATCH', body: JSON.stringify(payload) });
                } else {
                    await supabaseRequest('/leadership_observations', { method: 'POST', body: JSON.stringify(payload) });
                }
                modalObservation.hide();
                showMessage('Observación guardada correctamente', 'success');

                // Notificar al evaluado si es compartida o institucional
                if (!id && payload.visibility !== 'privada') {
                    try {
                        const evaluateeWorker = await supabaseRequest(`/workers?select=email,worker_first_name&worker_id=eq.${payload.evaluatee_id}&limit=1`);
                        if (evaluateeWorker && evaluateeWorker[0]?.email) {
                            const authorWorker = await supabaseRequest(`/workers?select=worker_first_name,worker_last_name_1&worker_id=eq.${currentWorkerId}&limit=1`);
                            const authorName = authorWorker?.[0] ? `${authorWorker[0].worker_first_name} ${authorWorker[0].worker_last_name_1}` : 'Un colega';
                            const dim = cacheDimensions.find(d => d.dimension_id === payload.dimension_id);
                            const typeLabel = payload.observation_type === 'fortaleza' ? 'Fortaleza' : 'Oportunidad de mejora';

                            const subject = 'SchoolNet - Nueva observación de liderazgo registrada';
                            const htmlContent = `
                                <div style="font-family: Arial, sans-serif; max-width: 600px;">
                                    <h2 style="color: #0ea5e9;">Nueva observación registrada</h2>
                                    <p>Hola ${evaluateeWorker[0].worker_first_name},</p>
                                    <p><strong>${authorName}</strong> ha registrado una observación sobre tu práctica de liderazgo:</p>
                                    <div style="background: #f8f9fa; padding: 1rem; border-radius: 8px; border-left: 4px solid ${payload.observation_type === 'fortaleza' ? '#10b981' : '#f59e0b'};">
                                        <p><strong>Tipo:</strong> ${typeLabel}</p>
                                        <p><strong>Dimensión:</strong> ${dim?.dimension_name || ''}</p>
                                        <p><strong>Visibilidad:</strong> ${payload.visibility}</p>
                                    </div>
                                    <p style="margin-top: 1rem;">Puedes consultar el detalle completo en la <a href="https://schoolnet.colegiotilata.edu.co/modules/teacher-eval/leadership-observations.html">Bitácora de Observaciones</a>.</p>
                                    <hr>
                                    <p style="color: #6b7280; font-size: 0.8rem;">Este es un mensaje automático de SchoolNet. No responder.</p>
                                </div>`;

                            await sendNotification(evaluateeWorker[0].email, subject, htmlContent, true);
                        }
                    } catch (notifError) { console.log('Notificación no enviada:', notifError); }
                }
                await poblarFiltroEvaluados();
                await cargarObservaciones();
            } catch (error) {
                showMessage('Error: ' + error.message, 'danger');
            }
        }

        // ==========================================
        // BÚSQUEDA DE WORKERS
        // ==========================================
        async function buscarWorkers(query) {
            clearTimeout(searchTimeout);
            if (query.length < 2) { document.getElementById('obs-worker-results').innerHTML = ''; return; }
            searchTimeout = setTimeout(async () => {
                try {
                    const data = await supabaseRequest(
                        `/workers?select=worker_id,worker_first_name,worker_last_name_1,worker_last_name_2&or=(worker_first_name.ilike.%25${query}%25,worker_last_name_1.ilike.%25${query}%25)&worker_status=eq.active&order=worker_last_name_1.asc&limit=10`
                    );
                    document.getElementById('obs-worker-results').innerHTML = (data || []).map(w => {
                        const name = `${w.worker_first_name} ${w.worker_last_name_1} ${w.worker_last_name_2 || ''}`.trim();
                        return `<button type="button" class="list-group-item list-group-item-action" onclick="seleccionarWorker('${w.worker_id}', '${name}')">${name}</button>`;
                    }).join('') || '<div class="list-group-item text-muted">Sin resultados</div>';
                } catch (error) { console.error('Error buscando:', error); }
            }, 300);
        }

        function seleccionarWorker(id, name) {
            document.getElementById('obs-evaluatee-id').value = id;
            document.getElementById('obs-search-worker').value = name;
            document.getElementById('obs-selected-name').textContent = name;
            document.getElementById('obs-worker-results').innerHTML = '';
        }

        // ==========================================
        // UTILIDADES
        // ==========================================
        function formatDate(dateStr) {
            if (!dateStr) return '—';
            const d = new Date(dateStr + 'T00:00:00');
            return d.toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric' });
        }
        function mostrarLoading() { document.getElementById('loading-overlay').classList.remove('hidden'); }
        function ocultarLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }
    </script>
</body>
</html>
