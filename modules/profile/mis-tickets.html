<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="page-version" content="26.04.08.16.00">
    <title>Mis Tickets - SchoolNet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .loading-overlay { position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;justify-content:center;align-items:center;z-index:9999; }
        .loading-overlay.hidden { display:none; }
        .loading-content { background:white;padding:2rem;border-radius:8px;text-align:center; }
        .spinner { border:3px solid #f3f3f3;border-top:3px solid #9b59b6;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:0 auto 1rem; }
        @keyframes spin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }

        .ticket-card {
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
            transition: all 0.2s;
            cursor: pointer;
            border-left: 4px solid #dee2e6;
        }
        .ticket-card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        .ticket-card.status-pendiente { border-left-color: #ffc107; }
        .ticket-card.status-en_revision { border-left-color: #0dcaf0; }
        .ticket-card.status-en_desarrollo { border-left-color: #6f42c1; }
        .ticket-card.status-resuelto { border-left-color: #198754; }
        .ticket-card.status-cerrado { border-left-color: #6c757d; }
        .ticket-card.status-asignado { border-left-color: #0d6efd; }

        .ticket-number { font-weight: 700; font-size: 1rem; color: #1B365D; }
        .ticket-desc { font-size: 0.85rem; color: #495057; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .ticket-meta { font-size: 0.78rem; color: #6c757d; }

        .status-badge { font-size: 0.75rem; padding: 0.3rem 0.6rem; border-radius: 20px; font-weight: 500; }

        .empty-state { text-align: center; padding: 3rem 1rem; color: #6c757d; }
        .empty-state i { font-size: 3.5rem; display: block; margin-bottom: 1rem; }

        .counter-card { border: none; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .counter-value { font-size: 1.5rem; font-weight: 700; }
    </style>
</head>
<body>
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-content"><div class="spinner"></div><p class="mb-0">Cargando tickets...</p></div>
    </div>

    <div class="container-fluid">
        <nav aria-label="breadcrumb" class="mt-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="../../dashboard.html"><i class="bi bi-house me-1"></i>Dashboard</a></li>
                <li class="breadcrumb-item"><a href="index.html">Mi Perfil</a></li>
                <li class="breadcrumb-item active" aria-current="page">Mis Tickets</li>
            </ol>
        </nav>

        <div class="row mb-3">
            <div class="col">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <div>
                        <h1 class="h3">
                            <i class="bi bi-ticket-perforated me-2" style="color: #9b59b6;"></i>Mis Tickets
                        </h1>
                        <p class="text-muted mb-0">Historial y seguimiento de tus solicitudes de soporte</p>
                    </div>
                    <a href="../../manual/report-ticket.html" class="btn btn-primary">
                        <i class="bi bi-plus-circle me-1"></i>Nuevo Ticket
                    </a>
                </div>
            </div>
        </div>

        <div id="alertContainer"></div>

        <!-- CONTADORES -->
        <div class="row g-3 mb-4" id="counters-row">
            <div class="col-6 col-lg-2">
                <div class="card counter-card" style="border-left:4px solid #ffc107;">
                    <div class="card-body py-2 px-3 d-flex align-items-center justify-content-between">
                        <div><small class="text-muted">Pendientes</small><div class="counter-value text-warning" id="count-pendiente">0</div></div>
                        <i class="bi bi-clock-history text-warning" style="font-size:1.4rem;opacity:0.5;"></i>
                    </div>
                </div>
            </div>
            <div class="col-6 col-lg-2">
                <div class="card counter-card" style="border-left:4px solid #0d6efd;">
                    <div class="card-body py-2 px-3 d-flex align-items-center justify-content-between">
                        <div><small class="text-muted">Asignados</small><div class="counter-value text-primary" id="count-asignado">0</div></div>
                        <i class="bi bi-person-check text-primary" style="font-size:1.4rem;opacity:0.5;"></i>
                    </div>
                </div>
            </div>
            <div class="col-6 col-lg-2">
                <div class="card counter-card" style="border-left:4px solid #0dcaf0;">
                    <div class="card-body py-2 px-3 d-flex align-items-center justify-content-between">
                        <div><small class="text-muted">En Revisión</small><div class="counter-value text-info" id="count-en_revision">0</div></div>
                        <i class="bi bi-search text-info" style="font-size:1.4rem;opacity:0.5;"></i>
                    </div>
                </div>
            </div>
            <div class="col-6 col-lg-2">
                <div class="card counter-card" style="border-left:4px solid #6f42c1;">
                    <div class="card-body py-2 px-3 d-flex align-items-center justify-content-between">
                        <div><small class="text-muted">En Desarrollo</small><div class="counter-value" style="color:#6f42c1;" id="count-en_desarrollo">0</div></div>
                        <i class="bi bi-code-slash" style="font-size:1.4rem;opacity:0.5;color:#6f42c1;"></i>
                    </div>
                </div>
            </div>
            <div class="col-6 col-lg-2">
                <div class="card counter-card" style="border-left:4px solid #198754;">
                    <div class="card-body py-2 px-3 d-flex align-items-center justify-content-between">
                        <div><small class="text-muted">Resueltos</small><div class="counter-value text-success" id="count-resuelto">0</div></div>
                        <i class="bi bi-check-circle text-success" style="font-size:1.4rem;opacity:0.5;"></i>
                    </div>
                </div>
            </div>
            <div class="col-6 col-lg-2">
                <div class="card counter-card" style="border-left:4px solid #6c757d;">
                    <div class="card-body py-2 px-3 d-flex align-items-center justify-content-between">
                        <div><small class="text-muted">Cerrados</small><div class="counter-value text-secondary" id="count-cerrado">0</div></div>
                        <i class="bi bi-x-circle text-secondary" style="font-size:1.4rem;opacity:0.5;"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- FILTROS -->
        <div class="card mb-3" style="border-radius:10px;border:1px solid #e9ecef;">
            <div class="card-body py-2 px-3">
                <div class="row g-2 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label small mb-1"><i class="bi bi-search me-1"></i>Buscar</label>
                        <input type="text" class="form-control form-control-sm" id="filter-search"
                               placeholder="Número, descripción..." oninput="filtrarTickets()">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small mb-1">Estado</label>
                        <select class="form-select form-select-sm" id="filter-status" onchange="filtrarTickets()">
                            <option value="">Todos</option>
                            <option value="no_cerrado" selected>Abiertos y en progreso</option>
                            <option value="pendiente">Pendiente</option>
                            <option value="asignado">Asignado</option>
                            <option value="en_revision">En Revisión</option>
                            <option value="en_desarrollo">En Desarrollo</option>
                            <option value="resuelto">Resuelto</option>
                            <option value="cerrado">Cerrado</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small mb-1">Ordenar</label>
                        <select class="form-select form-select-sm" id="filter-sort" onchange="filtrarTickets()">
                            <option value="recent">Más recientes</option>
                            <option value="oldest">Más antiguos</option>
                            <option value="updated">Última actualización</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-outline-secondary btn-sm w-100" onclick="limpiarFiltros()">
                            <i class="bi bi-x-lg me-1"></i>Limpiar
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- LISTADO DE TICKETS -->
        <div id="tickets-container">
            <div class="text-center py-4 text-muted">
                <div class="spinner-border spinner-border-sm text-primary me-2"></div>Cargando...
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/config.js"></script>

    <script>
        // ==========================================
        // VARIABLES GLOBALES
        // ==========================================
        let currentUser = null;
        let ticketsCache = [];

        const STATUS_MAP = {
            pendiente:     { label: 'Pendiente',      bg: '#ffc107', color: '#000' },
            asignado:      { label: 'Asignado',       bg: '#0d6efd', color: '#fff' },
            en_revision:   { label: 'En Revisión',    bg: '#0dcaf0', color: '#000' },
            en_desarrollo: { label: 'En Desarrollo',  bg: '#6f42c1', color: '#fff' },
            resuelto:      { label: 'Resuelto',       bg: '#198754', color: '#fff' },
            cerrado:       { label: 'Cerrado',        bg: '#6c757d', color: '#fff' }
        };

        // ==========================================
        // INICIALIZACIÓN
        // ==========================================
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const session = getStoredSession();
                if (!session || !session.user) {
                    showMessage('Debes iniciar sesión para ver tus tickets', 'danger');
                    setTimeout(() => { window.location.href = '../../index.html'; }, 2000);
                    return;
                }
                currentUser = session.user;

                await cargarTickets();
            } catch (error) {
                console.error('❌ Error inicializando:', error);
                showMessage('Error al cargar la página: ' + error.message, 'danger');
            }
        });

        // ==========================================
        // CARGAR TICKETS DEL USUARIO
        // ==========================================
        async function cargarTickets() {
            document.getElementById('loading-overlay').classList.remove('hidden');

            try {
                ticketsCache = await supabaseRequest(
                    '/support_tickets?select=ticket_id,ticket_number,description,ticket_status,created_at,updated_at,' +
                    'ticket_categories(category_name,category_icon,category_color),' +
                    'ticket_priority_options(priority_label,priority_color)' +
                    '&user_id=eq.' + currentUser.user_id +
                    '&order=created_at.desc'
                ) || [];

                actualizarContadores();
                filtrarTickets();
                console.log('✅ ' + ticketsCache.length + ' tickets cargados');
            } catch (error) {
                console.error('❌ Error cargando tickets:', error);
                showMessage('Error al cargar tickets: ' + error.message, 'danger');
            } finally {
                document.getElementById('loading-overlay').classList.add('hidden');
            }
        }

        // ==========================================
        // CONTADORES
        // ==========================================
        function actualizarContadores() {
            const statuses = ['pendiente', 'asignado', 'en_revision', 'en_desarrollo', 'resuelto', 'cerrado'];
            statuses.forEach(s => {
                const count = ticketsCache.filter(t => t.ticket_status === s).length;
                const el = document.getElementById('count-' + s);
                if (el) el.textContent = count;
            });
        }

        // ==========================================
        // FILTRAR Y RENDERIZAR
        // ==========================================
        function filtrarTickets() {
            const search = document.getElementById('filter-search').value.toLowerCase().trim();
            const status = document.getElementById('filter-status').value;
            const sort = document.getElementById('filter-sort').value;

            let filtered = ticketsCache.filter(t => {
                if (status === 'no_cerrado' && t.ticket_status === 'cerrado') return false;
                else if (status && status !== 'no_cerrado' && t.ticket_status !== status) return false;
                if (search) {
                    const num = t.ticket_number ? String(t.ticket_number) : '';
                    const desc = (t.description || '').toLowerCase();
                    const cat = (t.ticket_categories?.category_name || '').toLowerCase();
                    if (!num.includes(search) && !desc.includes(search) && !cat.includes(search)) return false;
                }
                return true;
            });

            filtered.sort((a, b) => {
                switch (sort) {
                    case 'oldest': return new Date(a.created_at) - new Date(b.created_at);
                    case 'updated': return new Date(b.updated_at) - new Date(a.updated_at);
                    default: return new Date(b.created_at) - new Date(a.created_at);
                }
            });

            renderizarTickets(filtered);
        }

        function limpiarFiltros() {
            document.getElementById('filter-search').value = '';
            document.getElementById('filter-status').value = '';
            document.getElementById('filter-sort').value = 'recent';
            filtrarTickets();
        }

        // ==========================================
        // RENDERIZAR LISTADO
        // ==========================================
        function renderizarTickets(tickets) {
            const container = document.getElementById('tickets-container');

            if (!tickets || tickets.length === 0) {
                const hayFiltros = document.getElementById('filter-search').value || document.getElementById('filter-status').value;
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-${hayFiltros ? 'funnel' : 'ticket-perforated'}"></i>
                        <h5>${hayFiltros ? 'Sin resultados' : 'No tienes tickets aún'}</h5>
                        <p>${hayFiltros ? 'Intenta con otros filtros' : 'Cuando reportes un problema o solicitud, aparecerá aquí'}</p>
                        ${!hayFiltros ? '<a href="../../manual/report-ticket.html" class="btn btn-primary btn-sm"><i class="bi bi-plus-circle me-1"></i>Crear mi primer ticket</a>' : ''}
                    </div>`;
                return;
            }

            container.innerHTML = tickets.map(t => {
                const st = STATUS_MAP[t.ticket_status] || { label: t.ticket_status, bg: '#6c757d', color: '#fff' };
                const cat = t.ticket_categories;
                const pri = t.ticket_priority_options;
                const num = t.ticket_number ? '#' + t.ticket_number : '';
                const created = new Date(t.created_at).toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric' });
                const updated = new Date(t.updated_at).toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric' });
                const descPreview = (t.description || '').substring(0, 120) + (t.description?.length > 120 ? '...' : '');

                return `
                    <div class="ticket-card status-${t.ticket_status}" onclick="abrirTicket('${t.ticket_id}')">
                        <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                            <div class="flex-grow-1">
                                <div class="d-flex align-items-center gap-2 mb-1">
                                    <span class="ticket-number">${num}</span>
                                    ${cat ? `<span style="font-size:0.75rem;color:${cat.category_color};"><i class="bi ${cat.category_icon} me-1"></i>${cat.category_name}</span>` : ''}
                                </div>
                                <div class="ticket-desc mb-2">${escapeHtml(descPreview)}</div>
                                <div class="ticket-meta">
                                    <i class="bi bi-calendar3 me-1"></i>Creado: ${created}
                                    <span class="mx-2">·</span>
                                    <i class="bi bi-arrow-clockwise me-1"></i>Actualizado: ${updated}
                                </div>
                            </div>
                            <div class="d-flex flex-column align-items-end gap-1">
                                <span class="status-badge" style="background:${st.bg};color:${st.color};">${st.label}</span>
                                ${pri ? `<span style="font-size:0.7rem;color:${pri.priority_color};font-weight:500;">${pri.priority_label}</span>` : ''}
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        // ==========================================
        // ABRIR DETALLE DEL TICKET
        // ==========================================
        function abrirTicket(ticketId) {
            window.location.href = '../../manual/my-ticket.html?id=' + ticketId;
        }

        // ==========================================
        // UTILIDADES
        // ==========================================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        console.log('✅ Página Mis Tickets cargada');
    </script>
</body>
</html>
