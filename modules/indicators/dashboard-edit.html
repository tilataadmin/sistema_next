<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="page-version" content="26.04.28.08.00">
    <title>Editar Dashboard - SchoolNet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        .indicator-item, .variable-item {
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            transition: all 0.2s ease;
            cursor: pointer;
            background: white;
        }
        .indicator-item:hover, .variable-item:hover {
            border-color: var(--system-primary-color, #1B365D);
            box-shadow: 0 2px 8px rgba(27, 54, 93, 0.1);
        }
        .indicator-item.selected, .variable-item.selected {
            border-color: var(--system-primary-color, #1B365D);
            background-color: #f8f9ff;
        }
        .indicator-checkbox, .variable-checkbox { width: 20px; height: 20px; cursor: pointer; }

        .formula-preview {
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            background: #f8f9fa;
            padding: 0.5rem;
            border-radius: 4px;
            margin-top: 0.5rem;
            color: #495057;
        }

        .result-format-badge, .periodicity-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-weight: 600;
        }
        .format-decimal { background-color: #e0f2fe; color: #0c4a6e; }
        .format-percentage { background-color: #f0fdf4; color: #166534; }
        .format-integer { background-color: #fef3c7; color: #92400e; }
        .periodicity-annual { background-color: #dbeafe; color: #1e40af; }
        .periodicity-monthly { background-color: #fef3c7; color: #92400e; }

        .selection-summary {
            position: sticky;
            top: 20px;
            background: white;
            border: 2px solid var(--system-primary-color, #1B365D);
            border-radius: 8px;
            padding: 1.5rem;
        }

        .empty-state { text-align: center; padding: 3rem; color: #6c757d; }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; }

        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); display: flex;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .loading-overlay.hidden { display: none; }
        .loading-content { background: white; padding: 2rem; border-radius: 8px; text-align: center; }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--system-primary-color, #1B365D);
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 0 auto 1rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .nav-tabs .nav-link { color: #6c757d; font-weight: 500; }
        .nav-tabs .nav-link.active { color: var(--system-primary-color, #1B365D); font-weight: 600; }

        .dashboard-header-card {
            background: white;
            border-left: 4px solid var(--system-primary-color, #1B365D);
            border-radius: 8px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.5rem;
        }
        .dashboard-header-card h4 { margin: 0 0 0.25rem 0; }
        .dashboard-header-card .text-muted { font-size: 0.9rem; }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-content">
            <div class="spinner"></div>
            <p class="mb-0" id="loadingText">Procesando...</p>
        </div>
    </div>

    <div class="container-fluid">

        <!-- BREADCRUMBS -->
        <nav aria-label="breadcrumb" class="mt-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item">
                    <a href="../../dashboard.html"><i class="bi bi-house me-1"></i>Dashboard</a>
                </li>
                <li class="breadcrumb-item"><a href="index.html">Indicadores</a></li>
                <li class="breadcrumb-item"><a href="dashboard-config.html">Mis Dashboards</a></li>
                <li class="breadcrumb-item active" aria-current="page">Editar</li>
            </ol>
        </nav>

        <!-- ALERTAS -->
        <div id="alertContainer"></div>

        <!-- ENCABEZADO DEL DASHBOARD (se rellena al cargar) -->
        <div class="dashboard-header-card" id="dashboardHeader" style="display:none">
            <div class="row align-items-center">
                <div class="col">
                    <h4 id="dashboardTitle">Cargando...</h4>
                    <div class="text-muted" id="dashboardSubtitle"></div>
                </div>
                <div class="col-auto">
                    <button class="btn btn-outline-secondary btn-sm" id="editMetadataBtn"
                            onclick="openMetadataModal()" style="display:none">
                        <i class="bi bi-pencil me-1"></i>Editar nombre y descripción
                    </button>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- COLUMNA IZQUIERDA: indicadores y variables -->
            <div class="col-lg-8">
                <div class="card mb-4">
                    <div class="card-header">
                        <ul class="nav nav-tabs card-header-tabs" id="configTabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="indicators-tab" data-bs-toggle="tab"
                                        data-bs-target="#indicators-pane" type="button" role="tab">
                                    <i class="bi bi-speedometer2 me-2"></i>Indicadores
                                    <span class="badge bg-primary ms-1" id="indicatorTabCount">0</span>
                                </button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="variables-tab" data-bs-toggle="tab"
                                        data-bs-target="#variables-pane" type="button" role="tab">
                                    <i class="bi bi-graph-up me-2"></i>Variables
                                    <span class="badge bg-secondary ms-1" id="variableTabCount">0</span>
                                </button>
                            </li>
                        </ul>
                    </div>
                    <div class="card-body">
                        <div class="tab-content">
                            <!-- TAB INDICADORES -->
                            <div class="tab-pane fade show active" id="indicators-pane" role="tabpanel">
                                <div class="row mb-3">
                                    <div class="col-md-8">
                                        <input type="text" class="form-control" id="searchIndicators"
                                               placeholder="Buscar indicadores..." onkeyup="filterIndicators()">
                                    </div>
                                    <div class="col-md-4">
                                        <div class="dropdown">
                                            <button class="btn btn-outline-secondary dropdown-toggle w-100 text-start" type="button"
                                                    data-bs-toggle="dropdown" aria-expanded="false">
                                                <i class="bi bi-funnel me-2"></i>
                                                <span id="categoryFilterLabel">Todas las categorías</span>
                                            </button>
                                            <div class="dropdown-menu p-3" style="min-width: 300px; max-height: 400px; overflow-y: auto;"
                                                 onclick="event.stopPropagation();">
                                                <button class="btn btn-sm btn-outline-primary w-100 mb-2" onclick="selectAllCategories()">
                                                    <i class="bi bi-check-all me-1"></i>Seleccionar todas
                                                </button>
                                                <button class="btn btn-sm btn-outline-secondary w-100 mb-2" onclick="clearCategoryFilter()">
                                                    <i class="bi bi-x-circle me-1"></i>Limpiar selección
                                                </button>
                                                <hr>
                                                <div id="categoryFilterOptions">
                                                    <small class="text-muted">Cargando categorías...</small>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <div class="btn-group btn-group-sm" role="group">
                                        <input type="radio" class="btn-check" name="filterTypeIndicators" id="filterAllIndicators"
                                               value="all" checked onchange="filterIndicators()">
                                        <label class="btn btn-outline-primary" for="filterAllIndicators">
                                            Todos <span class="badge bg-primary" id="countAllIndicators">0</span>
                                        </label>

                                        <input type="radio" class="btn-check" name="filterTypeIndicators" id="filterSelectedIndicators"
                                               value="selected" onchange="filterIndicators()">
                                        <label class="btn btn-outline-success" for="filterSelectedIndicators">
                                            Seleccionados <span class="badge bg-success" id="countSelectedIndicators">0</span>
                                        </label>

                                        <input type="radio" class="btn-check" name="filterTypeIndicators" id="filterUnselectedIndicators"
                                               value="unselected" onchange="filterIndicators()">
                                        <label class="btn btn-outline-secondary" for="filterUnselectedIndicators">
                                            No seleccionados <span class="badge bg-secondary" id="countUnselectedIndicators">0</span>
                                        </label>
                                    </div>
                                </div>

                                <div id="indicatorsContainer">
                                    <div class="empty-state">
                                        <div class="spinner-border text-primary"></div>
                                        <p>Cargando indicadores...</p>
                                    </div>
                                </div>
                            </div>

                            <!-- TAB VARIABLES -->
                            <div class="tab-pane fade" id="variables-pane" role="tabpanel">
                                <div class="row mb-3">
                                    <div class="col-md-12">
                                        <input type="text" class="form-control" id="searchVariables"
                                               placeholder="Buscar variables..." onkeyup="filterVariables()">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <div class="btn-group btn-group-sm" role="group">
                                        <input type="radio" class="btn-check" name="filterTypeVariables" id="filterAllVariables"
                                               value="all" checked onchange="filterVariables()">
                                        <label class="btn btn-outline-primary" for="filterAllVariables">
                                            Todos <span class="badge bg-primary" id="countAllVariables">0</span>
                                        </label>

                                        <input type="radio" class="btn-check" name="filterTypeVariables" id="filterSelectedVariables"
                                               value="selected" onchange="filterVariables()">
                                        <label class="btn btn-outline-success" for="filterSelectedVariables">
                                            Seleccionados <span class="badge bg-success" id="countSelectedVariables">0</span>
                                        </label>

                                        <input type="radio" class="btn-check" name="filterTypeVariables" id="filterUnselectedVariables"
                                               value="unselected" onchange="filterVariables()">
                                        <label class="btn btn-outline-secondary" for="filterUnselectedVariables">
                                            No seleccionados <span class="badge bg-secondary" id="countUnselectedVariables">0</span>
                                        </label>
                                    </div>
                                </div>

                                <div id="variablesContainer">
                                    <div class="empty-state">
                                        <div class="spinner-border text-secondary"></div>
                                        <p>Cargando variables...</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- COLUMNA DERECHA: resumen + acciones -->
            <div class="col-lg-4">
                <div class="selection-summary">
                    <h5 class="mb-3"><i class="bi bi-check-circle me-2 text-success"></i>Resumen</h5>

                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="text-muted"><i class="bi bi-speedometer2 me-1"></i>Indicadores:</span>
                            <h4 class="mb-0 text-primary" id="selectedIndicatorsCount">0</h4>
                        </div>
                    </div>
                    <hr>
                    <div class="mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="text-muted"><i class="bi bi-graph-up me-1"></i>Variables:</span>
                            <h4 class="mb-0 text-secondary" id="selectedVariablesCount">0</h4>
                        </div>
                    </div>

                    <div class="alert alert-info mb-4" id="recommendationAlert">
                        <i class="bi bi-lightbulb me-2"></i>
                        <small>Selecciona al menos un indicador o variable.</small>
                    </div>

                    <div class="d-grid gap-2">
                        <button class="btn btn-success btn-lg" id="saveBtn" onclick="saveConfiguration()" disabled>
                            <i class="bi bi-check-circle me-2"></i>Guardar
                        </button>
                        <a href="dashboard-config.html" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-2"></i>Volver a Mis Dashboards
                        </a>
                        <button class="btn btn-outline-danger btn-sm" onclick="clearAllSelections()">
                            <i class="bi bi-x-circle me-2"></i>Limpiar selección
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL: Editar nombre y descripción -->
    <div class="modal fade" id="metadataModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-pencil me-2"></i>Editar dashboard</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Nombre <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="metaName" maxlength="150">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea class="form-control" id="metaDescription" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="saveMetadata()">
                        <i class="bi bi-check-circle me-1"></i>Guardar cambios
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/config.js"></script>
    <script>
        // ==========================================
        // VARIABLES GLOBALES
        // ==========================================
        let currentUser = null;
        let dashboardId = null;
        let dashboard = null; // Registro completo del dashboard actual
        let allIndicators = [];
        let filteredIndicators = [];
        let selectedIndicators = new Set();
        let allVariables = [];
        let filteredVariables = [];
        let selectedVariables = new Set();
        let availableCategories = [];
        let selectedCategoryFilters = [];

        // ==========================================
        // INICIALIZACIÓN
        // ==========================================
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const hasAccess = await validatePageAccess('Configurar mi dashboard');
                if (!hasAccess) return;

                getCurrentUser();

                // Leer ?id= de la URL
                const params = new URLSearchParams(window.location.search);
                dashboardId = params.get('id');

                if (!dashboardId) {
                    showMessage('No se especificó el dashboard a editar. Redirigiendo...', 'warning');
                    setTimeout(() => window.location.href = 'dashboard-config.html', 1500);
                    return;
                }

                await loadDashboard();
                if (!dashboard) return; // loadDashboard ya redirige si falla

                await loadCategories();
                await Promise.all([loadIndicators(), loadVariables()]);

            } catch (error) {
                console.error('❌ Error inicializando:', error);
                showMessage('Error al inicializar: ' + error.message, 'danger');
            }
        });

        function getCurrentUser() {
            try {
                const session = localStorage.getItem('nextSystemSession') ||
                                sessionStorage.getItem('nextSystemSession');
                if (session) currentUser = JSON.parse(session).user;
            } catch (e) {
                console.error('Error obteniendo sesión:', e);
            }
        }

        // ==========================================
        // CARGAR DASHBOARD Y VALIDAR PROPIEDAD
        // ==========================================
        async function loadDashboard() {
            try {
                const result = await supabaseRequest(
                    `/dashboards?select=*&dashboard_id=eq.${dashboardId}&limit=1`
                );

                if (!result || result.length === 0) {
                    showMessage('Dashboard no encontrado. Redirigiendo...', 'warning');
                    setTimeout(() => window.location.href = 'dashboard-config.html', 1500);
                    return;
                }

                dashboard = result[0];

                // Validar propiedad: solo el dueño puede editar
                if (dashboard.owner_user_id !== currentUser.user_id) {
                    showMessage('No tienes permiso para editar este dashboard. Redirigiendo...', 'warning');
                    setTimeout(() => window.location.href = 'dashboard-config.html', 1500);
                    dashboard = null;
                    return;
                }

                renderDashboardHeader();
            } catch (error) {
                console.error('Error cargando dashboard:', error);
                showMessage('Error cargando dashboard: ' + error.message, 'danger');
            }
        }

        function renderDashboardHeader() {
            const header = document.getElementById('dashboardHeader');
            const title = document.getElementById('dashboardTitle');
            const subtitle = document.getElementById('dashboardSubtitle');
            const editBtn = document.getElementById('editMetadataBtn');

            title.textContent = dashboard.dashboard_name;

            const typeLabel = dashboard.is_personal ? 'Dashboard personal' : 'Dashboard compartido';
            const desc = dashboard.dashboard_description || '<em>Sin descripción</em>';
            subtitle.innerHTML = `<i class="bi bi-tag me-1"></i>${typeLabel} · ${desc}`;

            // Solo se puede editar nombre/descripción si es compartido
            if (!dashboard.is_personal) {
                editBtn.style.display = '';
            }

            header.style.display = '';
            document.title = `${dashboard.dashboard_name} - Editar - SchoolNet`;
        }

        // ==========================================
        // EDITAR METADATA (solo compartidos)
        // ==========================================
        function openMetadataModal() {
            document.getElementById('metaName').value = dashboard.dashboard_name;
            document.getElementById('metaDescription').value = dashboard.dashboard_description || '';
            new bootstrap.Modal(document.getElementById('metadataModal')).show();
        }

        async function saveMetadata() {
            const name = document.getElementById('metaName').value.trim();
            const description = document.getElementById('metaDescription').value.trim();

            if (!name) {
                showMessage('El nombre es obligatorio', 'warning');
                return;
            }

            try {
                await supabaseRequest(`/dashboards?dashboard_id=eq.${dashboardId}`, {
                    method: 'PATCH',
                    body: JSON.stringify({
                        dashboard_name: name,
                        dashboard_description: description || null,
                        updated_at: new Date().toISOString()
                    })
                });

                dashboard.dashboard_name = name;
                dashboard.dashboard_description = description || null;
                renderDashboardHeader();

                bootstrap.Modal.getInstance(document.getElementById('metadataModal')).hide();
                showMessage('Cambios guardados', 'success');
            } catch (error) {
                console.error('Error guardando metadata:', error);
                showMessage('Error guardando cambios: ' + error.message, 'danger');
            }
        }

        // ==========================================
        // CATEGORÍAS DE INDICADORES
        // ==========================================
        async function loadCategories() {
            try {
                const categories = await supabaseRequest(
                    '/indicator_categories?select=*&is_active=eq.true&order=category_order.asc,category_name.asc'
                );
                availableCategories = categories || [];
                renderCategoryFilterOptions();
                updateCategoryFilterLabel();
            } catch (error) {
                console.error('Error cargando categorías:', error);
                availableCategories = [];
            }
        }

        function renderCategoryFilterOptions() {
            const container = document.getElementById('categoryFilterOptions');
            if (!container) return;

            if (availableCategories.length === 0) {
                container.innerHTML = '<small class="text-muted">No hay categorías</small>';
                return;
            }

            container.innerHTML = availableCategories.map(c => {
                const isChecked = selectedCategoryFilters.includes(c.category_id);
                return `
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox"
                               id="catFilter_${c.category_id}" value="${c.category_id}"
                               ${isChecked ? 'checked' : ''}
                               onchange="toggleCategoryFilter('${c.category_id}')">
                        <label class="form-check-label d-flex align-items-center" for="catFilter_${c.category_id}">
                            <span class="badge me-2"
                                  style="background-color: ${c.category_color}; width: 20px; height: 20px; padding: 0; display: flex; align-items: center; justify-content: center;">
                                <i class="bi bi-${c.category_icon}" style="font-size: 0.7rem;"></i>
                            </span>
                            <span>${escapeHtml(c.category_name)}</span>
                        </label>
                    </div>
                `;
            }).join('');
        }

        function toggleCategoryFilter(categoryId) {
            const idx = selectedCategoryFilters.indexOf(categoryId);
            if (idx > -1) selectedCategoryFilters.splice(idx, 1);
            else selectedCategoryFilters.push(categoryId);
            updateCategoryFilterLabel();
            filterIndicators();
        }

        function updateCategoryFilterLabel() {
            const label = document.getElementById('categoryFilterLabel');
            if (!label) return;

            if (selectedCategoryFilters.length === 0) {
                label.textContent = 'Todas las categorías';
            } else if (selectedCategoryFilters.length === 1) {
                const c = availableCategories.find(x => x.category_id === selectedCategoryFilters[0]);
                label.textContent = c ? c.category_name : '1 categoría';
            } else {
                label.textContent = `${selectedCategoryFilters.length} categorías`;
            }
        }

        function selectAllCategories() {
            selectedCategoryFilters = availableCategories.map(c => c.category_id);
            renderCategoryFilterOptions();
            updateCategoryFilterLabel();
            filterIndicators();
        }

        function clearCategoryFilter() {
            selectedCategoryFilters = [];
            renderCategoryFilterOptions();
            updateCategoryFilterLabel();
            filterIndicators();
        }

        // ==========================================
        // INDICADORES
        // ==========================================
        async function loadIndicators() {
            try {
                const indicators = await supabaseRequest(
                    '/indicators?select=*,users!indicators_owner_id_fkey(user_display_name,user_name)&indicator_status=eq.active&order=indicator_name'
                );
                allIndicators = indicators || [];

                // Cargar categorías de cada indicador (en serie para no saturar)
                for (const ind of allIndicators) {
                    const assigns = await supabaseRequest(
                        `/indicator_category_assignments?select=indicator_categories(*)&indicator_id=eq.${ind.indicator_id}`
                    );
                    ind.categories = assigns ? assigns.map(a => a.indicator_categories) : [];
                }

                // Cargar selección actual de este dashboard
                const sel = await supabaseRequest(
                    `/dashboard_indicators?select=indicator_id&dashboard_id=eq.${dashboardId}`
                );
                selectedIndicators = new Set((sel || []).map(s => s.indicator_id));

                filteredIndicators = [...allIndicators];
                renderIndicators();
                updateCounts();
            } catch (error) {
                console.error('Error cargando indicadores:', error);
                document.getElementById('indicatorsContainer').innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-exclamation-triangle text-warning"></i>
                        <h6>Error cargando indicadores</h6>
                        <p class="text-muted">${escapeHtml(error.message)}</p>
                    </div>
                `;
            }
        }

        function renderIndicators() {
            const container = document.getElementById('indicatorsContainer');

            if (filteredIndicators.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-search text-muted"></i>
                        <h6>No se encontraron indicadores</h6>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredIndicators.map(ind => {
                const isSelected = selectedIndicators.has(ind.indicator_id);
                const ownerName = ind.users
                    ? (ind.users.user_display_name || ind.users.user_name)
                    : 'Sin propietario';

                const categoryBadges = ind.categories && ind.categories.length > 0
                    ? `<div class="mt-2 mb-2">
                        <small class="text-muted d-block mb-1">Categorías:</small>
                        <div class="d-flex flex-wrap gap-1">
                            ${ind.categories.map(c => `
                                <span class="badge" style="background-color: ${c.category_color || '#6c757d'}; font-size: 0.7rem;">
                                    <i class="bi bi-${c.category_icon || 'folder'} me-1"></i>${escapeHtml(c.category_name)}
                                </span>
                            `).join('')}
                        </div>
                       </div>`
                    : '';

                return `
                    <div class="indicator-item ${isSelected ? 'selected' : ''}"
                         onclick="toggleIndicator('${ind.indicator_id}')">
                        <div class="d-flex align-items-start">
                            <div class="me-3">
                                <input type="checkbox" class="indicator-checkbox" ${isSelected ? 'checked' : ''}
                                       onclick="event.stopPropagation(); toggleIndicator('${ind.indicator_id}')">
                            </div>
                            <div class="flex-grow-1">
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <h6 class="mb-1">${escapeHtml(ind.indicator_name)}</h6>
                                    <span class="result-format-badge format-${ind.result_format}">
                                        ${ind.result_format.toUpperCase()}
                                    </span>
                                </div>
                                ${ind.indicator_description ? `<p class="text-muted small mb-2">${escapeHtml(ind.indicator_description)}</p>` : ''}
                                <div class="formula-preview">${escapeHtml(ind.formula_expression)}</div>
                                ${categoryBadges}
                                <div class="mt-2"><small class="text-muted"><i class="bi bi-person me-1"></i>${escapeHtml(ownerName)}</small></div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleIndicator(id) {
            if (selectedIndicators.has(id)) selectedIndicators.delete(id);
            else selectedIndicators.add(id);
            renderIndicators();
            updateCounts();
        }

        function filterIndicators() {
            const search = document.getElementById('searchIndicators').value.toLowerCase();
            const filterType = document.querySelector('input[name="filterTypeIndicators"]:checked').value;

            filteredIndicators = allIndicators.filter(ind => {
                const matchesSearch = !search ||
                    ind.indicator_name.toLowerCase().includes(search) ||
                    (ind.indicator_description && ind.indicator_description.toLowerCase().includes(search)) ||
                    ind.formula_expression.toLowerCase().includes(search);
                if (!matchesSearch) return false;

                const matchesCategory = selectedCategoryFilters.length === 0 ||
                    (ind.categories && ind.categories.some(c => selectedCategoryFilters.includes(c.category_id)));
                if (!matchesCategory) return false;

                const isSelected = selectedIndicators.has(ind.indicator_id);
                if (filterType === 'selected') return isSelected;
                if (filterType === 'unselected') return !isSelected;
                return true;
            });

            renderIndicators();
            updateCounts();
        }

        // ==========================================
        // VARIABLES
        // ==========================================
        async function loadVariables() {
            try {
                const variables = await supabaseRequest(
                    '/variables?select=*,users!variables_owner_id_fkey(user_display_name,user_name)&variable_status=eq.active&order=variable_name'
                );
                allVariables = variables || [];

                const sel = await supabaseRequest(
                    `/dashboard_variables?select=variable_id&dashboard_id=eq.${dashboardId}`
                );
                selectedVariables = new Set((sel || []).map(s => s.variable_id));

                filteredVariables = [...allVariables];
                renderVariables();
                updateCounts();
            } catch (error) {
                console.error('Error cargando variables:', error);
                document.getElementById('variablesContainer').innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-exclamation-triangle text-warning"></i>
                        <h6>Error cargando variables</h6>
                        <p class="text-muted">${escapeHtml(error.message)}</p>
                    </div>
                `;
            }
        }

        function renderVariables() {
            const container = document.getElementById('variablesContainer');

            if (filteredVariables.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-search text-muted"></i>
                        <h6>No se encontraron variables</h6>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredVariables.map(v => {
                const isSelected = selectedVariables.has(v.variable_id);
                const ownerName = v.users
                    ? (v.users.user_display_name || v.users.user_name)
                    : 'Sin propietario';

                return `
                    <div class="variable-item ${isSelected ? 'selected' : ''}"
                         onclick="toggleVariable('${v.variable_id}')">
                        <div class="d-flex align-items-start">
                            <div class="me-3">
                                <input type="checkbox" class="variable-checkbox" ${isSelected ? 'checked' : ''}
                                       onclick="event.stopPropagation(); toggleVariable('${v.variable_id}')">
                            </div>
                            <div class="flex-grow-1">
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <h6 class="mb-1">${escapeHtml(v.variable_name)}</h6>
                                    <div>
                                        <span class="result-format-badge format-${v.data_type}">
                                            ${v.data_type.toUpperCase()}
                                        </span>
                                        <span class="periodicity-badge periodicity-${v.periodicity} ms-1">
                                            ${v.periodicity === 'annual' ? 'ANUAL' : 'MENSUAL'}
                                        </span>
                                    </div>
                                </div>
                                ${v.variable_description ? `<p class="text-muted small mb-2">${escapeHtml(v.variable_description)}</p>` : ''}
                                <div class="mt-2"><small class="text-muted"><i class="bi bi-person me-1"></i>${escapeHtml(ownerName)}</small></div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleVariable(id) {
            if (selectedVariables.has(id)) selectedVariables.delete(id);
            else selectedVariables.add(id);
            renderVariables();
            updateCounts();
        }

        function filterVariables() {
            const search = document.getElementById('searchVariables').value.toLowerCase();
            const filterType = document.querySelector('input[name="filterTypeVariables"]:checked').value;

            filteredVariables = allVariables.filter(v => {
                const matchesSearch = !search ||
                    v.variable_name.toLowerCase().includes(search) ||
                    (v.variable_description && v.variable_description.toLowerCase().includes(search));
                if (!matchesSearch) return false;

                const isSelected = selectedVariables.has(v.variable_id);
                if (filterType === 'selected') return isSelected;
                if (filterType === 'unselected') return !isSelected;
                return true;
            });

            renderVariables();
            updateCounts();
        }

        // ==========================================
        // CONTADORES Y RESUMEN
        // ==========================================
        function updateCounts() {
            const totalI = filteredIndicators.length;
            const selI = filteredIndicators.filter(x => selectedIndicators.has(x.indicator_id)).length;
            document.getElementById('countAllIndicators').textContent = totalI;
            document.getElementById('countSelectedIndicators').textContent = selI;
            document.getElementById('countUnselectedIndicators').textContent = totalI - selI;

            const totalV = filteredVariables.length;
            const selV = filteredVariables.filter(x => selectedVariables.has(x.variable_id)).length;
            document.getElementById('countAllVariables').textContent = totalV;
            document.getElementById('countSelectedVariables').textContent = selV;
            document.getElementById('countUnselectedVariables').textContent = totalV - selV;

            document.getElementById('indicatorTabCount').textContent = selectedIndicators.size;
            document.getElementById('variableTabCount').textContent = selectedVariables.size;

            document.getElementById('selectedIndicatorsCount').textContent = selectedIndicators.size;
            document.getElementById('selectedVariablesCount').textContent = selectedVariables.size;

            const total = selectedIndicators.size + selectedVariables.size;
            document.getElementById('saveBtn').disabled = false; // Permitir guardar incluso 0 (limpiar selección)

            const alertEl = document.getElementById('recommendationAlert');
            if (total === 0) {
                alertEl.className = 'alert alert-warning mb-4';
                alertEl.innerHTML = '<i class="bi bi-exclamation-triangle me-2"></i><small>Sin selección. Al guardar, el dashboard quedará vacío.</small>';
            } else if (total >= 15) {
                alertEl.className = 'alert alert-warning mb-4';
                alertEl.innerHTML = '<i class="bi bi-exclamation-triangle me-2"></i><small>Has seleccionado muchos elementos. Considera reducir para mejor visualización.</small>';
            } else {
                alertEl.className = 'alert alert-success mb-4';
                alertEl.innerHTML = `<i class="bi bi-check-circle me-2"></i><small>${total} elemento${total !== 1 ? 's' : ''} seleccionado${total !== 1 ? 's' : ''}.</small>`;
            }
        }

        function clearAllSelections() {
            const total = selectedIndicators.size + selectedVariables.size;
            if (total === 0) {
                showMessage('No hay elementos seleccionados', 'info');
                return;
            }
            if (!confirm(`¿Deseleccionar los ${total} elementos? (Aún tendrás que guardar para persistir el cambio)`)) return;

            selectedIndicators.clear();
            selectedVariables.clear();
            renderIndicators();
            renderVariables();
            updateCounts();
        }

        // ==========================================
        // GUARDAR
        // ==========================================
        async function saveConfiguration() {
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Guardando...';
            mostrarLoading('Guardando configuración...');

            try {
                // 1) Borrar selección anterior de este dashboard
                await supabaseRequest(
                    `/dashboard_indicators?dashboard_id=eq.${dashboardId}`,
                    { method: 'DELETE' }
                );
                await supabaseRequest(
                    `/dashboard_variables?dashboard_id=eq.${dashboardId}`,
                    { method: 'DELETE' }
                );

                // 2) Insertar nueva selección de indicadores
                if (selectedIndicators.size > 0) {
                    const payload = Array.from(selectedIndicators).map((id, idx) => ({
                        dashboard_id: dashboardId,
                        indicator_id: id,
                        display_order: idx + 1
                    }));
                    await supabaseRequest('/dashboard_indicators', {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                }

                // 3) Insertar nueva selección de variables
                if (selectedVariables.size > 0) {
                    const payload = Array.from(selectedVariables).map((id, idx) => ({
                        dashboard_id: dashboardId,
                        variable_id: id,
                        display_order: idx + 1
                    }));
                    await supabaseRequest('/dashboard_variables', {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                }

                // 4) Actualizar updated_at del dashboard
                await supabaseRequest(`/dashboards?dashboard_id=eq.${dashboardId}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ updated_at: new Date().toISOString() })
                });

                const total = selectedIndicators.size + selectedVariables.size;
                showMessage(`Configuración guardada. ${total} elemento${total !== 1 ? 's' : ''} en este dashboard.`, 'success');

            } catch (error) {
                console.error('Error guardando:', error);
                showMessage('Error guardando: ' + error.message, 'danger');
            } finally {
                ocultarLoading();
                saveBtn.disabled = false;
                saveBtn.innerHTML = '<i class="bi bi-check-circle me-2"></i>Guardar';
            }
        }

        // ==========================================
        // UTILIDADES
        // ==========================================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        function mostrarLoading(text) {
            document.getElementById('loadingText').textContent = text || 'Procesando...';
            document.getElementById('loading-overlay').classList.remove('hidden');
        }
        function ocultarLoading() {
            document.getElementById('loading-overlay').classList.add('hidden');
        }

        // Funciones globales
        window.toggleIndicator = toggleIndicator;
        window.toggleVariable = toggleVariable;
        window.filterIndicators = filterIndicators;
        window.filterVariables = filterVariables;
        window.toggleCategoryFilter = toggleCategoryFilter;
        window.selectAllCategories = selectAllCategories;
        window.clearCategoryFilter = clearCategoryFilter;
        window.clearAllSelections = clearAllSelections;
        window.saveConfiguration = saveConfiguration;
        window.openMetadataModal = openMetadataModal;
        window.saveMetadata = saveMetadata;
    </script>
</body>
</html>
