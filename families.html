<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Familias - Colegio Tilatá</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --brand-primary: #1b365d;
            --brand-secondary: #efefef;
            --brand-tertiary: #3d6199;
        }
        body {
            background-color: var(--brand-secondary);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .portal-wrapper {
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
            padding: 1rem;
        }
        .portal-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .portal-header .brand-logo {
            max-height: 72px;
            width: auto;
        }
        .portal-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }
        .btn-brand {
            background-color: var(--brand-primary);
            border-color: var(--brand-primary);
            color: #fff;
        }
        .btn-brand:hover,
        .btn-brand:focus {
            background-color: var(--brand-tertiary);
            border-color: var(--brand-tertiary);
            color: #fff;
        }
        .btn-brand:disabled {
            background-color: var(--brand-primary);
            border-color: var(--brand-primary);
            color: #fff;
            opacity: 0.65;
        }
        .btn-enviar .spinner-border {
            width: 1rem;
            height: 1rem;
        }
    </style>
</head>
<body>
    <div class="portal-wrapper">

        <!-- Encabezado / marca -->
        <div class="portal-header">
            <img src="https://mrtuerkncqodhakuwjob.supabase.co/storage/v1/object/public/certificates/branding/Logo-Tilata.png"
                 alt="Colegio Tilatá" class="brand-logo">
            <p class="text-muted mt-2 mb-0">Portal de Familias</p>
        </div>

        <div class="card portal-card">
            <div class="card-body p-4">

                <!-- Contenedor de mensajes -->
                <div id="mensaje"></div>

                <!-- Pantalla 1: Solicitud de código -->
                <div id="pantalla-correo">
                    <p class="mb-3">
                        Ingresa el correo electrónico registrado en el colegio.
                        Te enviaremos un código para validar tu acceso.
                    </p>

                    <div class="mb-3">
                        <label for="input-correo" class="form-label">Correo electrónico</label>
                        <input
                            type="email"
                            class="form-control"
                            id="input-correo"
                            placeholder="tucorreo@ejemplo.com"
                            autocomplete="email"
                            inputmode="email">
                    </div>

                    <div class="d-grid">
                        <button type="button" class="btn btn-brand btn-enviar" id="btn-enviar" onclick="solicitarCodigo()">
                            <i class="bi bi-envelope me-1"></i>Enviar código
                        </button>
                    </div>
                </div>

            </div>
        </div>

        <p class="text-center text-muted small mt-3 mb-0">
            ¿Problemas para ingresar? Comunícate con el colegio.
        </p>
    </div>

    <script>
        // ==========================================
        // CONFIGURACIÓN
        // ==========================================
        // URL del Web App de Apps Script (se completa cuando el intermediario esté publicado).
        // Mientras esté vacía, la página funciona en "modo demostración": no llama a ningún
        // servicio y solo muestra el mensaje neutro.
        const GAS_ENDPOINT = '';

        // ==========================================
        // UTILIDADES
        // ==========================================
        function mostrarMensaje(texto, tipo = 'info') {
            const cont = document.getElementById('mensaje');
            const iconos = { success: 'check-circle', danger: 'exclamation-triangle', warning: 'exclamation-triangle', info: 'info-circle' };
            cont.innerHTML = `
                <div class="alert alert-${tipo} d-flex align-items-center" role="alert">
                    <i class="bi bi-${iconos[tipo] || 'info-circle'} me-2"></i>
                    <div>${texto}</div>
                </div>`;
        }

        function limpiarMensaje() {
            document.getElementById('mensaje').innerHTML = '';
        }

        function correoValido(correo) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(correo);
        }

        function setCargando(cargando) {
            const btn = document.getElementById('btn-enviar');
            if (cargando) {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border me-1" role="status"></span>Enviando...';
            } else {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-envelope me-1"></i>Enviar código';
            }
        }

        // ==========================================
        // SOLICITAR CÓDIGO
        // ==========================================
        async function solicitarCodigo() {
            limpiarMensaje();
            const correo = document.getElementById('input-correo').value.trim().toLowerCase();

            if (!correoValido(correo)) {
                mostrarMensaje('Ingresa un correo electrónico válido.', 'warning');
                return;
            }

            setCargando(true);

            try {
                // Modo demostración: sin endpoint configurado aún.
                if (!GAS_ENDPOINT) {
                    console.warn('GAS_ENDPOINT no configurado: modo demostración.');
                    await new Promise(r => setTimeout(r, 600));
                } else {
                    // Se envía como text/plain para evitar el preflight CORS de Apps Script.
                    await fetch(GAS_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'request_code', email: correo })
                    });
                }

                // Respuesta neutra: nunca revela si el correo existe o no.
                mostrarMensaje('Si el correo está registrado, recibirás un código en unos minutos.', 'success');

            } catch (error) {
                console.error('Error solicitando código:', error);
                mostrarMensaje('No fue posible procesar la solicitud. Intenta de nuevo en un momento.', 'danger');
            } finally {
                setCargando(false);
            }
        }

        // Permitir enviar con Enter
        document.getElementById('input-correo').addEventListener('keyup', function (e) {
            if (e.key === 'Enter') solicitarCodigo();
        });
    </script>
</body>
</html>
